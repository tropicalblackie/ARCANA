async function geocodeCity(cityName){
  if(!cityName.trim())return null;
  try{
    const response=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName)}&format=json&limit=1`);
    const results=await response.json();
    if(results.length>0){
      const{display_name,lat,lon}=results[0];
      return{name:display_name,lat:parseFloat(lat),lon:parseFloat(lon)};
    }
    return null;
  }catch(e){console.error("Geocoding error:",e);return null;}
}
const SETUP_STEPS=[
  {key:"name",         q:"Come ti chiami?",                                    type:"text",   placeholder:"Il tuo nome"},
  {key:"gender",       q:"Come ti identifichi?",                               type:"choice", options:["Donna","Uomo","Non binario","Preferisco non dirlo"]},
  {key:"birthday",     q:"Quando sei nato/a?",                                 type:"date"},
  {key:"birthcity",    q:"In quale città sei nato/a?",                         type:"text",   placeholder:"Città di nascita",validate:true},
  {key:"birthtime",    q:"A che ora sei nato/a?",                              type:"time"},
  {key:"relationship", q:"Qual è il tuo stato sentimentale?",                  type:"choice", options:["Single","Impegnato/a","Fidanzato/a","Sposato/a","Flirt","Platonica","Appena separato/a","Divorziato/a","Vedovo/a","È complicato"]},
  {key:"work",         q:"Come descriveresti la tua situazione lavorativa?",   type:"choice", options:["Studente","Neolaureato/a","In cerca di lavoro","Disoccupato/a","Dipendente pubblico","Dipendente privato","Imprenditore/trice","Capo","Pensionato/a","Casalinga/o","Nessuno di questi"]},
];

function ProfileSetup({t,onDone,onBack}){
  const[step,setStep]=useState(0);
  const[data,setData]=useState({});
  const[val,setVal]=useState("");
  const[geoLoading,setGeoLoading]=useState(false);
  const[geoError,setGeoError]=useState("");
  const[geoResult,setGeoResult]=useState(null);
  const geoTimerRef=useRef(null);
  const s=SETUP_STEPS[step];
  const total=SETUP_STEPS.length;
  const isDark=parseInt(t.bg.slice(1,3),16)<128;

  const autoGeocode=useCallback(async(cityName)=>{
    if(!cityName.trim())return;
    setGeoLoading(true);
    setGeoError("");
    const geo=await geocodeCity(cityName);
    setGeoLoading(false);
    if(geo){
      setGeoResult(geo);
    }else{
      setGeoError("Città non trovata. Prova di nuovo.");
    }
  },[]);

  useEffect(()=>{
    if(s.key==="birthcity"&&s.validate&&val.trim()){
      if(geoTimerRef.current)clearTimeout(geoTimerRef.current);
      geoTimerRef.current=setTimeout(()=>autoGeocode(val),500);
    }
    return()=>{if(geoTimerRef.current)clearTimeout(geoTimerRef.current);};
  },[val,s.key,s.validate,autoGeocode]);

  const next=useCallback(async(v)=>{
    const chosen=v!==undefined?v:val;
    const newData={...data,[s.key]:geoResult?`${geoResult.name}, ${geoResult.lat}, ${geoResult.lon}`:chosen};
    if(step<total-1){setData(newData);setVal("");setStep(step+1);setGeoLoading(false);setGeoError("");setGeoResult(null);}
    else{try{localStorage.setItem("arcana_profile",JSON.stringify(newData))}catch(e){}onDone(newData);}
  },[step,val,data,s,total,onDone,geoResult]);

  const back=()=>{if(step>0){setStep(p=>{const ns=p-1;setVal(data[SETUP_STEPS[ns].key]||"");return ns;});}};
  const canContinue=(s.type==="text"||s.type==="date")&&val.trim().length>0&&(s.key!=="birthcity"||geoResult!==null);

  return(
    <div className="screen-h" style={{background:t.bg,display:"flex",flexDirection:"column",padding:"env(safe-area-inset-top,0px) 0 env(safe-area-inset-bottom,0px)"}}>
      <div style={{padding:"clamp(16px,4vw,28px) 24px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        {step>0?<button onClick={back} style={{color:t.muted,fontSize:"10px",letterSpacing:".16em"}}>← indietro</button>:<button onClick={onBack} style={{color:t.muted,fontSize:"10px",letterSpacing:".16em"}}>← annulla</button>}
        <div style={{fontSize:"8px",letterSpacing:".32em",color:t.muted,textTransform:"uppercase"}}>{step+1} / {total}</div>
      </div>
      <div style={{display:"flex",gap:4,justifyContent:"center",padding:"16px 0 0"}}>
        {SETUP_STEPS.map((_,i)=>(
          <div key={i} style={{width:i===step?20:5,height:4,borderRadius:2,background:i<=step?t.accent:t.border,transition:"all .35s"}}/>
        ))}
      </div>
      <div className="fade-in" key={step} style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 clamp(20px,6vw,40px)",overflowY:"auto"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(24px,6vw,38px)",fontStyle:"italic",color:t.text,lineHeight:1.2,marginBottom:36}}>{s.q}</div>

        {s.type==="text"&&(
          <div>
            <input autoFocus value={val} onChange={e=>{setVal(e.target.value);if(s.validate){setGeoError("");setGeoResult(null);}}} onKeyDown={e=>e.key==="Enter"&&canContinue&&next()} placeholder={s.placeholder} disabled={geoLoading}
              style={{background:"transparent",border:"none",borderBottom:`1px solid ${geoError?"#d4544f":geoResult?"#58b878":t.border}`,color:t.text,fontSize:"clamp(20px,5vw,28px)",fontFamily:"'Cormorant Garamond',serif",padding:"10px 0",outline:"none",caretColor:t.accent,width:"100%",opacity:geoLoading?0.6:1,"::placeholder":{color:t.muted}}}/>
            {s.validate&&geoLoading&&<div style={{marginTop:16,fontSize:"12px",color:t.muted,display:"flex",alignItems:"center",gap:8}}>🔍 Cercando su OpenStreetMap...</div>}
            {s.validate&&geoError&&<div style={{marginTop:12,fontSize:"13px",color:"#d4544f"}}>✗ {geoError}</div>}
            {s.validate&&geoResult&&<div style={{marginTop:12,fontSize:"13px",color:"#58b878"}}>✓ Trovato: {geoResult.name}</div>}
          </div>
        )}

        {s.type==="date"&&(
          <input type="date" value={val} onChange={e=>setVal(e.target.value)} colorScheme={isDark?"dark":"light"}
            style={{background:"transparent",border:"none",borderBottom:`1px solid ${t.border}`,color:t.text,fontSize:"clamp(18px,4.5vw,24px)",fontFamily:"'Cormorant Garamond',serif",padding:"10px 0",outline:"none",width:"100%",colorScheme:isDark?"dark":"light"}}/>
        )}

        {s.type==="time"&&(
          <div>
            <input type="time" value={val} onChange={e=>setVal(e.target.value)}
              style={{background:"transparent",border:"none",borderBottom:`1px solid ${t.border}`,color:t.text,fontSize:"clamp(18px,4.5vw,24px)",fontFamily:"'Cormorant Garamond',serif",padding:"10px 0",outline:"none",width:"100%",colorScheme:isDark?"dark":"light"}}/>
            <div style={{marginTop:28,display:"flex",gap:12,flexWrap:"wrap"}}>
              <button onClick={()=>next(val||"non specificato")} style={{padding:"12px 20px",fontSize:"9px",letterSpacing:".22em",textTransform:"uppercase",border:`1px solid ${t.accent}`,color:t.text,background:`${t.accent}14`}}>
                {val?"Continua →":"Continua →"}
              </button>
              <button onClick={()=>next("non specificato")} style={{padding:"12px 20px",fontSize:"9px",letterSpacing:".22em",textTransform:"uppercase",border:`1px solid ${t.border}`,color:t.muted,background:"transparent"}}>
                Non lo so
              </button>
            </div>
          </div>
        )}

        {s.type==="choice"&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {s.options.map(o=>(
              <button key={o} onClick={()=>next(o)}
                style={{padding:"12px 18px",fontSize:"9px",letterSpacing:".18em",textTransform:"uppercase",border:`1px solid ${t.border}`,color:t.muted,background:"transparent",borderRadius:2,transition:"all .15s"}}>
                {o}
              </button>
            ))}
          </div>
        )}
      </div>

      {(s.type==="text"||s.type==="date")&&(
        <div style={{padding:"20px 24px calc(env(safe-area-inset-bottom,0px) + 20px)"}}>
          <button onClick={()=>canContinue&&next()} style={{width:"100%",padding:"18px",fontSize:"9px",letterSpacing:".3em",textTransform:"uppercase",border:`1px solid ${canContinue?t.accent:t.border}`,color:canContinue?t.text:t.muted,background:canContinue?`${t.accent}14`:"transparent",transition:"all .25s"}}>
            Continua →
          </button>
        </div>
      )}
    </div>
  );
}

function getLunarPhase(dateStr){
  const d=new Date(dateStr+"T12:00:00");
  const ref=new Date("2000-01-06T18:14:00Z");
  const synodic=29.530588853;
  const pd=((((d-ref)/86400000)%synodic)+synodic)%synodic;
  const norm=pd/synodic;
  let name,desc;
  if(pd<1.85){name="Luna Nuova";desc="Tempo di semina interiore. Inizi, intenzioni, silenzio fertile.";}
  else if(pd<7.38){name="Luna Crescente";desc="L'energia cresce. Agisci su ciò che hai iniziato con intenzione.";}
  else if(pd<9.22){name="Primo Quarto";desc="Momento di decisione. Supera gli ostacoli con determinazione.";}
  else if(pd<12.91){name="Gibbosa Crescente";desc="Raffinamento e perseveranza. Il culmine si avvicina.";}
  else if(pd<16.61){name="Luna Piena";desc="Culmine e rivelazione. Ciò che era nascosto si manifesta oggi.";}
  else if(pd<20.30){name="Gibbosa Calante";desc="Gratitudine e rilascio. Integra ciò che hai ottenuto.";}
  else if(pd<23.99){name="Ultimo Quarto";desc="Revisione profonda. Lascia andare ciò che non serve più.";}
  else{name="Luna Calante";desc="Il ciclo si chiude. Prepara il terreno per la prossima rinascita.";}
  const daysToFull=pd<14.765?14.765-pd:synodic-pd+14.765;
  const daysToNew=pd<0.5?0.5-pd:synodic-pd;
  const nextEvent=daysToFull<daysToNew
    ?{type:"Luna Piena",days:Math.max(0,Math.round(daysToFull))}
    :{type:"Luna Nuova",days:Math.max(0,Math.round(daysToNew))};
  return{pd,norm,name,desc,nextEvent};
}
const MoonSVG=memo(function MoonSVG({pd}){
  const S=56,r=22,cx=28,cy=28;
  const norm=pd/29.530588853;
  const waxing=norm<=0.5;
  const tx=r*Math.cos(2*Math.PI*norm);
  let path='';
  if(norm>0.005&&norm<0.995){
    if(waxing){
      const sw=tx>0?0:1;
      path=`M${cx},${cy-r} A${r},${r},0,0,1,${cx},${cy+r} A${Math.abs(tx).toFixed(2)},${r},0,0,${sw},${cx},${cy-r} Z`;
    }else{
      const tx2=r*Math.cos(2*Math.PI*(1-norm));
      const sw=tx2>0?1:0;
      path=`M${cx},${cy-r} A${r},${r},0,0,0,${cx},${cy+r} A${Math.abs(tx2).toFixed(2)},${r},0,0,${sw},${cx},${cy-r} Z`;
    }
  }
  const isNew=norm<0.005||norm>0.995;
  const isFull=norm>0.492&&norm<0.508;
  return(
    <svg width={S} height={S} style={{display:"block",overflow:"visible",flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="rgba(10,4,20,0.96)" stroke="rgba(255,255,255,0.14)" strokeWidth={1}/>
      {isFull
        ?<circle cx={cx} cy={cy} r={r} fill="rgba(255,248,210,0.90)"/>
        :!isNew&&<path d={path} fill="rgba(255,248,210,0.88)"/>}
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.20)" strokeWidth={0.8}/>
      {isFull&&<circle cx={cx} cy={cy} r={r+3} fill="none" stroke="rgba(255,230,140,0.22)" strokeWidth={4}/>}
    </svg>
  );
});

          );

        {" · tocca il grafico per esplorare"}
      </div>
    </div>
  );
}

function SogniView({t,profile,onBack}){
  const [step,setStep]=useState('write');
  const [dreamText,setDreamText]=useState('');
  const [interpretation,setInterpretation]=useState('');
  const [history,setHistory]=useState(()=>{try{const s=localStorage.getItem('arcana_sogni');return s?JSON.parse(s):[];}catch(e){return [];}});
  const [expandedId,setExpandedId]=useState(null);

  const SYSTEM=`Sei un interprete dei sogni profondo e concreto. L'utente ti racconta un sogno. Struttura la risposta ESATTAMENTE così, con questi titoli di sezione:\n\nSIGNIFICATO DEL SOGNO\n[3-4 righe: cosa sta cercando di dirti il tuo inconscio, quali emozioni o situazioni della vita reale rispecchia questo sogno specifico, quali simboli emergono. Cita gli elementi concreti del sogno. Tono caldo, seconda persona singolare.]\n\nCOSA FARE\n[Esattamente 5 azioni concrete numerate 1. 2. 3. 4. 5. — una per riga — da fare oggi o questa settimana, collegate agli elementi del sogno. Ogni consiglio inizia con un verbo. Specifici, non generici.]\n\nLA DOMANDA\n[Una sola domanda potente che l'utente porta con se' come riflessione.]\n\nRegole assolute: nessun asterisco, nessun simbolo markdown, nessun trattino come elenco, nessun grassetto. Solo testo pulito. Scrivi solo in italiano. Niente consigli medici.`;

  const interrogate=useCallback(async()=>{
    if(!dreamText.trim())return;
    setStep('loading');
    try{
      const resp=await fetch('https://text.pollinations.ai/',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          messages:[
            {role:'system',content:SYSTEM},
            {role:'user',content:dreamText.trim()}
          ],
          model:'openai',
          seed:Math.floor(Math.random()*999999),
          temperature:0.95
        })
      });
      if(!resp.ok) throw new Error('network');
      const interp=(await resp.text()).trim().replace(/\*\*/g,'').replace(/\*/g,'');
      setInterpretation(interp);
      const entry={id:Date.now().toString(),date:new Date().toISOString().slice(0,10),dateIt:new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'}),dream:dreamText.trim(),interpretation:interp};
      setHistory(prev=>{const upd=[entry,...prev];try{localStorage.setItem('arcana_sogni',JSON.stringify(upd));}catch(e){}return upd;});
      setStep('result');
    }catch(e){
      setInterpretation("Il canale dell'inconscio è momentaneamente disturbato. Riprova tra qualche istante — l'interpretazione del sogno richiede connessione.");
      setStep('result');
    }
  },[dreamText]);

  const reset=useCallback(()=>{setDreamText('');setInterpretation('');setStep('write');},[]);

  const card={background:'#ffffff',border:'1px solid rgba(31,31,36,0.10)',borderRadius:16,boxShadow:'0 2px 8px rgba(0,0,0,0.06),0 0 0 0.5px rgba(0,0,0,0.03)'};

  return(
    <div style={{minHeight:'100vh',background:'#f2f2f7',color:'#1f1f24',overflowY:'auto',paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 80px)'}}>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0}}>
        {[...Array(22)].map((_,i)=>(
          <div key={i} style={{position:'absolute',width:1.5,height:1.5,borderRadius:'50%',background:`rgba(31,31,36,${i%3===0?0.07:0.04})`,top:`${(i*43+17)%100}%`,left:`${(i*71+11)%100}%`,animation:`pulse ${2+(i*0.31)%2.5}s ${(i*0.19)%2.5}s ease-in-out infinite`}}/>
        ))}
      </div>
      <div style={{position:'relative',zIndex:1,maxWidth:640,margin:'0 auto',padding:'0 16px'}}>

        {/* NAV */}
        <div style={{display:'flex',alignItems:'center',padding:'calc(env(safe-area-inset-top,0px) + 14px) 4px 0'}}>
          <button onClick={onBack} style={{color:'rgba(31,31,36,0.45)',fontFamily:"'Inter',sans-serif",fontSize:'11px',fontWeight:400,letterSpacing:'.14em',padding:'12px 4px',background:'none',border:'none',cursor:'pointer'}}>← indietro</button>
        </div>

        {/* HEADER */}
        <div style={{textAlign:'center',padding:'clamp(24px,6vw,40px) 0 32px'}}>
          <div className="gold-text" style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(9px,2.4vw,11px)',fontWeight:500,letterSpacing:'.52em',textTransform:'uppercase',marginBottom:14}}>ARCANA</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(32px,8.5vw,50px)',fontWeight:500,color:'#1f1f24',letterSpacing:'-.02em',lineHeight:1,marginBottom:10}}>Sogni</div>
          <div style={{width:36,height:1,background:'linear-gradient(to right,transparent,rgba(200,165,80,0.55),transparent)',margin:'0 auto 14px'}}/>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(15px,4vw,18px)',fontWeight:300,fontStyle:'italic',color:'rgba(31,31,36,0.48)',lineHeight:1.5}}>Il diario dell'inconscio</div>
        </div>

        {/* STEP: WRITE */}
        {step==='write'&&(
          <div className="fade-in">
            <div style={{...card,marginBottom:12}}>
              <textarea value={dreamText} onChange={e=>setDreamText(e.target.value)} placeholder="Racconta il sogno di questa notte… anche solo frammenti, sensazioni, colori." style={{width:'100%',minHeight:240,padding:'22px 22px 0',background:'transparent',fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(17px,4.5vw,21px)',color:'#1f1f24',lineHeight:1.85,letterSpacing:'.005em',border:'none',outline:'none',resize:'vertical',boxSizing:'border-box'}}/>
              <div style={{padding:'12px 22px 16px',display:'flex',justifyContent:'flex-end'}}>
                <span style={{fontFamily:"'Inter',sans-serif",fontSize:'10px',color:'rgba(31,31,36,0.28)'}}>{dreamText.length}</span>
              </div>
            </div>
            <button onClick={interrogate} disabled={!dreamText.trim()} style={{width:'100%',padding:'16px',background:dreamText.trim()?'#1f1f24':'rgba(31,31,36,0.12)',color:dreamText.trim()?'#f2f2f7':'rgba(31,31,36,0.35)',fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(16px,4.5vw,20px)',fontWeight:500,fontStyle:'italic',letterSpacing:'.04em',borderRadius:100,cursor:dreamText.trim()?'pointer':'default',transition:'all .3s cubic-bezier(.16,1,.3,1)',boxShadow:dreamText.trim()?'0 4px 20px rgba(0,0,0,0.15)':'none',marginBottom:32,border:'none'}}>
              Interroga l'Inconscio
            </button>
          </div>
        )}

        {/* STEP: LOADING — pendolo */}
        {step==='loading'&&(
          <div style={{textAlign:'center',padding:'48px 0 36px'}}>
            <div style={{display:'inline-block',transformOrigin:'10px 2px',animation:'pendulum 1.5s ease-in-out infinite alternate'}}>
              <svg width="20" height="98" viewBox="0 0 20 98" fill="none">
                <line x1="10" y1="2" x2="10" y2="74" stroke="rgba(31,31,36,0.28)" strokeWidth="1.5" strokeLinecap="round"/>
                <circle cx="10" cy="85" r="11" stroke="rgba(148,104,216,0.55)" strokeWidth="1.4"/>
                <circle cx="10" cy="85" r="4.5" fill="rgba(148,104,216,0.35)"/>
              </svg>
            </div>
            <div style={{marginTop:36,fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(17px,4.5vw,20px)',fontStyle:'italic',color:'rgba(31,31,36,0.52)',lineHeight:1.7}}>L'inconscio elabora…</div>
            <div style={{marginTop:8,fontFamily:"'Inter',sans-serif",fontSize:'10px',letterSpacing:'.22em',color:'rgba(31,31,36,0.28)',textTransform:'uppercase'}}>analisi junghiana in corso</div>
          </div>
        )}

        {/* STEP: RESULT */}
        {step==='result'&&(()=>{
          // Parsing sezioni strutturate dall'AI
          const lines=interpretation.split('\n').map(l=>l.trim()).filter(Boolean);
          const secMeaning=[];const secActions=[];const secQuestion=[];
          let cur='meaning';
          for(const l of lines){
            if(/^significato/i.test(l)){cur='meaning';continue;}
            if(/^cosa fare/i.test(l)){cur='actions';continue;}
            if(/^la domanda/i.test(l)){cur='question';continue;}
            if(cur==='meaning')secMeaning.push(l);
            else if(cur==='actions')secActions.push(l);
            else secQuestion.push(l);
          }
          const meaningText=secMeaning.join(' ');
          const questionText=secQuestion.join(' ');
          const hasStructure=secMeaning.length>0||secActions.length>0;
          return(
          <div className="fade-in-up">
            {/* IL TUO SOGNO */}
            <div style={{...card,marginBottom:12,padding:'18px 20px 16px'}}>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:'9px',fontWeight:500,letterSpacing:'.32em',color:'rgba(31,31,36,0.28)',textTransform:'uppercase',marginBottom:10}}>Il tuo sogno</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(15px,4vw,17px)',color:'rgba(31,31,36,0.58)',lineHeight:1.8,fontStyle:'italic'}}>{dreamText}</div>
            </div>

            {/* SIGNIFICATO */}
            <div style={{...card,marginBottom:12,padding:'24px 24px 22px'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:'rgba(148,104,216,0.6)',flexShrink:0}}/>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:'9px',fontWeight:500,letterSpacing:'.32em',color:'rgba(148,104,216,0.75)',textTransform:'uppercase'}}>Significato del sogno</div>
              </div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(18px,4.8vw,22px)',fontWeight:400,color:'#1f1f24',lineHeight:1.9,fontStyle:'italic'}}>{hasStructure?meaningText:interpretation}</div>
            </div>

            {/* COSA FARE */}
            {secActions.length>0&&(
              <div style={{...card,marginBottom:12,padding:'24px 24px 20px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:18}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:'rgba(148,104,216,0.6)',flexShrink:0}}/>
                  <div style={{fontFamily:"'Inter',sans-serif",fontSize:'9px',fontWeight:500,letterSpacing:'.32em',color:'rgba(148,104,216,0.75)',textTransform:'uppercase'}}>Cosa fare</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:14}}>
                  {secActions.map((a,i)=>(
                    <div key={i} style={{display:'flex',gap:16,alignItems:'flex-start'}}>
                      <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(13px,3.5vw,15px)',color:'rgba(148,104,216,0.55)',fontWeight:600,lineHeight:1.7,flexShrink:0,minWidth:20,paddingTop:1}}>{i+1}</span>
                      <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(16px,4.2vw,19px)',color:'#1f1f24',lineHeight:1.7}}>{a.replace(/^\d+[\.\)\s]+/,'')}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* LA DOMANDA */}
            {questionText&&(
              <div style={{...card,marginBottom:24,padding:'22px 24px',background:'rgba(148,104,216,0.04)',borderColor:'rgba(148,104,216,0.18)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:'rgba(148,104,216,0.6)',flexShrink:0}}/>
                  <div style={{fontFamily:"'Inter',sans-serif",fontSize:'9px',fontWeight:500,letterSpacing:'.32em',color:'rgba(148,104,216,0.75)',textTransform:'uppercase'}}>Portati questa domanda</div>
                </div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(17px,4.5vw,21px)',fontStyle:'italic',color:'rgba(31,31,36,0.72)',lineHeight:1.8}}>"{questionText.replace(/^["«]|["»]$/g,'')}"</div>
              </div>
            )}

            <button onClick={reset} style={{width:'100%',padding:'15px',border:'1px solid rgba(31,31,36,0.15)',background:'#ffffff',color:'#1f1f24',fontFamily:"'Inter',sans-serif",fontSize:'11px',fontWeight:500,letterSpacing:'.22em',textTransform:'uppercase',borderRadius:100,cursor:'pointer',marginBottom:32}}>Scrivi un nuovo sogno</button>
          </div>
          );
        })()}

        {/* HISTORY */}
        {history.length>0&&step!=='loading'&&(
          <div>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:'11px',fontWeight:500,letterSpacing:'.06em',color:'rgba(60,60,67,0.45)',textTransform:'uppercase',marginBottom:12,paddingLeft:2}}>Archivio ({history.length})</div>
            {history.map(entry=>(
              <div key={entry.id} style={{...card,marginBottom:8}}>
                <button onClick={()=>setExpandedId(expandedId===entry.id?null:entry.id)} style={{width:'100%',padding:'16px 20px',display:'flex',alignItems:'flex-start',gap:12,textAlign:'left',cursor:'pointer',background:'none',border:'none'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:'10px',letterSpacing:'.12em',color:'rgba(31,31,36,0.38)',textTransform:'uppercase',marginBottom:5}}>{entry.dateIt}</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(14px,3.8vw,17px)',color:'rgba(31,31,36,0.72)',lineHeight:1.5,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:expandedId===entry.id?'unset':2,WebkitBoxOrient:'vertical'}}>{entry.dream}</div>
                  </div>
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'18px',color:'rgba(31,31,36,0.28)',transform:expandedId===entry.id?'rotate(90deg)':'rotate(0)',transition:'transform .3s',flexShrink:0,marginTop:18}}>›</span>
                </button>
                {expandedId===entry.id&&(
                  <div style={{padding:'0 20px 18px',borderTop:'1px solid rgba(31,31,36,0.07)'}} className="fade-in">
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:'9px',fontWeight:500,letterSpacing:'.28em',color:'rgba(148,104,216,0.6)',textTransform:'uppercase',padding:'14px 0 10px'}}>◎ Interpretazione</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(15px,4vw,18px)',fontStyle:'italic',color:'#1f1f24',lineHeight:1.85,whiteSpace:'pre-line'}}>{entry.interpretation.replace(/\*\*/g,'').replace(/\*/g,'')}</div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        <div style={{height:'calc(env(safe-area-inset-bottom,0px) + 20px)'}}/>
      </div>
    </div>
  );
}

function getChineseAnimal(bday){
  if(!bday)return'drago';
  const d=new Date(bday+'T12:00:00');
  let y=d.getFullYear();
  // approssimazione: se nati prima del 1 feb, anno precedente
  if(d.getMonth()===0)y-=1;
  const animals=['topo','bue','tigre','coniglio','drago','serpente','cavallo','capra','scimmia','gallo','cane','maiale'];
  return animals[((y-1900)%12+12)%12];
}
function getChineseElement(bday){
  if(!bday)return'Legno';
  const y=new Date(bday+'T12:00:00').getFullYear();
  const d=y%10;
  if(d===0||d===1)return'Metallo';
  if(d===2||d===3)return'Acqua';
  if(d===4||d===5)return'Legno';
  if(d===6||d===7)return'Fuoco';
  return'Terra';
}

      <path d="M38 80 Q34 94 36 104" stroke="#8b7355" strokeWidth="1.1" strokeLinecap="round"/>

      <path d="M48 92 Q44 104 46 110" stroke="#8b7355" strokeWidth="1" strokeLinecap="round"/>
      <path d="M72 92 Q76 104 74 110" stroke="#8b7355" strokeWidth="1" strokeLinecap="round"/>
    </svg>,
    istinto:'Non hai fretta. Dove gli altri si spezzano sotto la pressione, tu ti fai più solido. La tua energia si muove come un fiume profondo — lenta in superficie, inarrestabile sotto. Nella crisi, mentre tutti reagiscono, tu valuti. Questo ti fa sembrare freddo. In realtà sei l\'unico davvero presente.',
    elemento_base:'Sei costruito per la durata, non per i fuochi d\'artificio. L\'elemento modula come esprimi questa solidità: Metallo aggiunge rigore e principi irremovibili; Acqua porta intuizione e flessibilità inaspettata; Legno ti apre a visioni a lungo termine; Fuoco accende ambizione e leadership; Terra raddoppia la tua concretezza, rendendoti una roccia per chi ami.',
    ombra:'La tua ombra è la Capra. Disprezzi l\'indecisione, il bisogno di rassicurazione continua, l\'eccesso emotivo. Ma quella sensibilità che giudichi come fragilità è la capacità di creare bellezza e connessione — qualcosa che la tua corazza spesso impedisce.'
  },

    </svg>,
    istinto:'Sei progettata per agire. L\'esitazione ti corrode mentre l\'azione ti libera. Di fronte alla crisi, il tuo corpo risponde prima della mente — ti lanci, assumi il rischio, difendi con forza ciò che ami. Questo coraggio istintivo può sembrare imprudenza. In realtà è la forma più autentica della tua vitalità.',
    elemento_base:'La tua intensità cambia forma con l\'elemento: Metallo ti rende determinata e implacabile nei principi; Acqua ammorbidisce la tua intensità in profonda intuizione; Legno espande il tuo naturale senso di giustizia; Fuoco amplifica il carisma fino all\'ipnotico; Terra ancora l\'energia impetuosa in qualcosa di costruttivo e duraturo.',
    ombra:'La tua ombra è la Scimmia. Disprezzi la furbizia, il doppio gioco, l\'adattamento continuo. Ma quella agilità mentale che vedi come slealtà è la capacità di cambiare prospettiva senza perdersi — una flessibilità che la tua rettitudine non sempre si permette.'
  },

      <path d="M80 84 Q84 96 82 104" stroke="#9a7fc0" strokeWidth="1" strokeLinecap="round"/>
    </svg>,
    istinto:'Ti muovi con grazia attraverso i conflitti senza diventarne parte. Non è vigliaccheria — è intelligenza emotiva raffinata. Senti le tensioni prima che esplodano, crei armonia con un gesto, conosci il momento esatto in cui allontanarti. Questa delicatezza percettiva è il tuo potere più sottile e più raro.',
    elemento_base:'Sei un essere di sfumature e il tuo elemento lo intensifica: Metallo aggiunge determinazione e senso estetico tagliente; Acqua amplia l\'empatia fino alla chiaroveggenza emotiva; Legno ti rende creativo e diplomatico insieme; Fuoco porta calore e intensità nelle tue relazioni; Terra radica la sensibilità in pazienza e affidabilità.',
    ombra:'La tua ombra è il Gallo. Disprezzi la vanità, la critica diretta, il bisogno di essere visto. Ma quell\'audacia di dire la verità in faccia che giudichi arroganza è la capacità di stare nel conflitto con integrità — qualcosa che la tua diplomazia a volte evita.'
  },
  drago:{
    nome:'Drago',hanzi:'龍',pinyin:'Lóng',col:'#c8382a',

    img:'./cinese-drago.jpeg',

      <path d="M20 90 Q14 96 10 106 M20 90 Q22 100 20 108" stroke="#c8382a" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
    </svg>,
    istinto:'Non sei fatto per passare inosservato. La tua sola presenza cambia la temperatura della stanza. Nei momenti di crisi non ti nascondi — assumi il controllo con una certezza che può sembrare arroganza ma è semplicemente la tua natura. Sei il fuoco che illumina e che brucia, spesso nello stesso gesto.',
    elemento_base:'Sei già eccezionale. L\'elemento definisce come questa eccezionalità si manifesta: Metallo aggiunge rigore e potere di leadership incorruttibile; Acqua porta profondità visionaria oltre il carisma puro; Legno espande la generosità e il senso di possibilità; Fuoco raddoppia l\'intensità fino alla leggenda; Terra ancora la potenza in qualcosa di costruibile e trasmissibile.',
    ombra:'La tua ombra è il Cane. Disprezzi la fedeltà incondizionata, il bisogno di appartenenza, l\'ansietà del dubbio. Ma quella lealtà profonda che vedi come dipendenza è la capacità di amare senza calcolo — qualcosa che la tua sovranità solitaria raramente si concede.'
  },

      <path d="M32 56 Q25 54 22 50" stroke="#4a8f6a" strokeWidth="1" fill="none" strokeLinecap="round"/>
    </svg>,
    istinto:'Non aggredisci mai per primo. La tua forza risiede nell\'osservazione silenziosa, nell\'attesa del momento perfetto in cui agire diventa inevitabile. Mentre gli altri parlano, tu studi. Hai la capacità rara di mutare pelle, lasciare morire le vecchie versioni di te stesso senza rimpianti. Questa trasformazione continua è il tuo vero potere.',
    elemento_base:'Sei un essere di profondità e mistero. L\'elemento calibra questa intensità: Metallo ti rende inflessibile nelle convinzioni, magnetico e formidabile; Acqua amplifica l\'intuizione fino alla percezione extrasensoriale; Legno apre curiosità intellettuale e capacità di connessione; Fuoco porta un\'intensità passionale quasi ipnotica; Terra radica la saggezza in pazienza costruttiva.',
    ombra:'La tua ombra è il Maiale. Disprezzi la fiducia ingenua, la generosità immediata, il piacere senza strategia. Ma quella capacità di godere pienamente della vita che chiami superficialità è la libertà di essere presente senza dover sempre analizzare — qualcosa che il tuo controllo fatica a concedersi.'
  },

      <path d="M84 68 Q90 82 88 96" stroke="#b06030" strokeWidth="1.3" strokeLinecap="round"/>
    </svg>,
    istinto:'Sei pura spinta in avanti. L\'immobilità ti corrode, la libertà ti nutre. Nei momenti di crisi non analizzi — corri. Questo istinto al movimento non è impazienza: è la tua forma di coraggio, il modo in cui il tuo corpo dice che sei vivo. Le tue migliori decisioni le hai prese mentre eri in moto, non seduto a riflettere.',
    elemento_base:'La tua libertà prende forme diverse secondo l\'elemento: Metallo aggiunge disciplina e una determinazione che diventa quasi militare; Acqua porta flessibilità emotiva e un\'intuizione che guida la corsa; Legno espande la rete sociale e l\'ottimismo naturale; Fuoco accende un carisma trascinante e una leadership istintiva; Terra porta radicamento, rendendoti più affidabile senza spegnere la velocità.',
    ombra:'La tua ombra è il Topo. Disprezzi il calcolo, la furbizia, l\'attesa strategica. Ma quella capacità di pianificare nel dettaglio che chiami meschinità è la differenza tra una corsa e una rotta — qualcosa che la tua pura spinta in avanti a volte ignora.'
  },

      <path d="M68 88 Q72 100 70 108" stroke="#7aaa88" strokeWidth="1" strokeLinecap="round"/>
    </svg>,
    istinto:'Senti il mondo attraverso la bellezza. Dove altri vedono ostacoli, tu vedi texture, sfumature, possibilità di armonia. La tua forza non è nella forza bruta ma nella capacità di trasformare la difficoltà in qualcosa di tollerabile, persino bello. Questo è un potere creativo che molti scambiano per fragilità.',
    elemento_base:'Sei fatta di sensibilità e creatività, e l\'elemento modula come le esprimi: Metallo aggiunge eleganza e gusto estetico elevato; Acqua porta profondità emotiva e capacità di connessione quasi mistica; Legno amplifica creatività e idealismo; Fuoco porta calore e generosità espansiva; Terra radica la sensibilità in qualcosa di concreto, affidabile, costruttivo.',
    ombra:'La tua ombra è il Bue. Disprezzi la rigidità, la routine, l\'apparente mancanza di fantasia. Ma quella costanza inflessibile che giudichi come ottusità è la capacità di portare a termine ciò che si inizia — qualcosa che la tua natura sensibile e mutevole a volte abbandona a metà strada.'
  },

    </svg>,
    istinto:'La tua mente non si ferma mai. Vedi connessioni dove gli altri vedono caos, trovi soluzioni brillanti mentre il problema si sta ancora formando. Di fronte alla crisi sei già al passo successivo. Questo non è cinismo — è il modo in cui la tua intelligenza si prende cura di te e di chi ti sta intorno.',
    elemento_base:'Sei un\'intelligenza in continua espansione. L\'elemento definisce dove si concentra questa vivacità: Metallo aggiunge strategia e acutezza quasi spietata; Acqua porta creatività associativa e intuizione; Legno apre l\'entusiasmo e la voglia di esplorare; Fuoco porta un carisma brillante e comunicativo; Terra ancora l\'agilità mentale in qualcosa di costruttivo e affidabile.',
    ombra:'La tua ombra è la Tigre. Disprezzi l\'impulsività, l\'attacco frontale, la semplicità un po\' rozza dell\'azione diretta. Ma quella capacità di agire con coraggio senza calcolare il rischio che chiami sconsideratezza è la libertà di essere completamente se stessi — qualcosa che la tua mente tattica raramente si concede.'
  },

    istinto:'Vedi chiaramente ciò che gli altri preferiscono non guardare e lo dici. Questa franchezza ti costa in termini di popolarità ma ti guadagna qualcosa di più raro: la reputazione di essere qualcuno su cui contare. La tua cura per i dettagli, la tua puntualità, la tua precisione non sono rigidità — sono la forma di rispetto che offri al mondo.',
    elemento_base:'Sei un essere di standard elevati e l\'elemento modula come li esprimi: Metallo aggiunge determinazione e un\'integrità quasi inflessibile; Acqua porta adattabilità e capacità di leggere le persone; Legno apre generosità e spirito collaborativo; Fuoco porta un\'espressività brillante e sicurezza carismatica; Terra radica l\'acutezza in affidabilità e senso pratico.',
    ombra:'La tua ombra è il Coniglio. Disprezzi l\'ambiguità, la risposta elusiva, la pace comprata a prezzo del silenzio. Ma quella grazia diplomatica che chiami mancanza di spina dorsale è la capacità di preservare le relazioni senza distruggerle — qualcosa che la tua franchezza a volte trascura.'
  },

function getDruidTree(bday){
  if(!bday)return'quercia';
  const d=new Date(bday+'T12:00:00'),m=d.getMonth()+1,day=d.getDate();
  if((m===12&&day>=24)||(m===1&&day<=20))return'betulla';
  if((m===1&&day>=21)||(m===2&&day<=17))return'sorbo';
  if((m===2&&day>=18)||(m===3&&day<=17))return'frassino';
  if((m===3&&day>=18)||(m===4&&day<=14))return'ontano';
  if((m===4&&day>=15)||(m===5&&day<=12))return'salice';
  if((m===5&&day>=13)||(m===6&&day<=9))return'biancospino';
  if((m===6&&day>=10)||(m===7&&day<=7))return'quercia';
  if((m===7&&day>=8)||(m===8&&day<=4))return'agrifoglio';
  if((m===8&&day>=5)||(m===9&&day<=1))return'nocciolo';
  if((m===9&&day>=2)&&day<=29)return'vite';
  if((m===9&&day===30)||(m===10)||(m===10&&day<=27))return'edera';
  if((m===10&&day>=28)||(m===11&&day<=24))return'canna';
  if((m===11&&day>=25)||(m===12&&day<=23))return'sambuco';
  return'quercia';
}

function DruidView({t,profile,onBack}){
  const [phase,setPhase]=useState('forest');
  const treeKey=getDruidTree(profile.birthday);
  const tree=DRUID_TREES[treeKey];
  const col=tree.col;

  useEffect(()=>{
    if(phase==='reveal'){
      const timer=setTimeout(()=>setPhase('card'),900);
      return()=>clearTimeout(timer);
    }
  },[phase]);

  const card={background:'#ffffff',border:'1px solid rgba(31,31,36,0.10)',borderRadius:16,boxShadow:'0 2px 8px rgba(0,0,0,0.06),0 0 0 0.5px rgba(0,0,0,0.03)'};

  /* ── FASE 1: INVITO ── */
  if(phase==='forest'){
    return(
      <div style={{minHeight:'100vh',background:'#f2f2f7',color:'#1f1f24',display:'flex',flexDirection:'column',overflowY:'auto',paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 80px)'}}>
        <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0}}>
          {[...Array(20)].map((_,i)=>(
            <div key={i} style={{position:'absolute',width:1.5,height:1.5,borderRadius:'50%',background:`rgba(31,31,36,${i%3===0?0.07:0.04})`,top:`${(i*43+17)%100}%`,left:`${(i*71+11)%100}%`,animation:`pulse ${2+(i*0.31)%2.5}s ${(i*0.19)%2.5}s ease-in-out infinite`}}/>
          ))}
        </div>
        <div style={{position:'relative',zIndex:1,maxWidth:640,margin:'0 auto',padding:'0 16px',width:'100%',flex:1,display:'flex',flexDirection:'column'}}>
          <div style={{padding:'calc(env(safe-area-inset-top,0px) + 14px) 4px 0'}}>
            <button onClick={onBack} style={{color:'rgba(31,31,36,0.45)',fontFamily:"'Inter',sans-serif",fontSize:'11px',fontWeight:400,letterSpacing:'.14em',padding:'12px 4px',background:'none',border:'none',cursor:'pointer'}}>← indietro</button>
          </div>
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 0 60px',textAlign:'center'}}>
            <div className="gold-text" style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(9px,2.4vw,11px)',fontWeight:500,letterSpacing:'.52em',textTransform:'uppercase',marginBottom:32}}>ARCANA · CALENDARIO CELTICO</div>
            {/* Goccia d'ambra */}
            <div onClick={()=>setPhase('reveal')} style={{width:72,height:72,borderRadius:'50% 50% 50% 50% / 60% 60% 40% 40%',background:`radial-gradient(circle at 40% 35%,rgba(210,160,40,0.85),rgba(160,100,20,0.65))`,boxShadow:'0 8px 32px rgba(180,130,20,0.25),0 2px 8px rgba(180,130,20,0.15)',marginBottom:40,animation:'pulse 2.8s ease-in-out infinite',cursor:'pointer',flexShrink:0}}/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(26px,7vw,38px)',fontWeight:400,fontStyle:'italic',color:'#1f1f24',lineHeight:1.4,marginBottom:16,maxWidth:300}}>C'è una radice<br/>che porta il tuo nome.</div>
            <div style={{width:36,height:1,background:'linear-gradient(to right,transparent,rgba(200,165,80,0.55),transparent)',margin:'0 auto 20px'}}/>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:'10px',letterSpacing:'.28em',color:'rgba(31,31,36,0.35)',textTransform:'uppercase',marginBottom:48}}>Il bosco conosce la tua data di nascita</div>
            <button onClick={()=>setPhase('reveal')} style={{padding:'14px 36px',background:'#1f1f24',color:'#f2f2f7',fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(16px,4.2vw,19px)',fontStyle:'italic',fontWeight:500,letterSpacing:'.04em',borderRadius:100,border:'none',cursor:'pointer',boxShadow:'0 4px 20px rgba(0,0,0,0.15)'}}>Scopri il tuo Albero Sacro</button>
          </div>
        </div>
      </div>
    );
  }

  /* ── FASE 2: REVEAL ── */
  if(phase==='reveal'){
    return(
      <div style={{minHeight:'100vh',background:'#f2f2f7',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <div style={{width:80,height:80,borderRadius:'50%',background:`radial-gradient(circle,${col}cc,${col}44,transparent 75%)`,margin:'0 auto 24px',animation:'pulse 0.6s ease-out',boxShadow:`0 0 40px ${col}60`}}/>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(20px,5vw,26px)',fontStyle:'italic',color:'rgba(31,31,36,0.55)'}}>Il bosco rivela…</div>
        </div>
      </div>
    );
  }

  /* ── FASE 3: CARTA COMPLETA ── */
  return(
    <div style={{minHeight:'100vh',background:'#f2f2f7',color:'#1f1f24',overflowY:'auto',paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 80px)'}}>
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0}}>
        {[...Array(20)].map((_,i)=>(
          <div key={i} style={{position:'absolute',width:1.5,height:1.5,borderRadius:'50%',background:`rgba(31,31,36,${i%3===0?0.07:0.04})`,top:`${(i*43+17)%100}%`,left:`${(i*71+11)%100}%`,animation:`pulse ${2+(i*0.31)%2.5}s ${(i*0.19)%2.5}s ease-in-out infinite`}}/>
        ))}
      </div>
      <div style={{position:'relative',zIndex:1,maxWidth:640,margin:'0 auto',padding:'0 16px'}}>

        {/* NAV */}
        <div style={{padding:'calc(env(safe-area-inset-top,0px) + 14px) 4px 0'}}>
          <button onClick={onBack} style={{color:'rgba(31,31,36,0.45)',fontFamily:"'Inter',sans-serif",fontSize:'11px',fontWeight:400,letterSpacing:'.14em',padding:'12px 4px',background:'none',border:'none',cursor:'pointer'}}>← indietro</button>
        </div>

        {/* HEADER */}
        <div style={{textAlign:'center',padding:'clamp(18px,5vw,32px) 0 24px'}}>
          <div className="gold-text" style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(9px,2.4vw,11px)',fontWeight:500,letterSpacing:'.52em',textTransform:'uppercase',marginBottom:14}}>ARCANA · CALENDARIO OGHAMICO</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(34px,9vw,52px)',fontWeight:500,color:'#1f1f24',letterSpacing:'-.02em',lineHeight:1,marginBottom:6}}>{tree.nome}</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(13px,3.5vw,16px)',fontStyle:'italic',color:'rgba(31,31,36,0.45)',marginBottom:12}}>{tree.epiteto}</div>
          <div style={{width:36,height:1,background:'linear-gradient(to right,transparent,rgba(200,165,80,0.55),transparent)',margin:'0 auto 10px'}}/>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:'9px',letterSpacing:'.28em',color:'rgba(31,31,36,0.32)',textTransform:'uppercase'}}>{tree.range} · {tree.ogham}</div>
        </div>

        {/* RADICI */}
        <div style={{...card,marginBottom:10,padding:'22px 22px 20px'}} className="fade-in-up">
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(15px,4vw,18px)',fontWeight:600,color:'#1f1f24'}}>Le Radici</div>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:'9px',letterSpacing:'.16em',color:'rgba(31,31,36,0.35)',textTransform:'uppercase',marginLeft:'auto'}}>Passato · Inconscio</div>
          </div>
          <div style={{width:'100%',height:'1px',background:'rgba(31,31,36,0.07)',marginBottom:14}}/>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(16px,4.2vw,19px)',fontWeight:400,color:'#1f1f24',lineHeight:1.9,fontStyle:'italic'}}>{tree.radici}</div>
        </div>

        {/* TRONCO */}
        <div style={{...card,marginBottom:10,padding:'22px 22px 20px'}} className="fade-in-up">
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(15px,4vw,18px)',fontWeight:600,color:'#1f1f24'}}>Il Tronco</div>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:'9px',letterSpacing:'.16em',color:'rgba(31,31,36,0.35)',textTransform:'uppercase',marginLeft:'auto'}}>Presente · Volontà</div>
          </div>
          <div style={{width:'100%',height:'1px',background:'rgba(31,31,36,0.07)',marginBottom:14}}/>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(16px,4.2vw,19px)',fontWeight:400,color:'#1f1f24',lineHeight:1.9,fontStyle:'italic'}}>{tree.tronco}</div>
        </div>

        {/* RAMI */}
        <div style={{...card,marginBottom:28,padding:'22px 22px 20px'}} className="fade-in-up">
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(15px,4vw,18px)',fontWeight:600,color:'#1f1f24'}}>I Rami</div>

function getSunSign(bday){
  if(!bday)return'';
  const d=new Date(bday+'T12:00:00'),m=d.getMonth()+1,day=d.getDate();
  if((m===3&&day>=21)||(m===4&&day<=19))return'Ariete';
  if((m===4&&day>=20)||(m===5&&day<=20))return'Toro';
  if((m===5&&day>=21)||(m===6&&day<=20))return'Gemelli';
  if((m===6&&day>=21)||(m===7&&day<=22))return'Cancro';
  if((m===7&&day>=23)||(m===8&&day<=22))return'Leone';
  if((m===8&&day>=23)||(m===9&&day<=22))return'Vergine';
  if((m===9&&day>=23)||(m===10&&day<=22))return'Bilancia';
  if((m===10&&day>=23)||(m===11&&day<=22))return'Scorpione';
  if((m===11&&day>=23)||(m===12&&day<=21))return'Sagittario';
  if((m===12&&day>=22)||(m===1&&day<=19))return'Capricorno';
  if((m===1&&day>=20)||(m===2&&day<=18))return'Acquario';
  return'Pesci';
}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"calc(env(safe-area-inset-top,0px) + 14px) 4px 0"}}>
          <button onClick={onBack} style={{color:"rgba(31,31,36,0.45)",fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:400,letterSpacing:".14em",padding:"12px 4px",background:"none",border:"none",cursor:"pointer"}}>← indietro</button>
          <button onClick={onEdit} style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:500,letterSpacing:".22em",textTransform:"uppercase",color:t.accent,border:`1px solid ${t.accent}44`,padding:"9px 16px",background:"none",borderRadius:3,cursor:"pointer"}}>modifica</button>
        </div>

        {/* ── HEADER ── */}
        <div style={{textAlign:"center",padding:"clamp(28px,7vw,44px) 0 32px"}}>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",fontWeight:400,letterSpacing:".32em",color:"rgba(31,31,36,0.38)",textTransform:"uppercase",marginBottom:10}}>{dateIt}</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(30px,8vw,42px)",fontWeight:500,color:"#1f1f24",letterSpacing:"-.02em",lineHeight:1,marginBottom:8}}>Oroscopo del Giorno</div>
          <div style={{width:36,height:1,background:`linear-gradient(to right,transparent,rgba(${sunSg.rgb},0.5),transparent)`,margin:"0 auto 12px"}}/>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(16px,4.5vw,20px)",fontWeight:300,fontStyle:"italic",color:"rgba(31,31,36,0.52)",marginBottom:10}}>{greeting}, {profile.name}</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(30px,8.5vw,46px)",fontWeight:600,color:`rgba(${sunSg.rgb},0.9)`,lineHeight:1.05,letterSpacing:".01em",marginBottom:10}}>{sunSg.name}</div>
        </div>

        {/* ── TRINITÀ ── */}
        <div style={{marginBottom:10}}>
          <div style={{...secLabel,marginBottom:12,paddingLeft:2}}>Trinità celeste</div>
          <div style={{display:"flex",gap:8}}>
            {trinity.map(({sg:s,label,icon})=>(
              <div key={s.key} style={{flex:1,...card,padding:"16px 10px 14px",textAlign:"center"}}>
                <div style={{display:'flex',justifyContent:'center',marginBottom:9}}>
                  <ZodiacGlyph sgKey={s.key} size={64}/>
                </div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"clamp(11px,3vw,13px)",fontWeight:600,color:"#1f1f24",marginBottom:4}}>{s.name}</div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",fontWeight:400,letterSpacing:".18em",color:"rgba(31,31,36,0.35)",textTransform:"uppercase"}}>{label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* CTA */}
        <button onClick={onProfile} style={{width:"100%",marginBottom:28,padding:"18px 24px",border:"none",background:`linear-gradient(135deg,${t.accent},rgba(148,108,28,0.95))`,color:"#fff",fontFamily:"'Cormorant Garamond',serif",fontSize:"17px",fontWeight:500,letterSpacing:".18em",textTransform:"uppercase",borderRadius:100,cursor:"pointer",boxShadow:`0 6px 24px ${t.accent}44`,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <span style={{opacity:.75,fontSize:"14px"}}>✦</span>
          <span>Carta Natale Archetipica</span>
          <span style={{opacity:.75,fontSize:"14px"}}>✦</span>
        </button>

        {/* ── SECTION: oroscopo ── */}
        <div style={{...secLabel,marginBottom:14,paddingLeft:2}}>Il tuo oroscopo di oggi</div>

        {/* 4 categorie */}
        {CATS.map((cat,ci)=>{
          const d=horo[cat.key];
          return(
            <div key={cat.key} style={{marginBottom:10,...card}}>
              <div style={{padding:"24px 20px 22px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                  {cat.img
                    ?<img src={cat.img} alt={cat.label} style={{width:64,height:"auto",objectFit:"contain",flexShrink:0}}/>
                    :<span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"56px",color:cat.col,lineHeight:1,flexShrink:0}}>{cat.icon}</span>}
                  <div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"15px",fontWeight:500,letterSpacing:".28em",textTransform:"uppercase",color:cat.col,marginBottom:8}}>{cat.label}</div>
                    <div style={{display:"flex",gap:5}}>
                      {[1,2,3,4,5].map(n=>(
                        <div key={n} style={{width:7,height:7,borderRadius:"50%",background:n<=d.stars?cat.col:"rgba(31,31,36,0.1)"}}/>
                      ))}
                    </div>
                  </div>
                </div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(17px,4.4vw,20px)",fontWeight:400,color:"#1f1f24",lineHeight:1.85}}>{d.text}</div>
              </div>
            </div>
          );
        })}

        {/* ── SECTION: cielo ── */}
        <div style={{...secLabel,marginTop:28,marginBottom:14,paddingLeft:2}}>Cielo di oggi</div>

        {/* prossimo evento */}
        <div style={{marginBottom:10,...card}}>
          <div style={{padding:"18px 20px"}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
              <div style={{width:48,height:48,borderRadius:12,background:`${nextEv.col}15`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"24px",color:nextEv.col,lineHeight:1}}>{nextEv.icon}</span>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"13px",fontWeight:600,color:"#1f1f24",marginBottom:2}}>{nextEv.n}</div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"rgba(60,60,67,0.5)"}}>
                  {new Date(nextEv.d+"T12:00:00").toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}
                </div>
              </div>
              <div style={{padding:"6px 14px",background:`${nextEv.col}14`,borderRadius:20,flexShrink:0}}>
                <span style={{fontFamily:"'Inter',sans-serif",fontSize:"12px",fontWeight:600,color:nextEv.col}}>
                  {nextEv.daysAway===0?"oggi":nextEv.daysAway===1?"domani":`${nextEv.daysAway}g`}
                </span>
              </div>
            </div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(15px,4vw,18px)",fontStyle:"italic",color:"rgba(60,60,67,0.65)",lineHeight:1.72}}>{nextEv.desc}</div>
          </div>
        </div>

        {/* fase lunare */}
        <div style={{marginBottom:10,...card}}>
          <div style={{padding:"18px 20px"}}>
            <div style={{...secLabel,marginBottom:14}}>Fase Lunare</div>
            <div style={{display:"flex",gap:16,alignItems:"center"}}>
              <div style={{flexShrink:0}}><MoonSVG pd={lunar.pd}/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"16px",fontWeight:600,color:"#1f1f24",marginBottom:6}}>{lunar.name}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(14px,3.8vw,17px)",fontStyle:"italic",color:"rgba(60,60,67,0.6)",lineHeight:1.68,marginBottom:12}}>{lunar.desc}</div>
                <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 14px",background:`${t.accent}12`,borderRadius:20}}>
                  <span style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:500,color:t.accent}}>{lunar.nextEvent.type} tra {lunar.nextEvent.days}g</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* bioritmi */}
        <div style={{marginBottom:10,...card}}>
          <div style={{padding:"18px 20px"}}>
            <div style={{...secLabel,marginBottom:14}}>Bioritmi Settimanali</div>
            <BioChart birthday={profile.birthday} dateStr={dateStr} t={localT}/>
          </div>
        </div>

        {/* numeri fortunati */}
        <div style={{marginBottom:24,...card}}>
          <div style={{padding:"18px 20px 22px"}}>
            <div style={{...secLabel,marginBottom:18}}>Numeri della Settimana</div>
            <div style={{display:"flex",gap:10,flexWrap:"nowrap",overflowX:"auto",paddingBottom:2,msOverflowStyle:"none",scrollbarWidth:"none"}}>
              {lucky.map((n,i)=>(
                <div key={n} style={{width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,borderRadius:"50%",background:i===0?t.accent:`rgba(31,31,36,${i===1?0.08:0.05})`,border:`1.5px solid ${i===0?t.accent:i===1?"rgba(31,31,36,0.14)":"rgba(31,31,36,0.07)"}`,boxShadow:i===0?`0 4px 16px ${t.accent}38`:"",transition:"transform .2s cubic-bezier(.16,1,.3,1)"}} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:i===0?"20px":i===1?"17px":"15px",fontWeight:i===0?600:400,color:i===0?"#ffffff":`rgba(31,31,36,${i===1?0.65:0.38})`,lineHeight:1}}>{n}</span>
                </div>
              ))}
            </div>
            <div style={{marginTop:16,fontFamily:"'Cormorant Garamond',serif",fontSize:"13px",fontStyle:"italic",color:"rgba(60,60,67,0.4)",textAlign:"center"}}>Calcolati in base al tuo segno e al ciclo settimanale</div>
          </div>
        </div>

      </div>
    </div>
  );
}

function App(){
  const[view,setView]=useState("home");
  const[selected,setSelected]=useState(null);
  const[theme,setTheme]=useState("carta");
  const[splash,setSplash]=useState(true);
  const[journal,setJournal]=useState({});
  const[profile,setProfile]=useState(null);
  const[setupDone,setSetupDone]=useState(false); // kept for compat
  const t=THEMES[theme];
  useCandleLight();

  useEffect(()=>{
    try{
      const s=localStorage.getItem("arcana_v3");if(s)setJournal(JSON.parse(s));
      const p=localStorage.getItem("arcana_profile");if(p){setProfile(JSON.parse(p));setSetupDone(true);}
    }catch(e){}
  },[]);
  useEffect(()=>{document.body.style.background=t.bg},[t.bg]);
  useEffect(()=>{
    if(typeof history!=='undefined'&&'scrollRestoration' in history)history.scrollRestoration='manual';
    const id=requestAnimationFrame(()=>requestAnimationFrame(()=>window.scrollTo(0,0)));
    return()=>cancelAnimationFrame(id);
  },[view]);

  const saveEntry=useCallback((sKey,tab,text)=>{
    setJournal(prev=>{
      const u={...prev,[`${toKey()}_${sKey}_${tab}`]:text};
      try{localStorage.setItem("arcana_v3",JSON.stringify(u))}catch(e){}
      return u;
    });
  },[]);

  const onSetupDone=useCallback((p)=>{setProfile(p);setSetupDone(true);setView("daily");},[]);

  return(
    <div style={{background:t.bg,color:t.text,minHeight:"100vh"}}>
      {splash&&<Splash onDone={()=>setSplash(false)} bg={t.bg} text={t.text}/>}
      {!splash&&view==="setup"&&<ProfileSetup t={t} onDone={onSetupDone} onBack={()=>setView("home")}/>}
      {!splash&&view==="home"&&<Home t={t} profile={profile} onSelect={s=>{setSelected(s);setView("sign")}} onSetup={()=>setView("setup")}/>}
      {!splash&&view==="hub"&&<HomeHub t={t} setView={setView} profile={profile}/>}
      {!splash&&view==="daily"&&profile&&<DailyHoroscope t={t} profile={profile} onBack={()=>setView("hub")} onProfile={()=>setView("profile")} onEdit={()=>setView("setup")}/>}
      {!splash&&view==="natale"&&profile&&<TemanataleView t={t} profile={profile} onBack={()=>setView("hub")}/>}
      {!splash&&view==="sogni"&&profile&&<SogniView t={t} profile={profile} onBack={()=>setView("hub")}/>}
      {!splash&&view==="compatibilita"&&profile&&<CompatibilitaView t={t} profile={profile} onBack={()=>setView("hub")}/> }
      {!splash&&view==="cinese"&&profile&&<ChineseView t={t} profile={profile} onBack={()=>setView("hub")}/> }
      {!splash&&view==="druido"&&profile&&<DruidView t={t} profile={profile} onBack={()=>setView("hub")}/>}
      {!splash&&view==="tarocchi"&&<Tarocchi t={t} setView={setView}/>}
      {!splash&&view==="grimorio"&&<GrimorioView onBack={()=>setView("tarocchi")}/>}
      {!splash&&view==="meditazione"&&<Meditazione onBack={()=>setView("hub")}/>}
      {!splash&&view==="profile"&&profile&&<PersonalProfile t={t} profile={profile} onEdit={()=>setView("setup")} onBack={()=>setView("daily")}/>}
      {!splash&&view==="sign"&&selected&&<SignScreen sg={selected} t={t} onBack={()=>setView("home")} journal={journal} saveEntry={saveEntry}/>}
      {!splash&&view!=="setup"&&<ThemeBtn theme={theme} setTheme={setTheme} t={t}/>}
      {!splash&&<BottomNav view={view} setView={setView} t={t} profile={profile}/>}
    </div>
  );
}

const _root=ReactDOM.createRoot(document.getElementById("root"));
_root.render(<App/>);
// Dismiss static loader once React is up
requestAnimationFrame(()=>{
  const el=document.getElementById("arcana-loader");
  if(el){el.style.opacity="0";setTimeout(()=>{el.style.display="none";},900);}
});
</script>
</body>
</html>
