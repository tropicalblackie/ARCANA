    dono:    "La capacità di sentire ciò che gli altri non osano ammettere. La compassione come forma di intelligenza. Il dono di tenere lo spazio per l'impossibile senza farlo crollare.",
    eros:    "Ama con la totalità dell'oceano. Il desiderio di Pesci è per la fusione, per il dissolversi nell'altro. Ha bisogno di confini non per proteggersi ma per non perdersi del tutto.",
    karma:   "Imparare che avere confini è un atto d'amore, non di egoismo. Che la propria esistenza separata ha valore. Che scegliere sé stessi non è abbandonare gli altri.",
    rituale: "La mattina, prima di alzarti, rimani per cinque minuti nel corpo. Senti il peso, il calore, i confini della tua pelle. Questo sei tu — separato, reale, presente."

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const getTodayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const getPlanetaryDay = () => ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'][new Date().getDay()];
const getSeason = () => {
  const m = new Date().getMonth()+1;
  if(m>=3&&m<=5) return 'Primavera';
  if(m>=6&&m<=8) return 'Estate';
  if(m>=9&&m<=11) return 'Autunno';
  return 'Inverno';
};
const getLunarPhase = () => {
  const d = new Date().getDate();
  return d<=7?'Luna Nuova':d<=14?'Luna Crescente':d<=21?'Luna Piena':'Luna Calante';
};
const getEntryAngle = () => {
  const seed = new Date().getDate() + new Date().getMonth()*31;
  const angles = [
    'il punto di rottura tra ciò che eri e ciò che stai diventando',
    'la ferita che non hai mai mostrato a nessuno',
    'il desiderio che dici di non avere',
    'il ricordo che torna senza avvertire',
    'la paura che ti sveglia alle tre di notte',
    'la forza che non sai di possedere',
    'la verità che stai evitando di dire'
  ];
  return angles[seed % angles.length];
};

// ═══════════════════════════════════════════
// STAR FIELD
// ═══════════════════════════════════════════
function StarField({ color='#ffffff', count=80 }) {
  const stars = useMemo(() => Array.from({ length: count }, (_, i) => ({
    id: i,
    x: Math.random() * 100,
    y: Math.random() * 100,
    size: Math.random() * 2 + 0.5,
    delay: Math.random() * 5,
    duration: Math.random() * 3 + 2,
  })), []);
  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden', pointerEvents:'none' }}>
      {stars.map(s => (
        <div key={s.id} style={{
          position:'absolute', left:`${s.x}%`, top:`${s.y}%`,
          width:s.size, height:s.size, borderRadius:'50%', background:color,
          animation:`twinkle ${s.duration}s ${s.delay}s ease-in-out infinite`
        }} />
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════
// JOURNAL TAB
// ═══════════════════════════════════════════
function JournalTab({ sign, tab, t, entry, onSave }) {
  const [value, setValue] = useState(entry);
  const [saved, setSaved] = useState(false);
  const timer = useRef(null);
  useEffect(() => { setValue(entry); }, [entry]);
  const handleChange = e => {
    setValue(e.target.value);
    setSaved(false);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => { onSave(e.target.value); setSaved(true); }, 900);
  };
  if(!tab) return null;
  const wordCount = value.trim() ? value.trim().split(/\s+/).length : 0;
  return (
    <div style={{ maxWidth:'680px', margin:'0 auto', padding:'48px 24px 96px' }}>
      <div style={{ marginBottom:'40px' }}>
        <div style={{ fontSize:'9px', letterSpacing:'0.3em', color:t.textMuted, textTransform:'uppercase', marginBottom:'10px' }}>
          {tab.hint}
        </div>
        <div style={{
          fontFamily:"'Cormorant Garamond', serif",
          fontSize:'clamp(22px, 5vw, 30px)', fontStyle:'italic',
          color:t.text, lineHeight:1.4
        }}>
          {tab.question}
        </div>
      </div>
      <div style={{ borderBottom:`1px solid ${t.border}` }}>
        <textarea
          value={value} onChange={handleChange}
          placeholder="Scrivi qui…" rows={10}
          style={{
            width:'100%', background:'transparent', color:t.text,
            fontSize:'16px', lineHeight:1.9, padding:'16px 0',
            caretColor:sign.color, placeholderColor:t.textMuted
          }}
        />
        <div style={{ display:'flex', justifyContent:'space-between', paddingBottom:'10px' }}>
          <span style={{ fontSize:'10px', color:t.textMuted }}>
            {wordCount > 0 ? `${wordCount} ${wordCount===1?'parola':'parole'}` : ''}
          </span>
          {saved && <span style={{ fontSize:'10px', color:sign.color, letterSpacing:'0.12em' }}>salvato ✓</span>}
        </div>
      </div>
    </div>
  );
}

            </div>
          </div>

      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// SMALL UI PRIMITIVES
// ═══════════════════════════════════════════
function Section({ label, accent, children }) {
  return (
    <div style={{ marginBottom:'44px' }}>
      <Micro label={label} accent={accent} />
      <div style={{ marginTop:'16px' }}>{children}</div>
    </div>
  );
}
function Micro({ label, accent }) {
  return (
    <div style={{ fontSize:'9px', letterSpacing:'0.3em', color:accent, textTransform:'uppercase' }}>
      {label}
    </div>
  );
}
function Quote({ t, border, children, style }) {
  return (
    <div style={{
      fontFamily:"'Cormorant Garamond', serif", fontSize:'20px', fontStyle:'italic',
      color:t.text, lineHeight:1.7,
      borderLeft: border ? `2px solid ${border}40` : 'none',
      paddingLeft: border ? '20px' : 0,
      ...style
    }}>
      {children}
    </div>
  );
}
function Body({ t, children }) {
  return (
    <div style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:'18px', color:t.text, lineHeight:1.75, opacity:0.9 }}>
      {children}
    </div>
  );
}
function Card({ t, children, style }) {
  return (
    <div style={{ padding:'24px', background:t.surface, border:`1px solid ${t.border}`, ...style }}>
      {children}
    </div>
  );
}
function Hr({ t }) {
  return <div style={{ width:'100%', height:'1px', background:t.border, margin:'44px 0' }} />;
}

// ═══════════════════════════════════════════
// THEME SWITCHER
// ═══════════════════════════════════════════
function ThemeSwitcher({ theme, setTheme, t }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ position:'fixed', bottom:'24px', right:'24px', zIndex:100 }}>
      {open && (
        <div style={{
          position:'absolute', bottom:'48px', right:0,
          background:t.card, border:`1px solid ${t.border}`,
          boxShadow:'0 8px 32px rgba(0,0,0,0.4)'
        }}>
          {Object.entries(THEMES).map(([key, th]) => (
            <button key={key} onClick={() => { setTheme(key); setOpen(false); }} style={{
              display:'block', width:'100%', padding:'12px 24px',
              fontSize:'10px', letterSpacing:'0.2em', textTransform:'uppercase',
              color: theme===key ? t.accent : t.textMuted,
              textAlign:'left', whiteSpace:'nowrap',
              borderBottom:`1px solid ${t.border}`
            }}>
              {th.name}
            </button>
          ))}
        </div>
      )}
      <button onClick={() => setOpen(!open)} style={{
        width:'38px', height:'38px', borderRadius:'50%',
        background:t.card, border:`1px solid ${t.border}`,
        color:t.textMuted, fontSize:'16px',
        display:'flex', alignItems:'center', justifyContent:'center',
        boxShadow:'0 2px 12px rgba(0,0,0,0.3)'
      }}>
        ◎
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════
function App() {
  const [view, setView] = useState('home');
  const [selectedSign, setSelectedSign] = useState(null);
  const [theme, setTheme] = useState('dark');
  const [journalEntries, setJournalEntries] = useState({});
  const t = THEMES[theme];

  useEffect(() => {
    try { const s = localStorage.getItem('arcana_journal'); if(s) setJournalEntries(JSON.parse(s)); } catch(e) {}
  }, []);

  const saveEntry = useCallback((signKey, tab, text) => {
    setJournalEntries(prev => {
      const updated = { ...prev, [`${getTodayKey()}_${signKey}_${tab}`]: text };
      try { localStorage.setItem('arcana_journal', JSON.stringify(updated)); } catch(e) {}
      return updated;
    });
  }, []);

  useEffect(() => { document.body.style.background = t.bg; }, [t.bg]);

  return (
    <div style={{ background:t.bg, color:t.text, minHeight:'100vh' }}>
      {view==='home' && (
        <HomeScreen t={t} onSelectSign={sign => { setSelectedSign(sign); setView('sign'); }} />
      )}
      {view==='sign' && selectedSign && (
        <SignScreen
          sign={selectedSign} t={t}
          onBack={() => setView('home')}
          journalEntries={journalEntries}
          saveEntry={saveEntry}
        />
      )}
      <ThemeSwitcher theme={theme} setTheme={setTheme} t={t} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
