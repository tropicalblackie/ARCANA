<style>

@keyframes card-in{0%{opacity:0;transform:translateY(62px) scale(.92)}62%{transform:translateY(-8px) scale(1.018)}80%{transform:translateY(3px) scale(.998)}100%{opacity:1;transform:translateY(0) scale(1)}}

<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo,memo}=React;

const SIGNS=[
{key:"ariete",name:"Ariete",symbol:"♈",element:"Fuoco",modality:"Cardinale",archetype:"Il Guerriero",planet:"Marte",stone:"Rubino",metal:"Ferro",color:"#c83010",colorLight:"#ff6b40",darkBg:"#110202",rgb:[200,48,16],starColor:"#ff8a65",day:"Martedì",number:9,season:"Equinozio di Primavera",tarot:"L'Imperatore",myth:"Ares, dio della guerra",body:"Testa, cervello, occhi",img:"./IMG_1587.jpeg",
  backLogo:"./3a4e4867c176e489df7ad81117c33906.jpg",
  shadow:"L'aggressività come armatura. L'impulso come fuga dall'intimità.",
  light:"Il coraggio che apre porte che nessuno osa toccare. Inizia ciò che gli altri temono di sognare.",
  wound:"La paura di essere inutile, di non lasciare traccia. Il terrore che la propria fiamma si consumi nel vuoto.",
vision:"Un guerriero con la fronte insanguinata che avanza verso un muro di fuoco — non per vincere, ma per dimostrare a se stesso che esiste.",
voice:"Voce tagliente, ritmata come un tamburo di guerra. Frasi corte. Nessuna punteggiatura emotiva.",
secret:"L'astrologia ti dice che sei impulsivo. La verità è che hai paura del vuoto tra un impulso e l'altro. Il tuo fuoco brucia più forte quando nessuno guarda.",
essence:"Ariete è il primo respiro dopo il lungo inverno. Non è violenza — è l'urgenza pura della vita che si afferma. Vive nell'eterno adesso dell'azione perché aspettare sembra tradimento di ciò che è. Ha inventato il coraggio prima che il coraggio avesse un nome.",
depth:"Sotto l'armatura di Ariete vive uno dei cuori più vulnerabili dello zodiaco. La ferocità è proporzionale alla sensibilità nascosta. Ama con l'intensità di chi sa che ogni cosa può finire, e agisce con l'urgenza di chi non ha imparato ad aspettare senza soffrire.",
relationships:"In amore è un fuoco che può scaldare o bruciare. Ama con tutto il corpo, senza strategie né giochi. Il problema è che conquista con la stessa intensità con cui si annoia — non per leggerezza, ma perché ha bisogno di sentire che qualcosa è ancora vivo. L'antidoto è trovare qualcuno che sappia come riaccenderlo.",
growth:"Imparare che la forza vera non è nella velocità ma nella profondità. Che alcune battaglie si vincono stando fermi. Che il silenzio non è resa ma presenza. Che si può iniziare senza dover sempre finire per dimostrare qualcosa.",
karma:"Ariete porta nel sangue il karma del guerriero senza causa — colui che combatte per combattere, non per vincere qualcosa di reale. La lezione è usare la forza in servizio di qualcosa più grande di sé, senza perdere il proprio fuoco.",
ritual:"All'alba, accendi una candela rossa. Scrivi su carta ciò che vuoi bruciare via — il rimpianto, la rabbia, la paura. Guarda la fiamma. Quando senti il calore sul viso, sai di essere ancora vivo.",
compatibility:"Si accende con Leone e Sagittario, che capiscono il fuoco. Trova stimolo con Gemelli e Acquario. Si scontra con Cancro e Capricorno — ma spesso è da questi scontri che nasce la vera crescita.",
affirmation:"La mia velocità è un dono, non un difetto. Posso agire e anche sentire. Posso essere forte e anche morbido.",
symbol_meaning:"Il simbolo di Ariete raffigura le corna del montone — e la fiamma che sale. È il glifo del movimento verso l'alto, dell'io che si proietta nel mondo senza chiedere permesso."},

{key:"toro",name:"Toro",symbol:"♉",element:"Terra",modality:"Fisso",archetype:"Il Costruttore",planet:"Venere",stone:"Smeraldo",metal:"Rame",color:"#1a6228",colorLight:"#4caf50",darkBg:"#010d04",rgb:[26,98,40],starColor:"#81c784",day:"Venerdì",number:6,season:"Primavera Piena",tarot:"Il Ierofante",myth:"Il Minotauro, Persefone",body:"Gola, collo, tiroide",img:"./IMG_1581.jpeg",backLogo:"./0353717bee2b007846ed00dd4a4a336f.jpg",
shadow:"Il possesso come amore. La resistenza al cambiamento come identità.",
light:"La fedeltà come atto rivoluzionario. La cura del corpo come porta al sacro.",
wound:"La paura che tutto ciò che ha costruito possa svanire in un istante. Il terrore della perdita materiale come perdita di sé.",
vision:"Un toro che scalpita la terra, ma le corna sono fatte di radici profonde. Non combatte: ancora. Ogni passo è una fondamenta.",
voice:"Voce lenta, pesante, come pietre millenarie che rotolano. Frasi che si costruiscono mattone su mattone, senza fretta.",
secret:"L'astrologia ti dice che sei testardo. La verità è che hai paura che, se cedi anche una volta, tutto crolli. La tua fermezza non è ottusità — è il modo in cui ami.",
essence:"Toro è la terra sotto i piedi. La certezza del corpo, il sapore del pane appena sfornato, il calore di ciò che si tiene tra le mani. Esiste per ancorare il mondo alla realtà sensibile, per ricordare agli altri che esiste anche il qui, anche l'adesso, anche questo.",
depth:"Toro porta il peso della permanenza come dono e come croce. Il suo dolore nasce dalla consapevolezza che tutto passa — e il suo lavoro è costruire cose abbastanza solide da sopravvivergli. Sotto la calma esterna vive un'intensità emotiva che raramente mostra, perché mostrare significherebbe essere vulnerabile.",
relationships:"Ama con una fedeltà che spaventa chi non è abituato ad essere amato davvero. Il corpo è il suo linguaggio — il tocco, il cibo condiviso, il ritmo quotidiano costruito insieme. Ha bisogno di tempo per aprirsi, ma una volta aperto non si chiude più. La sfida è amare senza trattenere.",
growth:"Imparare che il distacco non è perdita ma libertà. Che la sicurezza vera non dipende da ciò che si possiede. Che il cambiamento trasforma, non distrugge. Che lasciare andare può essere l'atto di cura più grande.",
karma:"Toro porta il karma del guardiano che si è fatto prigioniero di ciò che custodisce. La lezione è tenere le cose con mani aperte — offrirle, non possederle.",
ritual:"Una volta a settimana, prepara un pasto solo per te. Siediti senza schermi. Mangia lentamente. Senti ogni sapore. Questo è il tuo rito di fondazione — il corpo come tempio.",
compatibility:"Armonia naturale con Vergine e Capricorno. Attrazione magnetica con Scorpione, il suo opposto. Connessione nutriente con Cancro e Pesci.",
affirmation:"Sono abbastanza solido da permettermi di cedere. Posso tenere e lasciare andare. La mia lentezza è saggezza.",
symbol_meaning:"Il simbolo del Toro raffigura la testa con le corna e il cerchio della luna piena tra esse. È il glifo della materia feconda, del corpo come luogo del sacro."},

{key:"gemelli",name:"Gemelli",symbol:"♊",element:"Aria",modality:"Mutevole",archetype:"Il Messaggero",planet:"Mercurio",stone:"Agata",metal:"Mercurio",color:"#9a7200",colorLight:"#ffd54f",darkBg:"#0e0b00",rgb:[154,114,0],starColor:"#fff176",day:"Mercoledì",number:5,season:"Fine Primavera",tarot:"Gli Amanti",myth:"Castore e Polluce, Hermes",body:"Polmoni, braccia, mani, sistema nervoso",img:"./IMG_1583.jpeg",backLogo:"./4592d3542e578ac0463ff10301d016ed.jpg",
shadow:"La volatilità come armatura contro il dolore. La parola usata per non sentire.",
light:"La mente come organo della libertà. Il dono di rendere comprensibile l'incomprensibile.",
wound:"La paura di essere solo una faccia di una moneta mai lanciata. Il terrore che entrambe le versioni di sé siano false.",
vision:"Due figure speculari che si guardano attraverso uno specchio frantumato. Non si riconoscono, ma non possono smettere di cercarsi. Tra i frammenti, il riflesso di qualcosa di reale.",
voice:"Voce che cambia registro ogni tre parole. Rapida, saltellante, piena di pause strategiche e deviazioni volute.",
secret:"L'astrologia ti dice che sei superficiale. La verità è che hai scavato così a fondo nella tua duplicità che la superficie è diventata profondità. La tua leggerezza è allenata — non è assenza di peso, è il modo in cui lo porti.",
essence:"Gemelli è il ponte tra mondi. Vive nel tempo della connessione, dello scambio, della parola che crea realtà. Non è mai una sola cosa perché il suo dono è vedere tutto contemporaneamente — non come confusione, ma come panorama.",
depth:"Il dolore di Gemelli nasce dalla molteplicità — essere tante cose e non sapere quale sia la vera. La verità è che tutte sono vere. La sua ricerca non è trovare il sé unico, ma imparare ad abitare la propria natura polifonica senza vergognarsene.",
relationships:"Ama con la mente prima che con il corpo. Seduce con le idee, con la promessa di mondi nuovi. Ha bisogno di stimolo intellettuale come dell'ossigeno — senza, soffoca silenziosamente. La sua paura più profonda è la solitudine intellettuale: essere con qualcuno che non capisce.",
growth:"Imparare a scegliere senza perdere. Che la profondità non esclude la vastità. Che restare non significa smettere di muoversi. Che il silenzio è anche una forma di comunicazione.",
karma:"Gemelli porta il karma del messaggero che ha usato le parole per tutto tranne che per dire la verità su se stesso. La lezione è la comunicazione come atto di coraggio, non di intrattenimento.",
ritual:"Scrivi due lettere: una da parte di chi sei, una da parte di chi vorresti essere. Non inviarle. Rileggile a distanza di un mese. La verità è nello spazio tra le due.",
compatibility:"Danza naturale con Bilancia e Acquario. Attrazione complessa con Sagittario, il suo opposto. Stimolo creativo con Ariete e Leone.",
affirmation:"La mia molteplicità è un dono. Posso essere tutto questo e ancora di più. Scegliere non mi impoverisce — mi approfondisce.",
symbol_meaning:"Il simbolo dei Gemelli raffigura due colonne unite — le porte del cielo e della terra, l'io e l'altro. È il glifo della dualità che cerca la propria sintesi."},

{key:"cancro",name:"Cancro",symbol:"♋",element:"Acqua",modality:"Cardinale",archetype:"La Madre",planet:"Luna",stone:"Perla",metal:"Argento",color:"#106e8a",colorLight:"#4dd0e1",darkBg:"#000c12",rgb:[16,110,138],starColor:"#b2ebf2",day:"Lunedì",number:2,season:"Solstizio d'Estate",tarot:"Il Carro",myth:"Selene, Demetra",body:"Seno, stomaco, sistema linfatico",img:"./IMG_1584.jpeg",backLogo:"./e6bce5b40710436d507ee4503557e301.jpg",
shadow:"La cura come controllo. Il passato come rifugio dalla vita presente.",
light:"La memoria come continuità del sacro. L'intuizione come sesto senso affinato dal dolore.",
wound:"La paura che il guscio non basti. Che il mondo esterno scopra quanto è fragile ciò che protegge.",
vision:"Un granchio che cammina all'indietro verso il mare, tenendo in una chela un cuore ancora pulsante. L'acqua sale. Il cuore batte più forte.",
voice:"Voce che fluttua come la marea. A volte sommersa, a volte in superficie. Parla in metafore liquide, in immagini che scivolano.",
secret:"L'astrologia ti dice che sei troppo sensibile. La verità è che hai imparato a sentire ciò che gli altri non osano. Non è debolezza — è un sistema di percezione così raffinato da essere quasi soprannaturale.",
essence:"Cancro è la memoria del mondo. Porta con sé tutto ciò che è stato amato, perduto, custodito. Il passato non è nostalgia — è la fondamenta su cui costruisce ogni presente. La casa, per Cancro, non è un luogo: è una sensazione.",
depth:"Il dolore di Cancro è antico. Viene da lontano — spesso dai propri genitori, dall'intera catena di dolori non elaborati che si tramandano nel sangue. La sua sensibilità non è acquisita: è ereditata. Il lavoro è sentire tutto questo senza esserne travolto, scegliere cosa tenere e cosa lasciare andare.",
relationships:"Ama con viscere, con totalità, con una devozione che può diventare soffocante se non trova il suo centro. Ha bisogno di sicurezza emotiva come condizione fondamentale — senza, si chiude nel guscio. La sfida è fidarsi abbastanza da mostrarsi anche quando fa paura.",
growth:"Imparare che proteggere non significa trattenere. Che il guscio deve aprirsi almeno una volta per essere vivo. Che essere amati richiede di essere visti — non solo la versione già approvata di sé stessi.",
karma:"Cancro porta il karma del guaritore che non ha mai imparato a farsi curare. La lezione è ricevere con la stessa grazia con cui si dà.",
ritual:"La notte di luna piena, scrivi il nome di qualcosa che non riesci a lasciare andare. Immergilo in una ciotola d'acqua salata. Guarda l'inchiostro dissolversi lentamente.",
compatibility:"Risonanza profonda con Scorpione e Pesci. Armonia con Toro e Vergine. Tensione creativa con Capricorno, il suo opposto.",
affirmation:"Posso sentire tutto questo e non annegare. La mia profondità è la mia forza. Sono abbastanza al sicuro da aprirmi.",
symbol_meaning:"Il simbolo del Cancro raffigura due spirali intrecciate — le chele del granchio, ma anche i cerchi della luna. È il glifo della protezione come forma d'amore."},

{key:"leone",name:"Leone",symbol:"♌",element:"Fuoco",modality:"Fisso",archetype:"Il Sovrano",planet:"Sole",stone:"Diamante",metal:"Oro",color:"#a86800",colorLight:"#ffd740",darkBg:"#0e0900",rgb:[168,104,0],starColor:"#ffcc80",day:"Domenica",number:1,season:"Cuore dell'Estate",tarot:"La Forza",myth:"Apollo, Eracle, il Re Sole",body:"Cuore, colonna vertebrale, dorso superiore",img:"./IMG_1585.jpeg",backLogo:"./95d3e0be55935c6807f16dcc724e729f.jpg",
shadow:"Il bisogno di approvazione mascherato da grandiosità. La paura del buio dietro la luce.",
light:"La generosità come stato naturale. Il cuore grande come atto politico.",
wound:"La paura che, se nessuno lo guarda, smetta di esistere. Il terrore dell'invisibilità più profondo del terrore della morte.",
vision:"Un leone che cammina su una savanna bruciata. La criniera è fatta di raggi di sole spenti. Ma gli occhi — gli occhi sono ancora accesi.",
voice:"Voce che riempie la stanza anche quando sussurra. Teatrale ma mai falsa. Ogni parola è un atto di presenza.",
secret:"L'astrologia ti dice che sei vanitoso. La verità è che hai paura che, se non brilli, il buio ti inghiotta. Il tuo bisogno di essere visto non è egoismo — è sopravvivenza.",
essence:"Leone è la presenza che illumina la stanza. Non perché si imponga, ma perché porta con sé qualcosa di solare — un calore che gli altri riconoscono come necessario alla propria vita. È il segno della creazione come atto d'amore puro.",
depth:"Il paradosso di Leone è che, sotto tutta quella luce, vive una delle paure più profonde dello zodiaco: non essere abbastanza. Non abbastanza speciale, non abbastanza degno di essere amato anche quando non si esibisce. Il suo lavoro è scoprire che la luce vera non ha bisogno di un pubblico.",
relationships:"Ama con grandiosità e fedeltà assoluta. Ha bisogno di essere scelto, celebrato, amato in modo visibile — l'amore silenzioso lo spaventa perché sembra assenza. La sfida è imparare che qualcuno può amarlo anche quando non sta brillando.",
growth:"Imparare che la luce vera non ha bisogno di un pubblico. Che il valore non dipende dagli applausi. Che brillare per se stessi è il coraggio più grande — e il più raro.",
karma:"Leone porta il karma del re che governava per se stesso. La lezione è usare il carisma in servizio degli altri, creare luce per chi non la trova da solo.",
ritual:"La domenica mattina, fai qualcosa di creativo solo per te — non per mostrarlo, non per condividerlo. Tienilo segreto per sette giorni. Questo è l'amore che non ha bisogno di pubblico.",
compatibility:"Fuoco con fuoco con Ariete e Sagittario. Equilibrio magnetico con Bilancia. Connessione intellettuale con Gemelli e Acquario.",
affirmation:"Sono abbastanza anche nel silenzio. La mia luce non dipende da chi la vede. Posso essere grande senza dover dimostrarlo.",
symbol_meaning:"Il simbolo del Leone raffigura la criniera solare — il glifo dell'io che irradia, del centro che dà senza svuotarsi."},

{key:"vergine",name:"Vergine",symbol:"♍",element:"Terra",modality:"Mutevole",archetype:"L'Alchimista",planet:"Mercurio",stone:"Zaffiro",metal:"Mercurio",color:"#2a5e30",colorLight:"#81c784",darkBg:"#010802",rgb:[42,94,48],starColor:"#c8e6c9",day:"Mercoledì",number:5,season:"Fine Estate",tarot:"L'Eremita",myth:"Demetra, Astrea",body:"Intestino, sistema digestivo, nervi periferici",img:"./IMG_1588.jpeg",backLogo:"./7b02dd77bc629334950adf67301af0b9.jpg",
shadow:"Il perfezionismo come fuga dalla vita. La critica come armatura contro la delusione.",
light:"Il discernimento come forma di saggezza. La cura nei dettagli come atto d'amore.",
wound:"La paura che il mondo sia irrimediabilmente disordinato e che il proprio ordine sia solo un'illusione patetica.",
vision:"Una figura che setaccia la sabbia cercando un granello d'oro che sa non esistere. Ma non può smettere. Perché è nel processo — non nel granello — che trova se stessa.",
voice:"Voce precisa, chirurgica, che pesa ogni parola su una bilancia invisibile. Frasi costruite come dimostrazioni matematiche.",
secret:"L'astrologia ti dice che sei critico. La verità è che ti critichi mille volte di più di quanto critichi gli altri. La tua esigenza verso il mondo non è arroganza — è il riflesso del rigore impietoso che rivolgi su te stesso.",
essence:"Vergine è il principio dell'ordine che emerge dal caos. La mente che distilla, affina, trasforma. Non è perfezionismo patologico — è alchimia autentica. La vocazione di Vergine è il servizio inteso come arte: fare le cose bene perché il bene fatto è già una forma di bellezza.",
depth:"Il dolore di Vergine nasce dall'impossibilità di essere abbastanza — non per gli altri, ma per se stessa. Il suo sistema nervoso è calibrato sulla sottile differenza tra ciò che potrebbe essere e ciò che è. Questa percezione la rende eccezionale e la tormenta in uguale misura.",
relationships:"Ama attraverso gli atti di cura, non le dichiarazioni. Il suo linguaggio d'amore è fare — notare, ricordare, aggiustare, essere lì. Fatica a ricevere perché ricevere significa dipendere, e dipendere significa rischiare la delusione.",
growth:"Imparare che non tutto ha bisogno di essere risolto. Che alcune cose sono perfette nella loro imperfezione. Che il corpo ha ragione anche quando la mente non capisce. Che la cura inizia da sé.",
karma:"Vergine porta il karma del servitore che ha dimenticato se stesso. La lezione è che servire gli altri senza servire sé stessi non è virtù — è autoabbandono.",
ritual:"Ogni sera, scrivi tre cose che hai fatto bene oggi. Non tre imperfezioni — tre doni. Continua finché non sembrerà più strano quanto sia facile giudicarsi.",
compatibility:"Terra con terra con Toro e Capricorno. Connessione trasformativa con Pesci, il suo opposto. Armonia intellettuale con Gemelli.",
affirmation:"Sono abbastanza anche quando non sono perfetto. Il mio corpo sa cose che la mia mente non capisce ancora. Prendersi cura di sé non è egoismo.",
symbol_meaning:"Il simbolo della Vergine raffigura la M con una spirale — il glifo della fertilità che discrimina, che trasforma il grezzo in prezioso."},

{key:"bilancia",name:"Bilancia",symbol:"♎",element:"Aria",modality:"Cardinale",archetype:"Il Giudice",planet:"Venere",stone:"Opale",metal:"Rame",color:"#703890",colorLight:"#ce93d8",darkBg:"#0a0212",rgb:[112,56,144],starColor:"#f3e5f5",day:"Venerdì",number:6,season:"Equinozio d'Autunno",tarot:"La Giustizia",myth:"Temi, Afrodite",body:"Reni, sistema renale, equilibrio ormonale",img:"./IMG_1589.jpeg",backLogo:"./00e561c47e4b9be2295db48de2ff9a8c.jpg",
shadow:"La dipendenza dall'approvazione altrui. La decisione evitata come forma di controllo.",
light:"La diplomazia come saggezza. La capacità di tenere la complessità senza semplificarla.",
wound:"La paura di scegliere e di sbagliare. Il terrore che ogni decisione sia una violenza contro qualcuno.",
vision:"Due piatti di una bilancia che oscillano nel vuoto cosmico. Non c'è peso su nessuno dei due. Ma la bilancia stessa è bellissima.",
voice:"Voce che cerca sempre la giusta nota, come un violino che si accorda all'infinito. Frasi bilanciate, simmetriche.",
secret:"L'astrologia ti dice che sei indeciso. La verità è che vedi tutte le verità contemporaneamente. Non è debolezza — è un burden cognitivo che la maggior parte non potrebbe sopportare. Stai portando il peso di ogni prospettiva.",
essence:"Bilancia è il momento prima della scelta — lo spazio in cui tutto è ancora possibile. Non è indecisione: è la capacità di abitare la complessità senza ridurla. Porta nel mondo la bellezza come principio etico: le cose belle sono quelle in equilibrio.",
depth:"Il paradosso di Bilancia è che, per qualcuno con una sensibilità così acuta per la giustizia, fatica terribilmente a essere giusto con se stesso. Rimanda le proprie esigenze, si appiattisce per mantenere la pace — finché un giorno non riesce a ricordare cosa voleva davvero.",
relationships:"Ama con eleganza e ha bisogno di reciprocità visibile. Il rapporto è il suo elemento naturale — si realizza nello specchio dell'altro. La sfida è non perdersi in quello specchio.",
growth:"Imparare a scegliere anche quando fa male. Che non decidere è anch'essa una scelta. Che il proprio bisogno ha lo stesso peso di quello degli altri — niente di più, niente di meno.",
karma:"Bilancia porta il karma del mediatore che ha smesso di avere una posizione. La lezione è che la pace vera richiede prima di tutto onestà — anche quella scomoda.",
ritual:"Prendi due oggetti di peso diverso. Tienili nelle palme aperte. Osserva lo squilibrio senza cercare di correggerlo. Resta con quella sensazione per cinque minuti.",
compatibility:"Aria con aria con Gemelli e Acquario. Tensione magnetica con Ariete, il suo opposto. Connessione artistica con Leone e Sagittario.",
affirmation:"Posso scegliere anche senza avere tutte le risposte. Il mio bisogno conta quanto quello degli altri. La complessità che vedo è un dono.",
symbol_meaning:"Il simbolo della Bilancia raffigura il sole che tramonta sull'orizzonte — l'unico dei dodici a essere un oggetto. Il glifo dell'equilibrio che divide il giorno dalla notte."},

{key:"scorpione",name:"Scorpione",symbol:"♏",element:"Acqua",modality:"Fisso",archetype:"Il Trasformatore",planet:"Plutone",stone:"Ossidiana",metal:"Ferro",color:"#620898",colorLight:"#ba68c8",darkBg:"#060010",rgb:[98,8,152],starColor:"#ce93d8",day:"Martedì",number:9,season:"Profondità dell'Autunno",tarot:"La Morte",myth:"Ade, Persefone, la Fenice",body:"Organi genitali, sistema riproduttivo, intestino crasso",img:"./IMG_1592.jpeg",backLogo:"./405b9d395fe3807f9c6d7f7486b3ef60.jpg",
shadow:"Il controllo come difesa dall'abbandono. La vendetta come sostituto del lutto.",
light:"La capacità di trasformare il veleno in medicina. La visione che penetra le maschere.",
wound:"La paura di essere visto nella propria nudità più totale. Il terrore che qualcuno scopra quanto è profondo il pozzo.",
vision:"Uno scorpione che si punge con il proprio pungiglione. Non è suicidio: è alchimia. Il veleno è anche l'antidoto. Sempre è stato così.",
voice:"Voce che emerge dal sottosuolo. Lenta, intensa. Ogni parola ha un sottotesto, un significato che si porta dietro come un'ombra.",
secret:"L'astrologia ti dice che sei vendicativo. La verità è che non dimentichi perché non puoi. La tua memoria emotiva è così precisa da essere quasi una maledizione. Ma è anche la fonte del tuo dono più raro: nessuno capisce la trasformazione come te.",
essence:"Scorpione è il guardiano della soglia tra la vita e la morte, tra ciò che si vede e ciò che si nasconde. Vive nella profondità perché solo lì trova la verità che conta. Conosce la natura del buio non perché lo cerchi — ma perché è l'unico posto dove ha trovato la luce vera.",
depth:"Scorpione porta in sé la conoscenza del peggio — e questa conoscenza lo ha reso capace di una compassione feroce. Ha attraversato il proprio abisso abbastanza volte da sapere la mappa a memoria. Il suo problema non è il buio: è imparare a fidarsi della luce.",
relationships:"Il desiderio di Scorpione è una questione di vita o di morte. Ama con possessività e devozione assoluta. Vuole fondersi, trasformarsi, rinascere attraverso l'altro. Non tollera le mezze misure. La sfida è lasciare che l'amore sia anche leggero.",
growth:"Imparare che il perdono non è dimenticare, ma liberarsi. Che il controllo è una forma di paura. Che lasciarsi essere visti è il vero atto di potere.",
karma:"Scorpione porta il karma di chi ha usato la conoscenza del dolore per ferire invece che per guarire. La lezione è trasformare il veleno in medicina — per sé prima che per gli altri.",
ritual:"Nell'oscurità completa, scrivi una cosa che non hai mai detto a nessuno. Chiudila in una busta sigillata. Decidine la data di apertura. Poi dimentica che esiste.",
compatibility:"Profondità con Cancro e Pesci. Polarità trasformativa con Toro, il suo opposto. Intensità costruttiva con Capricorno e Vergine.",
affirmation:"La mia profondità non fa paura — fa luce. Posso mostrare il pozzo senza caderci dentro. Il mio veleno si trasforma. Sempre.",
symbol_meaning:"Il simbolo dello Scorpione è la M con la freccia puntata verso il basso e verso l'alto — il glifo della morte e della rinascita come unico atto."},

{key:"sagittario",name:"Sagittario",symbol:"♐",element:"Fuoco",modality:"Mutevole",archetype:"Il Cercatore",planet:"Giove",stone:"Topazio",metal:"Stagno",color:"#4820a0",colorLight:"#9575cd",darkBg:"#05000e",rgb:[72,32,160],starColor:"#d1c4e9",day:"Giovedì",number:3,season:"Inizio Inverno",tarot:"La Temperanza",myth:"Chirone, il Centauro Ferito",body:"Fianchi, cosce, fegato, nervo sciatico",img:"./IMG_1591.jpeg",backLogo:"./335b0c459c1303982b09caf2866eb16c.jpg",
shadow:"L'ottimismo come fuga dal dolore. La libertà usata per evitare la responsabilità.",
light:"La visione di un orizzonte sempre aperto. Il significato trovato nel caos.",
wound:"La paura che la verità non esista, e che tutta la ricerca sia una fuga da un vuoto più grande.",
vision:"Un arciere che scaglia frecce verso l'orizzonte. Le frecce sono fatte di domande. L'orizzonte si ritira di un passo per ogni freccia scagliata. È comunque la cosa più bella che abbia mai visto.",
voice:"Voce che si espande, esplora, divaga. Frasi lunghe che attraversano continenti, che si perdono e si ritrovano.",
secret:"L'astrologia ti dice che sei ottimista. La verità è che hai visto l'abisso e hai deciso di correre. Il tuo ottimismo non è ingenuità — è un atto di ribellione consapevole contro il nulla.",
essence:"Sagittario è l'orizzonte in movimento perpetuo. Esiste nella tensione tra ciò che è e ciò che potrebbe essere. La freccia non è violenza: è la promessa che un mondo più ampio è possibile — e che vale la pena cercarlo.",
depth:"Il dolore di Sagittario è filosofico prima che emotivo. Vive nell'angoscia del significato — e quando non riesce a trovarlo, parte. L'errore è credere che cambiando posto si cambi la domanda. La maturità è scoprire che la risposta era sempre stata interna.",
relationships:"Ama con avventura e libertà come condizioni necessarie. Ha più paura di annoiarsi che di essere ferito — e questo spaventa le persone che ama. La sfida è scoprire che la profondità è l'orizzonte verticale.",
growth:"Imparare che le radici non sono prigioni. Che la profondità è una forma di esplorazione. Che alcune verità si trovano solo fermandosi. Che l'intimità è la frontiera più inesplorata.",
karma:"Sagittario porta il karma del maestro che insegnava tutto tranne come abitare il proprio dolore. La lezione è che la saggezza vera comincia da dove fa più male.",
ritual:"Ogni mese, vai in un posto dove non sei mai stato. Siediti in silenzio per un'ora. Non fotografare nulla. Lascia che qualcosa cambi.",
compatibility:"Fuoco libero con Ariete e Leone. Tensione generativa con Gemelli, il suo opposto. Esplorazione con Bilancia e Acquario.",
affirmation:"Il mio bisogno di senso è sacro. Posso cercare l'infinito e avere anche radici. La verità si trova anche fermandosi.",
symbol_meaning:"Il simbolo del Sagittario è una freccia — semplice, diretta, puntata verso l'alto. Il glifo del fuoco che diventa intenzione."},

{key:"capricorno",name:"Capricorno",symbol:"♑",element:"Terra",modality:"Cardinale",archetype:"Il Maestro",planet:"Saturno",stone:"Onice",metal:"Piombo",color:"#2a3c4e",colorLight:"#78909c",darkBg:"#010408",rgb:[42,60,78],starColor:"#b0bec5",day:"Sabato",number:8,season:"Solstizio d'Inverno",tarot:"Il Diavolo",myth:"Crono/Saturno, Pan",body:"Ossa, denti, ginocchia, sistema scheletrico",img:"./IMG_1593.jpeg",backLogo:"./912daca367c8e72364d2db78b31dec51.jpg",
shadow:"Il lavoro come fuga dall'intimità. Il controllo come sostituto dell'amore.",
light:"La perseveranza come forma di saggezza. La struttura come atto di cura.",
wound:"La paura che tutto il lavoro, tutta la disciplina, tutta la rinuncia siano stati inutili.",
vision:"Una capra che scala una montagna di ossa. Ogni passo è un sacrificio. In cima c'è uno specchio. Riflette non il vuoto — riflette chi sei diventato nel salire.",
voice:"Voce secca, essenziale, come pietra su pietra. Frasi che non sprecano nulla. Ogni parola è già passata attraverso il filtro del tempo.",
secret:"L'astrologia ti dice che sei freddo. La verità è che hai spento il fuoco per non bruciare. Il ghiaccio è la tua forma di sopravvivenza, non di indifferenza. Sotto c'è una lava che non hai ancora il coraggio di mostrare.",
essence:"Capricorno è il tempo che si accumula. Non ha fretta perché sa che la vetta esiste — e sa che ci arriverà, qualunque cosa accada. Porta nel mondo la saggezza che viene solo da chi ha rinunciato qualcosa di reale per qualcosa di più grande.",
depth:"Il dolore di Capricorno è il dolore del tempo. Ha imparato presto che le cose si conquistano, non si ricevono. Questa lezione l'ha reso capace di costruire qualsiasi cosa. Il problema è che ha smesso di chiedersi se ciò che costruisce è anche ciò che vuole.",
relationships:"Mostra la propria vulnerabilità solo a chi ha guadagnato la sua fiducia nel tempo. L'eros emerge lentamente, come il disgelo in primavera. Ma quando arriva, è totale. La sfida è non far pagare all'altro il prezzo dei muri costruiti prima di lui.",
growth:"Imparare che il riposo non è fallimento. Che il piacere non va guadagnato. Che il corpo ha bisogno di calore, non solo di disciplina. Che si può essere amati anche senza meritarselo.",
karma:"Capricorno porta il karma del padre severo che non ha mai imparato a essere figlio. La lezione è che la maturità vera include anche la regressione — sedersi per terra, ridere senza motivo, ricevere senza restituire.",
ritual:"Una volta all'anno, scrivi una lettera a te stesso di dieci anni fa. Non cosa hai ottenuto — cosa hai capito. La differenza tra le due liste rivela chi sei diventato.",
compatibility:"Terra con terra con Toro e Vergine. Tensione costruttiva con Cancro. Rispetto profondo con Scorpione e Pesci.",
affirmation:"Il riposo non è resa. Posso ricevere senza guadagnarmelo. La mia durezza mi ha portato fin qui — ora posso sciogliermi.",
symbol_meaning:"Il simbolo del Capricorno raffigura la capra con la coda del pesce — la creatura che vive tra la terra e le profondità marine."},

{key:"acquario",name:"Acquario",symbol:"♒",element:"Aria",modality:"Fisso",archetype:"Il Visionario",planet:"Urano",stone:"Ametista",metal:"Uranio",color:"#1030a0",colorLight:"#7986cb",darkBg:"#010210",rgb:[16,48,160],starColor:"#c5cae9",day:"Sabato",number:4,season:"Pieno Inverno",tarot:"La Stella",myth:"Prometeo, Ganimede",body:"Polpacci, caviglie, sistema circolatorio",img:"./IMG_1594.jpeg",backLogo:"./f222235194a42494fd53033c0586819b.jpg",
shadow:"Il distacco come fuga dal sentire. La ribellione come identità invece che come mezzo.",
light:"La visione del futuro possibile. La libertà come dono fatto al mondo intero.",
wound:"La paura di appartenere. Il terrore che, se si lascia entrare qualcuno, si perda la propria unicità.",
vision:"Una figura che versa acqua da un'anfora rotta. L'acqua non cade: vola verso le stelle. Qualcosa si perde — qualcosa arriva più lontano.",
voice:"Voce che viene da un altro pianeta. Distaccata ma vivida, brillante, piena di salti logici che all'improvviso hanno senso.",
secret:"L'astrologia ti dice che sei distaccato. La verità è che senti così intensamente che hai dovuto creare distanza per sopravvivere. Il tuo ghiaccio non è indifferenza — è il modo in cui porti il fuoco senza bruciarti le mani.",
essence:"Acquario è il futuro che abita il presente. Vede ciò che non esiste ancora e lo porta nel mondo come visione. La sua stranezza non è un difetto — è anticipo di ciò che verrà. Esiste sempre un po' fuori dal proprio tempo.",
depth:"Il dolore di Acquario è il dolore dell'incompreso nel senso più profondo: porta idee che il mondo non è ancora pronto a ricevere. La sua solitudine non è scelta ma destino. Il lavoro è trasformare l'isolamento in connessione senza perdere la propria frequenza.",
relationships:"Il desiderio è intellettuale prima che fisico. Ama chi sfida il suo pensiero. Ha bisogno di libertà anche nell'amore — non per tradire, ma per non scomparire. La sfida è lasciare che l'intimità sia anche vulnerabilità.",
growth:"Imparare che la connessione non è perdita di sé. Che appartenere a qualcuno non significa essere posseduti. Che le emozioni sono dati, non debolezze da correggere.",
karma:"Acquario porta il karma del rivoluzionario che sapeva cosa rompere ma non cosa costruire. La lezione è che la libertà vera ha una forma — non è assenza di struttura ma struttura scelta.",
ritual:"Una volta al mese, trascorri un'intera giornata senza tecnologia. Non per purificarti — per ritrovare il ritmo del tuo pensiero non mediato dagli schermi.",
compatibility:"Aria con aria con Gemelli e Bilancia. Tensione generativa con Leone, il suo opposto. Risonanza con Ariete e Sagittario.",
affirmation:"Posso appartenere senza perdermi. Le mie emozioni sono un dato, non un difetto. Sono del futuro — e anche del presente.",
symbol_meaning:"Il simbolo dell'Acquario sono due onde parallele — onde elettriche, onde di pensiero. Il glifo della trasmissione: portare energia da una dimensione all'altra."},

{key:"pesci",name:"Pesci",symbol:"♓",element:"Acqua",modality:"Mutevole",archetype:"Il Mistico",planet:"Nettuno",stone:"Acquamarina",metal:"Stagno",color:"#1828a0",colorLight:"#7986cb",darkBg:"#01020e",rgb:[24,40,160],starColor:"#c5cae9",day:"Giovedì",number:7,season:"Fine Inverno",tarot:"La Luna",myth:"Poseidone, Afrodite, Dioniso",body:"Piedi, sistema linfatico, ghiandola pineale",img:"./IMG_1595.jpeg",backLogo:"./680738679d20928b3027bd190774ae2d.jpg",
shadow:"La dissoluzione dei confini come fuga dal sé. Il sacrificio come identità.",
light:"La compassione come forma di intelligenza. La visione oltre il velo della realtà ordinaria.",
wound:"La paura di confondersi con il mare. Il terrore che i propri confini siano così permeabili da non esistere più.",
vision:"Due pesci che nuotano in direzioni opposte, legati da un filo d'argento. Non si allontanano mai — e in quella tensione, nascono mondi.",
voice:"Voce che fluisce, si dissolve, ricompare. Frasi che non finiscono mai davvero — si dissolvono in sospensione.",
secret:"L'astrologia ti dice che sei confuso. La verità è che vedi mille verità sovrapposte e non hai parole per contenerle tutte. Non è confusione — è una forma di percezione che il linguaggio non è ancora abbastanza grande da descrivere.",
essence:"Pesci è la dissoluzione che precede la rinascita. Vive nella porosità tra sé e l'altro, tra il reale e il sognato. L'ultimo segno dello zodiaco porta in sé la memoria di tutti gli altri — e la fatica di tutta quella memoria.",
depth:"Il dolore di Pesci è il dolore dell'empaticità radicale — sentire tutto, di tutti, senza filtro. Il confine tra sé e l'altro è così permeabile da rendere difficile capire cosa è suo e cosa è preso in prestito dall'oceano emotivo. Il lavoro è costruire una riva senza perdere il mare.",
relationships:"Ama con la totalità dell'oceano — senza riserve, senza calcoli. Il rischio è dissolversi nell'altro. La sfida è amare senza scomparire, dare senza svuotarsi, restare riconoscibile anche nell'intimità più profonda.",
growth:"Imparare che avere confini è un atto d'amore, non di egoismo. Che la propria esistenza separata ha valore. Che scegliere sé stessi non è abbandonare gli altri.",
karma:"Pesci porta il karma di tutti i segni — è l'ultimo, porta la memoria. La lezione è integrare senza dissolversi: essere del mondo senza perdersi nel mondo.",
ritual:"La mattina, prima di alzarti, rimani cinque minuti nel corpo. Senti il peso, il calore, il confine della tua pelle. Questo sei tu — separato, reale, presente. Questo basta.",
compatibility:"Acqua con acqua con Cancro e Scorpione. Attrazione trasformativa con Vergine, il suo opposto. Armonia con Toro e Capricorno.",
affirmation:"I miei confini sono sacri quanto il mio amore. Posso sentire tutto questo senza dissolvermi. Sono separato — e anche connesso.",
symbol_meaning:"Il simbolo dei Pesci raffigura due pesci legati da un filo che nuotano in direzioni opposte — il glifo del sogno e della veglia, dell'incarnazione e del ritorno al mare."}
];

function getSunSignKey(bday){
  if(!bday)return"ariete";
  const d=new Date(bday+"T12:00:00"),m=d.getMonth()+1,day=d.getDate();
  if((m===3&&day>=21)||(m===4&&day<=19))return"ariete";
  if((m===4&&day>=20)||(m===5&&day<=20))return"toro";
  if((m===5&&day>=21)||(m===6&&day<=20))return"gemelli";
  if((m===6&&day>=21)||(m===7&&day<=22))return"cancro";
  if((m===7&&day>=23)||(m===8&&day<=22))return"leone";
  if((m===8&&day>=23)||(m===9&&day<=22))return"vergine";
  if((m===9&&day>=23)||(m===10&&day<=22))return"bilancia";
  if((m===10&&day>=23)||(m===11&&day<=22))return"scorpione";
  if((m===11&&day>=23)||(m===12&&day<=21))return"sagittario";
  if((m===12&&day>=22)||(m===1&&day<=19))return"capricorno";
  if((m===1&&day>=20)||(m===2&&day<=18))return"acquario";
  return"pesci";
}
function getMoonSignKey(dateStr){
  if(!dateStr)return"ariete";
  try{
    const d=new Date(dateStr+"T12:00:00Z");
    const moonPos=Astronomy.MoonPosition(d);
    const moonLng=(moonPos.longitude%360+360)%360;
    return SIGN_ORDER[Math.floor(moonLng/30)];
  }catch(e){
    const days=(new Date(dateStr+"T12:00:00")-new Date("2000-01-01T12:00:00Z"))/86400000;
    const lng=((218.3165+13.1764*days)%360+360)%360;
    return SIGN_ORDER[Math.floor(lng/30)];
  }
}

function getAscendantKey(bday,birthtime,birthplace){
  if(!birthtime||birthtime==="non specificato")return null;
  try{
    const parts=birthplace.split(",").map(s=>s.trim());
    if(parts.length<3)throw new Error("incomplete location");
    const lon=parseFloat(parts[2]);
    const[h,m]=(birthtime||"12:00").split(":").map(x=>parseInt(x,10)||0);
    const d=new Date(bday+"T"+String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":00Z");
    const days=(d-new Date("2000-01-01T12:00:00Z"))/86400000;
    const T=days/36525;
    const GMST=280.46061837+360.98564724*days+0.000387933*T*T-(T*T*T)/38710000;
    const LST=(GMST+lon)%360;
    const sunIdx=SIGN_ORDER.indexOf(getSunSignKey(bday));
    const ascIdx=(Math.floor(LST/30)+sunIdx)%12;
    return SIGN_ORDER[ascIdx];
  }catch(e){
    const sunIdx=SIGN_ORDER.indexOf(getSunSignKey(bday));
    const h=parseInt((birthtime||"12:00").split(":")[0],10);
    return SIGN_ORDER[((sunIdx+Math.round((h-6)/2))%12+12)%12];
  }
}


// ── NATAL PLANET SIGN CALCULATOR (mean motion from J2000) ──
function getNatalPlanetKey(planet,bday){
  if(!bday)return"ariete";
  try{
    const days=(new Date(bday+"T12:00:00Z")-new Date("2000-01-01T12:00:00Z"))/86400000;
    const R={mercury:{l:252.25,m:4.0923},venus:{l:181.98,m:1.6021},mars:{l:355.45,m:0.5240},jupiter:{l:34.40,m:0.0831},saturn:{l:50.08,m:0.0335},chiron:{l:151.0,m:0.01988},northnode:{l:125.0,m:-0.05299}};
    const r=R[planet];if(!r)return"ariete";
    return SIGN_ORDER[Math.floor(((r.l+r.m*days)%360+360)%360/30)];
  }catch(e){return"ariete";}
}

// ── CANDLE LIGHT ──
function useCandleLight(){
  useEffect(()=>{
    const el=document.documentElement;
    // target, velocity, position — double-spring for buttery smooth follow
    let tx=50,ty=35,vx=0,vy=0,cx=50,cy=35;
    let last=performance.now();
    const stiffness=0.028, damping=0.72; // very soft spring
    function loop(now){
      const dt=Math.min((now-last)/16.667,3); // normalized to 60fps, cap 3 frames
      last=now;
      // spring physics: F = stiffness*(target-pos) - damping*vel
      vx=(vx+stiffness*(tx-cx)*dt)*Math.pow(damping,dt);
      vy=(vy+stiffness*(ty-cy)*dt)*Math.pow(damping,dt);
      cx+=vx*dt;
      cy+=vy*dt;
      el.style.setProperty('--cx',cx.toFixed(3)+'%');
      el.style.setProperty('--cy',cy.toFixed(3)+'%');
      raf=requestAnimationFrame(loop);
    }
    let raf=requestAnimationFrame(loop);
    function onMouse(e){tx=e.clientX/window.innerWidth*100;ty=e.clientY/window.innerHeight*100;}
    function onOrient(e){
      const g=Math.max(-55,Math.min(55,e.gamma||0));
      const b=Math.max(-55,Math.min(55,(e.beta||0)-20));
      tx=50+g;ty=35+b;
    }
    window.addEventListener('mousemove',onMouse,{passive:true});
    window.addEventListener('deviceorientation',onOrient,{passive:true});
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('mousemove',onMouse);window.removeEventListener('deviceorientation',onOrient);el.style.removeProperty('--cx');el.style.removeProperty('--cy');};
  },[]);
}

function SignFlipCard({sg,t,i,onSelect}){
  const floatRef=useRef(null);
  const innerRef=useRef(null);
  const frontRef=useRef(null);
  const backRef=useRef(null);
  const flippedRef=useRef(false);
  const hintDoneRef=useRef(false);
  const drg=useRef({active:false,locked:false,sx:0,sy:0,sa:0,lx:0,moved:0});
  const [cursor,setCursor]=useState("grab");
  const [frontRatio,setFrontRatio]=useState("3/4");

  // Direct DOM: set transform without triggering layout
  const setAngle=useCallback(a=>{
    if(!innerRef.current)return;
    innerRef.current.style.transform=`rotateY(${a}deg)`;
    const onBack=((a%360+360)%360)>90&&((a%360+360)%360)<=270;
    if(frontRef.current){frontRef.current.style.opacity=onBack?0:1;frontRef.current.style.pointerEvents=onBack?"none":"auto";}
    if(backRef.current){backRef.current.style.opacity=onBack?1:0;backRef.current.style.pointerEvents=onBack?"auto":"none";}
  },[]);

  // CSS-animated flip — direction-aware, any target angle
  const flipTo=useCallback((target)=>{
    if(!innerRef.current)return;
    innerRef.current.style.transition='transform 0.52s cubic-bezier(0.16,1.08,0.3,1)';
    const norm=((target%360)+360)%360;
    flippedRef.current=norm>90&&norm<=270;
    requestAnimationFrame(()=>{setAngle(target);});
  },[setAngle]);

  useEffect(()=>{
    if(innerRef.current)innerRef.current.style.transition='none';
    setAngle(0);
  },[setAngle]);

  const onDown=useCallback(e=>{
    if(e.pointerType==="mouse"&&e.button!==0)return;
    // let button clicks pass through — don't hijack the pointer
    if(e.target.closest("button"))return;
    const d=drg.current;
    d.active=true;d.locked=false;
    d.sx=e.clientX;d.sy=e.clientY;
    d.sa=flippedRef.current?180:0;
    d.lx=e.clientX;d.moved=0;
    if(innerRef.current)innerRef.current.style.transition='none';
    if(floatRef.current){floatRef.current.style.transition='none';floatRef.current.style.transform='';}
    setCursor("grabbing");
  },[]);

    const d=drg.current;
    if(!d.active)return;
    const dx=e.clientX-d.sx,dy=e.clientY-d.sy;

      if(Math.abs(dx)<3&&Math.abs(dy)<3)return;
      if(Math.abs(dy)>Math.abs(dx)*2.5){
        d.active=false;
        flipTo(flippedRef.current?180:0);

      d.locked=true;
      try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}

      if(!flippedRef.current) flipTo(dir>=0?180:-180);
      else flipTo(dir>=0?360:0);
      return;
    }
    const ang=d.sa+totalDx*1.6;

      flipTo(flippedRef.current?180:dir>=0?180:-180);

      if(flippedRef.current) flipTo(dir>=0?360:0);

    }

    drg.current.active=false;setCursor("grab");
    if(floatRef.current){floatRef.current.style.transition='transform .5s cubic-bezier(.16,1,.3,1)';floatRef.current.style.transform='';}

            <div style={{background:"linear-gradient(165deg,rgba(255,255,255,0.16) 0%,rgba(255,255,255,0.05) 50%,rgba(255,255,255,0.10) 100%)",padding:8,border:"1px solid rgba(255,255,255,0.26)",borderRadius:16,boxShadow:`inset 0 1.5px 0 rgba(255,255,255,0.62),inset 0.5px 0 0 rgba(255,255,255,0.16),inset -0.5px 0 0 rgba(255,255,255,0.06),inset 0 -1px 0 rgba(255,255,255,0.10)`,position:"relative",overflow:"hidden"}}>

                {sg.img&&<img src={sg.img} alt={sg.name} loading={i<3?"eager":"lazy"} decoding={i<3?"sync":"async"} fetchpriority={i===0?"high":"auto"} onLoad={e=>{
                  const w=e.currentTarget.naturalWidth;

// ── NAV ICON (canvas white-bg removal) ──
function NavIcon({src,zoom,active,removeDark,offsetX,offsetY,size=43}){
  const canvasRef=useRef(null);
  useEffect(()=>{
    if(!src)return;
    const img=new window.Image();
    img.onload=()=>{
      const c=canvasRef.current;
      if(!c)return;
      const S=80;
      c.width=S;c.height=S;
      const ctx=c.getContext('2d');
      const z=zoom||1;
      const baseScale=Math.max(S/img.width,S/img.height);
      const drawW=img.width*baseScale*z;
      const drawH=img.height*baseScale*z;
      const offX=(S-drawW)/2+(offsetX||0);
      const offY=(S-drawH)/2+(offsetY||0);
      ctx.drawImage(img,offX,offY,drawW,drawH);
      const id=ctx.getImageData(0,0,S,S);
      const px=id.data;
      for(let i=0;i<px.length;i+=4){
        const br=(px[i]+px[i+1]+px[i+2])/3;
        if(br>230){px[i+3]=0;}
        else if(br>195){px[i+3]=Math.round((230-br)/35*255);}
        if(removeDark){
          if(br<10){px[i+3]=0;}
          else if(br<25){px[i+3]=Math.round((br-10)/15*255);}
        }
      }
      ctx.putImageData(id,0,0);
    };
    img.src=src;
  },[src,zoom,removeDark,offsetX,offsetY]);
  return <canvas ref={canvasRef} style={{width:size,height:size,borderRadius:'50%',opacity:active?1:0.44,transition:'opacity .22s ease'}}/>;
}
