function getNextAstroEvent(dateStr){
  const today=new Date(dateStr+"T00:00:00");
  const ev=ASTRO_2026.find(e=>new Date(e.d+"T00:00:00")>=today);
  if(!ev)return{...ASTRO_2026[ASTRO_2026.length-1],daysAway:0};
  const daysAway=Math.round((new Date(ev.d+"T00:00:00")-today)/86400000);
  return{...ev,daysAway};
}
function getLunarPhase(dateStr){
  const d=new Date(dateStr+"T12:00:00");
  const ref=new Date("2000-01-06T18:14:00Z");
  const synodic=29.530588853;
  const pd=((((d-ref)/86400000)%synodic)+synodic)%synodic;
  const norm=pd/synodic;
  let name,desc;
  if(pd<1.85){name="Luna Nuova";desc="Tempo di semina interiore. Inizi, intenzioni, silenzio fertile.";}
  else if(pd<7.38){name="Luna Crescente";desc="L'energia cresce. Agisci su ciò che hai iniziato con intenzione.";}
  else if(pd<9.22){name="Primo Quarto";desc="Momento di decisione. Supera gli ostacoli con determinazione.";}
  else if(pd<12.91){name="Gibbosa Crescente";desc="Raffinamento e perseveranza. Il culmine si avvicina.";}
  else if(pd<16.61){name="Luna Piena";desc="Culmine e rivelazione. Ciò che era nascosto si manifesta oggi.";}
  else if(pd<20.30){name="Gibbosa Calante";desc="Gratitudine e rilascio. Integra ciò che hai ottenuto.";}
  else if(pd<23.99){name="Ultimo Quarto";desc="Revisione profonda. Lascia andare ciò che non serve più.";}
  else{name="Luna Calante";desc="Il ciclo si chiude. Prepara il terreno per la prossima rinascita.";}
  const daysToFull=pd<14.765?14.765-pd:synodic-pd+14.765;
  const daysToNew=pd<0.5?0.5-pd:synodic-pd;
  const nextEvent=daysToFull<daysToNew
    ?{type:"Luna Piena",days:Math.max(0,Math.round(daysToFull))}
    :{type:"Luna Nuova",days:Math.max(0,Math.round(daysToNew))};
  return{pd,norm,name,desc,nextEvent};
}
const MoonSVG=memo(function MoonSVG({pd}){
  const S=56,r=22,cx=28,cy=28;
  const norm=pd/29.530588853;
  const waxing=norm<=0.5;
  const tx=r*Math.cos(2*Math.PI*norm);
  let path='';
  if(norm>0.005&&norm<0.995){
    if(waxing){
      const sw=tx>0?0:1;
      path=`M${cx},${cy-r} A${r},${r},0,0,1,${cx},${cy+r} A${Math.abs(tx).toFixed(2)},${r},0,0,${sw},${cx},${cy-r} Z`;
    }else{
      const tx2=r*Math.cos(2*Math.PI*(1-norm));
      const sw=tx2>0?1:0;
      path=`M${cx},${cy-r} A${r},${r},0,0,0,${cx},${cy+r} A${Math.abs(tx2).toFixed(2)},${r},0,0,${sw},${cx},${cy-r} Z`;
    }
  }
  const isNew=norm<0.005||norm>0.995;
  const isFull=norm>0.492&&norm<0.508;
  return(
    <svg width={S} height={S} style={{display:"block",overflow:"visible",flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="rgba(10,4,20,0.96)" stroke="rgba(255,255,255,0.14)" strokeWidth={1}/>
      {isFull
        ?<circle cx={cx} cy={cy} r={r} fill="rgba(255,248,210,0.90)"/>
        :!isNew&&<path d={path} fill="rgba(255,248,210,0.88)"/>}
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.20)" strokeWidth={0.8}/>
      {isFull&&<circle cx={cx} cy={cy} r={r+3} fill="none" stroke="rgba(255,230,140,0.22)" strokeWidth={4}/>}
    </svg>
  );
});
function BioChart({birthday,dateStr,t}){
  const baseDays=useMemo(()=>{
    const b=new Date(birthday+"T12:00:00");
    const r=new Date(dateStr+"T12:00:00");
    const v=Math.round((r-b)/86400000);
    return isNaN(v)?0:v;
  },[birthday,dateStr]);
  const CYCLES=[
    {key:"f",period:23,col:"#e07060",label:"Fisico"},
    {key:"e",period:28,col:"#b060a8",label:"Emotivo"},
    {key:"i",period:33,col:"#5890d8",label:"Intellettuale"},
    {key:"s",period:26,col:"#48b870",label:"Sociale"},
  ];
  const W=320,H=148,PL=8,PR=8,PT=12,PB=26;
  const cW=W-PL-PR,cH=H-PT-PB;
  const toX=d=>PL+(d+3.5)/7*cW;
  const toY=v=>PT+cH/2-v*(cH*0.46);
  const makePath=period=>{
    let p=`M${toX(-3.5).toFixed(1)},${toY(Math.sin(2*Math.PI*(baseDays-3.5)/period)).toFixed(1)}`;
    for(let i=1;i<=70;i++){const d=-3.5+i*7/70;p+=` L${toX(d).toFixed(1)},${toY(Math.sin(2*Math.PI*(baseDays+d)/period)).toFixed(1)}`;}
    return p;
  };
  const todayX=toX(0);
  const isLight=parseInt(t.text.slice(1,3),16)<128;
  const gC=isLight?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.06)";
  const gM=isLight?"rgba(0,0,0,0.16)":"rgba(255,255,255,0.14)";
  const lC=isLight?"rgba(0,0,0,0.32)":"rgba(255,255,255,0.28)";
  const lT=isLight?"rgba(0,0,0,0.68)":"rgba(255,255,255,0.65)";
  const tC=isLight?"rgba(0,0,0,0.13)":"rgba(255,255,255,0.14)";
  const dow=new Date(dateStr+"T12:00:00").getDay();
  const DN=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {[-1,-0.5,0,0.5,1].map(v=>(
        <line key={v} x1={PL} x2={W-PR} y1={toY(v)} y2={toY(v)} stroke={v===0?gM:gC} strokeWidth={v===0?0.9:0.4}/>
      ))}
      {[-3,-2,-1,0,1,2,3].map(d=>(
        <line key={d} x1={toX(d)} x2={toX(d)} y1={PT} y2={PT+cH} stroke={gC} strokeWidth={0.4}/>
      ))}
      <line x1={todayX} x2={todayX} y1={PT-3} y2={PT+cH+3} stroke={tC} strokeWidth={1} strokeDasharray="3,2.5"/>
      {CYCLES.map(c=>(
        <path key={c.key} d={makePath(c.period)} fill="none" stroke={c.col} strokeWidth={1.9} strokeLinecap="round" strokeLinejoin="round" opacity={0.90}/>
      ))}
      {CYCLES.map(c=>{
        const v=Math.sin(2*Math.PI*baseDays/c.period);
        return(
          <g key={c.key}>
            <circle cx={todayX} cy={toY(v)} r={5} fill={c.col} opacity={0.18}/>
            <circle cx={todayX} cy={toY(v)} r={2.6} fill={c.col} stroke="rgba(0,0,0,0.25)" strokeWidth={0.8}/>
          </g>
        );
      })}
      {[-3,-2,-1,0,1,2,3].map(d=>{
        const n=(((dow+d)%7)+7)%7;
        return(
          <text key={d} x={toX(d)} y={H-7} textAnchor="middle" fontSize={d===0?8:7} fontWeight={d===0?600:400} fill={d===0?lT:lC} fontFamily="Inter,sans-serif">
            {d===0?"oggi":DN[n]}
          </text>
        );
      })}
    </svg>
  );
}

        <div style={{marginBottom:24,background:"#ffffff",borderRadius:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07),0 0 0 0.5px rgba(0,0,0,0.04)",overflow:"hidden"}}>
          <div style={{padding:"18px 20px 22px"}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:500,letterSpacing:".06em",color:"rgba(60,60,67,0.45)",textTransform:"uppercase",marginBottom:18}}>Numeri della Settimana</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {lucky.map((n,i)=>(
                <div key={n} style={{width:56,height:56,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:i===0?t.accent:`rgba(60,60,67,${i===1?0.08:0.05})`,border:`1.5px solid ${i===0?t.accent:i===1?"rgba(60,60,67,0.15)":"rgba(60,60,67,0.08)"}`,boxShadow:i===0?`0 4px 16px ${t.accent}40`:"",transition:"all .2s cubic-bezier(.16,1,.3,1)"}} onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.12)";e.currentTarget.style.boxShadow=i===0?`0 8px 24px ${t.accent}55,0 2px 8px ${t.accent}30`:"0 2px 8px rgba(0,0,0,0.1)"}} onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow=i===0?`0 4px 16px ${t.accent}40`:""}}>
                  <span style={{fontFamily:"'Inter',sans-serif",fontSize:i===0?"20px":i===1?"16px":"14px",fontWeight:i===0?700:i===1?600:500,color:i===0?"#ffffff":`rgba(60,60,67,${i===1?0.7:0.4})`,lineHeight:1}}>{n}</span>
                </div>
              ))}
            </div>
            <div style={{marginTop:16,fontFamily:"'Cormorant Garamond',serif",fontSize:"13px",fontStyle:"italic",color:"rgba(60,60,67,0.4)",textAlign:"center"}}>Calcolati in base al tuo segno e al ciclo settimanale</div>
          </div>
        </div>

        <div style={{height:"calc(env(safe-area-inset-bottom,0px) + 90px)"}}/>
      </div>
    </div>
  );
}

function App(){
  const[view,setView]=useState("hub");
  const[selected,setSelected]=useState(null);
  const[theme,setTheme]=useState("carta");
  const[splash,setSplash]=useState(true);
  const[journal,setJournal]=useState({});
  const[profile,setProfile]=useState(null);
  const[setupDone,setSetupDone]=useState(false); // kept for compat
  const t=THEMES[theme];

  useEffect(()=>{
    try{
      const s=localStorage.getItem("arcana_v3");if(s)setJournal(JSON.parse(s));
      const p=localStorage.getItem("arcana_profile");if(p){setProfile(JSON.parse(p));setSetupDone(true);}
    }catch(e){}
  },[]);
  useEffect(()=>{document.body.style.background=t.bg},[t.bg]);

  const saveEntry=useCallback((sKey,tab,text)=>{
    setJournal(prev=>{
      const u={...prev,[`${toKey()}_${sKey}_${tab}`]:text};
      try{localStorage.setItem("arcana_v3",JSON.stringify(u))}catch(e){}
      return u;
    });
  },[]);

  const onSetupDone=useCallback((p)=>{setProfile(p);setSetupDone(true);setView("daily");},[]);

  return(
    <div style={{background:t.bg,color:t.text,minHeight:"100vh"}}>
      {splash&&<Splash onDone={()=>setSplash(false)} bg={t.bg} text={t.text}/>}
      {!splash&&view==="setup"&&<ProfileSetup t={t} onDone={onSetupDone} onBack={()=>setView(profile?"daily":"hub")}/>}
      {!splash&&view==="home"&&<Home t={t} profile={profile} onSelect={s=>{setSelected(s);setView("sign")}} onSetup={()=>setView(profile?"daily":"setup")}/>}
      {!splash&&view==="hub"&&<HomeHub t={t} setView={setView} profile={profile}/>}
      {!splash&&view==="daily"&&profile&&<DailyHoroscope t={t} profile={profile} onBack={()=>setView("hub")} onProfile={()=>setView("profile")} onEdit={()=>setView("setup")}/>}
      {!splash&&view==="tarocchi"&&<Tarocchi t={t}/>}
      {!splash&&view==="profile"&&profile&&<PersonalProfile t={t} profile={profile} onEdit={()=>setView("setup")} onBack={()=>setView("daily")}/>}
      {!splash&&view==="sign"&&selected&&<SignScreen sg={selected} t={t} onBack={()=>setView("home")} journal={journal} saveEntry={saveEntry}/>}
      {!splash&&view!=="setup"&&<ThemeBtn theme={theme} setTheme={setTheme} t={t}/>}
      {!splash&&<BottomNav view={view} setView={setView} t={t} profile={profile}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
