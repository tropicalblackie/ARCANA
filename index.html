function Tarocchi({t,setView}){
  const[phase,setPhase]=useState("area");
  const[area,setArea]=useState(null);
  const[deck,setDeck]=useState([]);
  const[picked,setPicked]=useState([]);
  const[flipped,setFlipped]=useState([false,false,false]);
  const[hovArea,setHovArea]=useState(null);
  const[hovCard,setHovCard]=useState(null);

  const aObj=TAROT_AREAS.find(a=>a.key===area)||TAROT_AREAS[0];
  const tarotUi={
    bg:"#f2f2f7",
    text:"#1f1f24",
    muted:"rgba(31,31,36,0.55)",
    soft:"rgba(31,31,36,0.3)",
    border:"rgba(31,31,36,0.12)",
    card:"#ffffff"
  };

  function startSpread(aKey){
    const sh=[...ARCANI].sort(()=>Math.random()-.5).slice(0,9);
    setDeck(sh);setPicked([]);setFlipped([false,false,false]);
    setArea(aKey);setPhase("spread");
  }
  function pickCard(i){
    if(picked.includes(i)||picked.length>=3)return;
    setPicked(p=>[...p,i]);
  }
  function doReveal(){
    setPhase("reveal");
    [400,1150,1950].forEach((d,idx)=>
      setTimeout(()=>setFlipped(f=>{const n=[...f];n[idx]=true;return n;}),d)
    );
  }
  function reset(){
    setPhase("area");setArea(null);setDeck([]);
    setPicked([]);setFlipped([false,false,false]);
  }

  /* ── AREA SELECTION ── */
  if(phase==="area") return(
    <div style={{minHeight:"100vh",background:tarotUi.bg,color:tarotUi.text,paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 80px)",overflowX:"hidden"}}>
      {/* Star field */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>
        {[...Array(28)].map((_,i)=>(
          <div key={i} style={{position:"absolute",width:i%5===0?2:1.5,height:i%5===0?2:1.5,borderRadius:"50%",background:`rgba(25,25,35,${i%3===0?0.09:0.05})`,top:`${(i*37+11)%100}%`,left:`${(i*71+7)%100}%`,animation:`pulse ${2+(i*0.29)%2.5}s ${(i*0.17)%2.5}s ease-in-out infinite`}}/>
        ))}
      </div>
      <div style={{position:"relative",zIndex:1}}>
        {/* Header */}
        <div style={{padding:"clamp(56px,13vw,88px) 28px 40px",textAlign:"center"}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(52px,14vw,76px)",color:"rgba(184,138,43,0.86)",lineHeight:1,marginBottom:18}}>✦</div>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",fontWeight:600,letterSpacing:".38em",color:"rgba(184,138,43,0.75)",textTransform:"uppercase",marginBottom:14}}>Arcani Maggiori</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(32px,9vw,50px)",fontWeight:300,letterSpacing:"-.02em",marginBottom:12}}>I Tarocchi</div>
          <div style={{width:40,height:1,background:"linear-gradient(to right,transparent,rgba(184,138,43,0.5),transparent)",margin:"0 auto 18px"}}/>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",fontStyle:"italic",color:tarotUi.muted,marginBottom:22}}>Scegli il dominio da esplorare</div>
          {/* Grimorio entry */}
          <button onClick={()=>setView&&setView("grimorio")}
            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 28px rgba(184,138,43,0.42)";}}
            onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 4px 18px rgba(184,138,43,0.25)";}}
            style={{background:"linear-gradient(135deg,rgba(184,138,43,0.92),rgba(148,108,28,0.92))",border:"none",borderRadius:50,padding:"12px 28px",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:9,boxShadow:"0 4px 18px rgba(184,138,43,0.25)",transition:"transform .2s,box-shadow .2s"}}>
            <span style={{fontSize:"15px",color:"#fff"}}>&#x26B7;</span>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",letterSpacing:".12em",color:"#fff",fontWeight:500}}>Il Grimorio</span>
          </button>
        </div>
        {/* 2x2 grid */}
        <div style={{padding:"0 20px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,maxWidth:500,margin:"0 auto"}}>
          {TAROT_AREAS.map(a=>{
            const isHov=hovArea===a.key;
            return(
              <div key={a.key} onClick={()=>startSpread(a.key)}
                onMouseEnter={()=>setHovArea(a.key)} onMouseLeave={()=>setHovArea(null)}
                style={{background:isHov?`linear-gradient(135deg,${a.color}22,#ffffff)`:`linear-gradient(160deg,#ffffff,#fafafa)`,border:`1.5px solid ${isHov?a.color+"88":a.color+"40"}`,borderRadius:20,padding:"22px 16px 18px",textAlign:"center",cursor:"pointer",transform:isHov?"translateY(-4px) scale(1.02)":"scale(1)",transition:"all .35s cubic-bezier(.16,1,.3,1)",boxShadow:isHov?`0 22px 44px ${a.color}32,0 6px 14px ${a.color}18`:`0 2px 8px ${a.color}10,0 6px 22px ${a.color}22`,position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:"40%",left:"50%",transform:"translate(-50%,-50%)",width:88,height:88,borderRadius:"50%",background:`radial-gradient(circle,${a.color}${isHov?"28":"12"},transparent 70%)`,transition:"all .35s",pointerEvents:"none"}}/>
                <div style={{marginBottom:12,position:"relative",transition:"transform .25s",transform:isHov?"scale(1.12)":"scale(1)",display:"flex",justifyContent:"center"}}>
                  {a.img?<img src={a.img} alt={a.label} style={{width:52,height:"auto",objectFit:"contain"}}/>:<span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(34px,9vw,44px)",color:a.color,lineHeight:1}}>{a.icon}</span>}
                </div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(17px,4.5vw,21px)",fontWeight:600,color:tarotUi.text,marginBottom:4,position:"relative"}}>{a.label}</div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:600,letterSpacing:".08em",color:tarotUi.soft,textTransform:"uppercase",marginBottom:10,position:"relative"}}>{a.desc}</div>
                <div style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 11px",borderRadius:20,background:`${a.color}18`,border:`1px solid ${a.color}50`,position:"relative"}}>
                  <span style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",fontWeight:700,letterSpacing:".1em",color:a.color,textTransform:"uppercase"}}>Esplora</span>
                  <span style={{fontSize:"9px",color:a.color}}>→</span>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{textAlign:"center",marginTop:28}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"12px",fontStyle:"italic",color:"rgba(184,138,43,0.45)",letterSpacing:".06em"}}>22 Arcani · 3 carte · 1 verità</div>
        </div>
      </div>
    </div>
  );

  /* ── CARD SPREAD ── */
  if(phase==="spread") return(
    <div style={{minHeight:"100vh",background:tarotUi.bg,color:tarotUi.text,paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 80px)",overflow:"hidden"}}>
      {/* Star field */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>
        {[...Array(20)].map((_,i)=>(
          <div key={i} style={{position:"absolute",width:1.5,height:1.5,borderRadius:"50%",background:"rgba(25,25,35,0.08)",top:`${(i*41+9)%100}%`,left:`${(i*67+17)%100}%`,animation:`pulse ${2+(i*0.31)%2.5}s ${(i*0.19)%2.5}s ease-in-out infinite`}}/>
        ))}
      </div>
      <div style={{position:"relative",zIndex:1}}>
        {/* Header */}
        <div style={{padding:"clamp(44px,10vw,68px) 24px 16px",textAlign:"center"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:`${aObj.color}18`,border:`1px solid ${aObj.color}48`,borderRadius:20,padding:"7px 18px",marginBottom:22}}>
            {aObj.img?<img src={aObj.img} alt={aObj.label} style={{width:18,height:18,objectFit:"contain"}}/>:<span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",color:aObj.color}}>{aObj.icon}</span>}
            <span style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:600,color:aObj.color,letterSpacing:".06em",textTransform:"uppercase"}}>{aObj.label}</span>
          </div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(22px,6vw,30px)",fontWeight:500,marginBottom:7}}>Scegli tre carte</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"14px",fontStyle:"italic",color:`rgba(31,31,36,${picked.length===3?0.7:0.45})`,transition:"color .3s"}}>
            {picked.length===0?"Affida la tua domanda al cosmo":picked.length===3?"Le tue carte sono pronte":`${picked.length} di 3 selezionate`}
          </div>
        </div>

        {/* Card grid 3×3 */}
        <div style={{padding:"0 20px",marginBottom:8}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:360,margin:"0 auto"}}>
            {deck.map((card,i)=>{
              const isPicked=picked.includes(i);
              const pickOrder=picked.indexOf(i);
              const isHov=hovCard===i;
              const canPick=!isPicked&&picked.length<3;
              return(
                <div key={i} onClick={()=>pickCard(i)}
                  onMouseEnter={()=>setHovCard(i)} onMouseLeave={()=>setHovCard(null)}
                  style={{aspectRatio:"2/3",borderRadius:12,cursor:canPick?"pointer":isPicked?"default":"not-allowed",transition:"transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s",transform:isPicked?"translateY(-6px) scale(1.04)":isHov&&canPick?"translateY(-3px)":"translateY(0)",boxShadow:isPicked?`0 14px 28px ${aObj.color}35,0 0 0 1.5px ${aObj.color}60`:isHov&&canPick?"0 8px 18px rgba(20,20,30,0.12),0 0 0 1px rgba(184,138,43,0.2)":"0 2px 10px rgba(20,20,30,0.1)",opacity:!isPicked&&picked.length>=3?0.35:1}}>
                  <div style={{width:"100%",height:"100%",borderRadius:12,background:isPicked?`linear-gradient(160deg,${aObj.color}20,#ffffff,#f8f8fc)`:"linear-gradient(160deg,#ffffff,#f5f5fb,#eeeef6)",border:`1px solid ${isPicked?aObj.color+"70":isHov&&canPick?"rgba(184,138,43,0.35)":"rgba(31,31,36,0.1)"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,position:"relative",overflow:"hidden",transition:"all .3s"}}>
                    <div style={{position:"absolute",inset:5,border:`0.5px solid ${isPicked?aObj.color+"35":"rgba(31,31,36,0.08)"}`,borderRadius:8,transition:"border .3s"}}/>
                    <div style={{position:"absolute",top:7,left:7,fontSize:"6px",color:isPicked?aObj.color:"rgba(31,31,36,0.24)"}}>✦</div>
                    <div style={{position:"absolute",top:7,right:7,fontSize:"6px",color:isPicked?aObj.color:"rgba(31,31,36,0.24)"}}>✦</div>
                    <div style={{position:"absolute",bottom:7,left:7,fontSize:"6px",color:isPicked?aObj.color:"rgba(31,31,36,0.24)"}}>✦</div>
                    <div style={{position:"absolute",bottom:7,right:7,fontSize:"6px",color:isPicked?aObj.color:"rgba(31,31,36,0.24)"}}>✦</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",position:"relative",transition:"all .3s"}}>
                      {isPicked&&aObj.img?<img src={aObj.img} alt={aObj.label} style={{width:28,height:"auto",objectFit:"contain",transition:"all .3s"}}/>:<span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:isPicked?"22px":isHov&&canPick?"18px":"15px",color:isPicked?aObj.color:"rgba(31,31,36,0.4)",transition:"all .3s",lineHeight:1}}>{"✦"}</span>}
                    </div>
                    {isPicked&&pickOrder>=0&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"12px",color:aObj.color,fontWeight:500,letterSpacing:".06em",position:"relative"}}>{["I","II","III"][pickOrder]}</div>}
                    {!isPicked&&<div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:isHov&&canPick?"rgba(31,31,36,0.55)":"rgba(31,31,36,0.25)",letterSpacing:".04em",transition:"color .2s",position:"relative"}}>{isHov&&canPick?"scegli":"· · ·"}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Position slots */}
        <div style={{display:"flex",gap:10,padding:"16px 24px 0",maxWidth:380,margin:"0 auto"}}>
          {TPOS.map((pos,i)=>(
            <div key={pos} style={{flex:1,textAlign:"center",padding:"10px 6px",background:picked.length>i?`${aObj.color}18`:"#ffffff",border:`1px solid ${picked.length>i?aObj.color+"45":tarotUi.border}`,borderRadius:12,fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:600,letterSpacing:".08em",color:picked.length>i?aObj.color:"rgba(31,31,36,0.3)",textTransform:"uppercase",transition:"all .35s"}}>{pos}</div>
          ))}
        </div>

        {/* Reveal CTA */}
        {picked.length===3&&(
          <div className="fade-in-up" style={{padding:"14px 24px 0",maxWidth:400,margin:"0 auto"}}>
            <button onClick={doReveal}
              onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
              onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}
              style={{width:"100%",padding:"18px 24px",background:`linear-gradient(135deg,${aObj.color}ee,${aObj.color}aa)`,border:"none",borderRadius:50,color:"#fff",fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",letterSpacing:".04em",cursor:"pointer",boxShadow:`0 8px 32px ${aObj.color}48`,transition:"transform .2s"}}>Rivela il Destino ✦</button>
          </div>
        )}
        <div style={{textAlign:"center",marginTop:18}}>
          <button onClick={reset} style={{background:"none",border:"none",color:"rgba(31,31,36,0.38)",fontFamily:"'Inter',sans-serif",fontSize:"11px",letterSpacing:".06em",cursor:"pointer"}}>← cambia dominio</button>
        </div>
      </div>
    </div>
  );

  /* ── REVEAL ── */
  const pickedCards=picked.map(i=>deck[i]);
  return(
    <div style={{minHeight:"100vh",background:tarotUi.bg,color:tarotUi.text,paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 80px)"}}>
      {/* Stars */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>
        {[...Array(18)].map((_,i)=>(
          <div key={i} style={{position:"absolute",width:1.5,height:1.5,borderRadius:"50%",background:"rgba(25,25,35,0.07)",top:`${(i*41+9)%100}%`,left:`${(i*67+17)%100}%`,animation:`pulse ${2+(i*0.31)%2.5}s ${(i*0.19)%2.5}s ease-in-out infinite`}}/>
        ))}
      </div>
      <div style={{position:"relative",zIndex:1}}>
        {/* Header */}
        <div style={{background:"rgba(255,255,255,0.92)",borderBottom:`1px solid ${tarotUi.border}`,padding:"clamp(44px,10vw,64px) 24px 28px",textAlign:"center"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:`${aObj.color}20`,border:`1px solid ${aObj.color}55`,borderRadius:20,padding:"7px 18px",marginBottom:16}}>
            {aObj.img?<img src={aObj.img} alt={aObj.label} style={{width:18,height:18,objectFit:"contain"}}/>:<span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"16px",color:aObj.color}}>{aObj.icon}</span>}
            <span style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:600,color:aObj.color,letterSpacing:".06em",textTransform:"uppercase"}}>{aObj.label}</span>
          </div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(24px,7vw,34px)",fontWeight:500,color:tarotUi.text,marginBottom:4}}>La Tua Lettura</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"14px",fontStyle:"italic",color:tarotUi.muted}}>Passato · Presente · Futuro</div>
          <div style={{width:36,height:1,background:`linear-gradient(to right,transparent,${aObj.color}65,transparent)`,margin:"16px auto 0"}}/>
        </div>

        {/* Cards */}
        <div style={{padding:"24px 18px 0",display:"flex",flexDirection:"column",gap:14,maxWidth:560,margin:"0 auto"}}>
          {pickedCards.map((card,i)=>(
            <div key={i}>
              {!flipped[i]?(
                <div style={{borderRadius:14,height:68,background:"linear-gradient(135deg,#ffffff,#f3f3fa)",border:`1px solid ${aObj.color}20`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"20px",color:`${aObj.color}40`,animation:"pulse 1.8s ease-in-out infinite"}}>✦</div>
                </div>
              ):(
                <div className="fade-in-up" style={{background:"linear-gradient(160deg,#ffffff,#f8f8fd)",borderRadius:14,border:`1px solid ${aObj.color}30`,overflow:"hidden",boxShadow:"0 8px 28px rgba(20,20,30,0.09)"}}>
                  <div style={{background:`linear-gradient(135deg,${aObj.color}18,transparent)`,borderBottom:`0.5px solid ${aObj.color}28`,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:14}}>
                      <div style={{width:40,height:40,borderRadius:10,background:`${aObj.color}18`,border:`1px solid ${aObj.color}35`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"17px",color:aObj.color,lineHeight:1}}>{TROM[card.n]}</div>
                      </div>
                      <div>
                        <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:600,letterSpacing:".1em",color:`${aObj.color}90`,textTransform:"uppercase",marginBottom:3}}>{TPOS[i]}</div>
                        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"19px",fontWeight:600,color:tarotUi.text,letterSpacing:"-.01em"}}>{card.name}</div>
                      </div>
                    </div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"32px",color:`${aObj.color}45`,lineHeight:1,flexShrink:0}}>{card.sym}</div>
                  </div>
                  <div style={{padding:"18px 20px"}}>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(16px,4.2vw,18px)",color:"rgba(31,31,36,0.82)",lineHeight:1.95,fontStyle:"italic"}}>{card[aObj.key]}</div>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Done */}
        {flipped.every(Boolean)&&(
          <div className="fade-in" style={{padding:"32px 20px 0",textAlign:"center",maxWidth:560,margin:"0 auto"}}>
            <div style={{width:28,height:1,background:`linear-gradient(to right,transparent,${aObj.color}55,transparent)`,margin:"0 auto 18px"}}/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"13px",fontStyle:"italic",color:"rgba(31,31,36,0.45)",marginBottom:24}}>La lettura è completa ✦</div>
            <button onClick={reset}
              onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
              onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}
              style={{padding:"16px 44px",background:`linear-gradient(135deg,${aObj.color}ee,${aObj.color}99)`,border:"none",borderRadius:50,color:"#fff",fontFamily:"'Cormorant Garamond',serif",fontSize:"18px",letterSpacing:".04em",cursor:"pointer",transition:"transform .2s",boxShadow:`0 8px 28px ${aObj.color}40`}}>Nuova Lettura</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   GRIMORIO — 22 Arcani Maggiori
══════════════════════════════════════════════════════ */
const GRIMOIRE_CARDS=[
  {n:0,name:"Il Matto",rom:"0",archetype:"Il Fanciullo Divino · Il Caos Primordiale",symbol_meaning:"Il precipizio non è la fine, ma l'inizio. Il cane che morde la gamba raffigura gli istinti base e i moniti della società che cercano di trattenerlo — ma lui guarda verso l'infinito. Il fardello è leggero: ha con sé solo l'essenziale dell'anima.",upright:{general:"Un nuovo inizio totale. Fiducia cieca nell'universo, incoscienza necessaria per fare il primo passo. Il coraggio di sembrare folli agli occhi degli altri.",amore:"Un amore impulsivo, libero, senza etichette. Lasciarsi andare all'emozione senza calcolare i rischi.",lavoro:"Un salto nel vuoto professionale. Lasciare il posto fisso per un'intuizione. Creatività senza limiti.",salute:"Vitalità esplosiva ma disordinata. Bisogno di movimento libero, passeggiate senza meta.",soldi:"Spese impulsive, ma anche guadagni improvvisi. Il denaro non è una priorità, è un'energia che fluisce."},reversed:{general:"L'ingenuità diventa stupidità. Rischio calcolato male, fuga dalle responsabilità. Il salto nel vuoto senza paracadute.",amore:"Un partner inaffidabile, immaturo. Paura cronica dell'impegno mascherata da spirito libero.",lavoro:"Caos organizzativo. Mille progetti iniziati senza portarne a termine uno. Decisioni avventate.",salute:"Incuria del corpo. Ignorare sintomi per pura distrazione o incoscienza.",soldi:"Grave irresponsabilità finanziaria. Sperperare risorse senza pensare al domani."}},
  {n:1,name:"Il Mago",rom:"I",archetype:"Il Creatore · Il Volontà Incarnata",symbol_meaning:"Il Mago tiene un bastone verso il cielo e indica la terra: fa scendere l'energia divina nel mondo materiale. Sul suo tavolo i quattro strumenti del cosmo: coppa, denaro, spada, bacchetta. Il simbolo dell'infinito sopra la testa: padroneggia il tempo.",upright:{general:"Hai tutti gli strumenti necessari. Il momento per agire è adesso — la volontà unita all'azione crea realtà.",amore:"Il tuo carisma è al massimo. Usa l'intenzione con eleganza: puoi creare la connessione che desideri.",lavoro:"Le tue capacità sono pienamente attive. Non aspettare il momento perfetto: il momento perfetto sei tu adesso.",salute:"Mente e corpo lavorano all'unisono. Inizia il programma di benessere che hai rimandato.",soldi:"La manifestazione è possibile: definisci con precisione cosa vuoi e agisci con determinazione."},reversed:{general:"Talento sprecato, manipolazione o blocco creativo. Usare i propri doni per ingannare invece di costruire.",amore:"Giochi di potere nella relazione. Qualcuno usa il carisma per manipolare invece di amare.",lavoro:"Insicurezza mascherata da arroganza. Potenziale non espresso per paura del fallimento.",salute:"Energie disperse in troppe direzioni. Concentrati su una cosa alla volta.",soldi:"Speculazioni rischiose o truffe. Verifica ogni promessa di guadagno facile."}},
  {n:2,name:"La Papessa",rom:"II",archetype:"L'Oracolo Silenzioso · La Custode dei Misteri",symbol_meaning:"Seduta tra due colonne — Boaz e Jachin, luce e oscurità — la Papessa regge il libro dei misteri chiuso. Il velo dietro di lei nasconde il santuario interiore. La luna ai suoi piedi: governa i cicli profondi dell'inconscio.",upright:{general:"La risposta è già dentro di te. Il silenzio strategico, l'ascolto profondo e l'intuizione sono più potenti di qualsiasi azione.",amore:"Il tuo cuore sa già la verità che la mente non vuole ammettere. Smetti di razionalizzare: senti.",lavoro:"Osserva prima di agire. La discrezione e la raccolta silenziosa di informazioni ti daranno un vantaggio decisivo.",salute:"Il corpo ti invia messaggi sottili. Fermati, ascolta, non ignorare la voce interiore.",soldi:"Non rivelare i tuoi piani finanziari. La discrezione è la tua protezione."},reversed:{general:"Segreti tossici, intuizioni ignorate, superficialità. Rifiuto di guardare in profondità.",amore:"Rifiuto di vedere i segnali chiari. Ignorare l'intuizione riguardo a un partner porta delusioni.",lavoro:"Informazioni nascoste che bloccano il progresso. Qualcuno ti nasconde qualcosa di importante.",salute:"Negazione dei sintomi. Rimandare visite mediche per paura di ciò che potresti scoprire.",soldi:"Mancanza di trasparenza in accordi finanziari. Diffida delle clausole in piccolo."}},
  {n:3,name:"L'Imperatrice",rom:"III",archetype:"La Grande Madre · La Natura Abbondante",symbol_meaning:"Incoronata di dodici stelle — una per ogni segno — siede in un trono di lusso nel cuore della natura. Il suo abito porta melograni, simbolo di fertilità. Lo scudo a forma di cuore con il simbolo di Venere: l'amore come forza creatrice del cosmo.",upright:{general:"Abbondanza, fertilità, creatività in piena fioritura. È il tempo di nutrire, creare e ricevere.",amore:"Il tuo fascino irradia calore autentico. Una relazione si approfondisce o nasce qualcosa di nuovo e fertile.",lavoro:"La creatività applicata al lavoro porta risultati straordinari. Fidati del tuo gusto estetico.",salute:"Nutri il corpo con piacere: cibo, natura, bellezza, sensualità sono medicine reali.",soldi:"L'abbondanza cresce quando la curi con dedizione. Pianifica, semina, attendi il raccolto."},reversed:{general:"Blocco creativo, dipendenza, eccesso o scarsità. Smettere di nutrirsi e nutrire.",amore:"Possessività o dipendenza emotiva. Soffoca l'altro nel tentativo di tenerlo vicino.",lavoro:"Perfezionismo paralizzante o blocco creativo. La paura del giudizio impedisce la creazione.",salute:"Trascurare il corpo, mangiare disordinatamente, disconnettersi dalla natura.",soldi:"Eccesso o scarsità estrema. Riportare equilibrio tra dare e ricevere."}},
  {n:4,name:"L'Imperatore",rom:"IV",archetype:"Il Padre Archetipico · La Struttura del Mondo",symbol_meaning:"Sul trono di pietra ornato di arieti — simbolo di Marte — regge lo scettro e l'orbe: autorità e dominio. L'armatura sotto le vesti: pronto alla guerra anche nel trono. Le montagne sullo sfondo rappresentano la solidità assoluta su cui si fonda il suo regno.",upright:{general:"Struttura, autorità e fondamenta solide. Il momento di prendere il comando con disciplina e chiarezza.",amore:"Un amore stabile e protettivo. La solidità emotiva è il dono che puoi offrire o ricevere.",lavoro:"Prendi il comando. La tua leadership è matura e pronta per essere riconosciuta e valorizzata.",salute:"Disciplina fisica, routine strutturata, protezione del corpo come di un castello.",soldi:"Consolida le fondamenta finanziarie. Pianifica a lungo termine con metodo e determinazione."},reversed:{general:"Tirannia, rigidità, controllo ossessivo. Il potere usato per dominare invece di costruire.",amore:"Dominanza, inflexibilità emotiva. Relazione come contratto di controllo anziché connessione.",lavoro:"Un superiore autoritario o la tua stessa rigidità blocca la crescita.",salute:"Tensioni accumulate per eccessivo controllo. Il corpo reclama leggerezza.",soldi:"Avarizia, controllo finanziario ossessivo. Separare il valore personale dal patrimonio."}},
  {n:5,name:"Il Papa",rom:"V",archetype:"Il Mediatore Sacro · La Tradizione Viva",symbol_meaning:"Tra le due colonne del tempio, il Papa incrocia le dita in un gesto di benedizione esoterica — tre dita alzate verso il cielo, due rivolte verso terra. Ai suoi piedi due monaci: la dualità che cerca sintesi. La triplice croce: tre mondi che governa con la parola.",upright:{general:"Tradizione, guida spirituale, istituzione. Il momento di cercare un mentore o di onorare la saggezza tramandataci.",amore:"Un amore autentico e fondato su valori condivisi. La cerimonia, l'impegno formale, la promessa.",lavoro:"Un mentore o una struttura consolidata ti guida verso il successo. Rispetta le regole prima di cambiarle.",salute:"La saggezza tradizionale — riposo, regolarità, rituali — è la tua medicina più potente.",soldi:"Seguire metodi collaudati e consigli di esperti affidabili protegge e fa crescere il patrimonio."},reversed:{general:"Dogmatismo, conformismo oppressivo, ipocrisia religiosa o istituzionale.",amore:"Relazione soffocata dalla tradizione o dalla famiglia. Pressione sociale che pesa più dell'amore.",lavoro:"Burocrazia oppressiva o guru manipolatori. Metti in discussione le autorità che non ispirano.",salute:"Dipendenza da autorità mediche senza ascoltare il proprio corpo. Cerca seconde opinioni.",soldi:"Seguire ciecamente consigli finanziari senza capire. Informati prima di affidarti."}},
  {n:6,name:"Gli Amanti",rom:"VI",archetype:"La Scelta Sacra · L'Unione degli Opposti",symbol_meaning:"Adamo ed Eva sotto l'angelo Raffaele — non la tentazione, ma la scelta consapevole. Il serpente nell'albero e l'albero in fiamme: eros e logos, istinto e ragione. L'angelo porta la benedizione a chi sceglie con tutto il cuore.",upright:{general:"Una scelta fondamentale si avvicina. Non tra bene e male, ma tra due versioni della tua vita.",amore:"Una connessione profonda e autentica. Questo è il momento dell'apertura totale e della vulnerabilità scelta.",lavoro:"Una partnership lavorativa può trasformare la tua carriera. Valuta con il cuore, non solo con la logica.",salute:"L'armonia tra mente e corpo nasce dalle tue scelte quotidiane. Ogni piccola scelta è un atto d'amore.",soldi:"Una collaborazione economica porta benefici reciproci. Scegli i partner finanziari con cura."},reversed:{general:"Scelte sbagliate, indecisione cronica, disarmonia interna. Fuggire dall'impegno.",amore:"Relazione senza allineamento di valori. Restate insieme per abitudine, non per scelta.",lavoro:"Conflitti con soci o colleghi. Un'alleanza che sembrava promettente si rivela tossica.",salute:"Stile di vita in contraddizione con i valori. Riconoscere le scelte autodistruttive.",soldi:"Accordi finanziari mal valutati. Rimandare scelte finanziarie per paura."}},
  {n:7,name:"Il Carro",rom:"VII",archetype:"Il Guerriero Vittorioso · La Volontà in Movimento",symbol_meaning:"Il condottiero tiene le redini di due sfingi — una bianca e una nera — senza frusta, solo con la forza della mente. Il baldacchino stellato sopra la testa: porta il cielo con sé. La luna sulle spalle, le stelle sul petto: governa le forze contrarie con maestria.",upright:{general:"La vittoria è a portata di mano. Concentra la volontà, tieni il controllo e avanza senza deviazioni.",amore:"La determinazione conquista. Dimostra con i fatti ciò che senti. Non cedere alla paura dell'intimità.",lavoro:"Avanza senza esitare. Questo è il momento della spinta decisiva verso il tuo obiettivo professionale.",salute:"Il tuo corpo è pronto per la sfida fisica. Allenamento intenso porta ora risultati straordinari.",soldi:"Muoviti con decisione verso i tuoi obiettivi finanziari. La strada è libera per chi ha chiarezza."},reversed:{general:"Perdita di direzione, aggressività, vittoria a qualsiasi costo che causa danni collaterali.",amore:"Controllo invece di connessione. Un partner che usa la forza per dominare invece di costruire.",lavoro:"Arroganza, impulsività nelle decisioni. La fretta genera errori costosi.",salute:"Overtraining, esaurimento fisico per spingere troppo oltre i limiti.",soldi:"Investimenti impulsivi e rischiosi. Rallenta e analizza prima di agire."}},
  {n:8,name:"La Forza",rom:"VIII",archetype:"La Grazia Dominante · Il Coraggio Silenzioso",symbol_meaning:"Una donna chiude serenamente le fauci di un leone — non con la forza bruta ma con la dolcezza assoluta. Il simbolo dell'infinito sopra la testa: questa grazia è senza limiti. Il leone è l'istinto animale addomesticato dalla coscienza amorevole, non repressa.",upright:{general:"La vera forza non urla. La perseveranza gentile, la grazia sotto pressione, il coraggio che non si vede.",amore:"La dolcezza è più potente della passione sfrenata. Tieni le briglie della relazione con amore.",lavoro:"La perseveranza silenziosa supera ogni ostacolo. Non hai bisogno di imporrti: sei già potente.",salute:"La guarigione richiede forza interiore più che farmaci. Credi nella capacità del tuo corpo.",soldi:"La costanza trasforma piccoli risparmi in grande ricchezza nel tempo. Non mollare."},reversed:{general:"Debolezza di carattere, dipendenza, paura di affrontare le proprie ombre interiori.",amore:"Lasciare che l'altro detti le regole per paura del conflitto. Perdita di sé nella relazione.",lavoro:"Cedere alla pressione invece di tenere il punto. La forza interiore è temporaneamente oscurata.",salute:"Esaurimento emotivo, burnout. Il corpo riflette la mente sopraffatta.",soldi:"Incapacità di resistere all'impulso di spendere. Mancanza di disciplina finanziaria."}},
  {n:9,name:"L'Eremita",rom:"IX",archetype:"Il Saggio Solitario · La Luce nella Notte",symbol_meaning:"In cima alla montagna, nella neve, regge una lanterna con una stella a sei punte — la Stella di Davide, simbolo dell'unione tra alto e basso. Il bastone nella mano sinistra: sostegno per il cammino verso l'interno. Il mantone grigio: la saggezza non ha bisogno di ornamenti.",upright:{general:"Il ritiro è la forma più alta di produttività. La risposta che cerchi si trova nel silenzio interiore.",amore:"Un periodo di solitudine chiarisce ciò che vuoi davvero dall'amore. Non confondere solitudine e abbandono.",lavoro:"Ritirarsi per riflettere è il gesto più strategico che tu possa fare adesso. La mente chiarisce nel silenzio.",salute:"Il corpo si rigenera nel riposo profondo. Concediti il ritiro, lo stacco, la natura.",soldi:"Una revisione solitaria delle tue finanze rivela soluzioni inaspettate. Analisi prima di azione."},reversed:{general:"Isolamento patologico, rifiuto del mondo, misantropia. L'eremita che ha perso la lanterna.",amore:"Chiudersi all'amore per paura della vulnerabilità. Solitudine scelta per non rischiare.",lavoro:"Isolamento professionale controproducente. Non tutto si risolve da soli: chiedi aiuto.",salute:"Depressione, ritiro eccessivo dalla vita sociale. Il corpo soffre nell'isolamento totale.",soldi:"Avarizia, accumulazione ansiosa. Tenere tutto sotto controllo per paura della perdita."}},
  {n:10,name:"La Ruota della Fortuna",rom:"X",archetype:"Il Ciclo Eterno · La Legge del Karma",symbol_meaning:"La ruota gira con i simboli delle quattro creature angeliche negli angoli — aquila, leone, toro, uomo — che corrispondono ai quattro elementi e ai quattro evangelisti. Sul bordo: TARO, TORA, ROTA. Al centro Hermanubis sale, il serpente Typhon scende, la Sfinge regna: tutto cambia, la coscienza resta.",upright:{general:"Il ciclo cambia a tuo favore. Una svolta è in arrivo: preparati a cavalcare l'onda.",amore:"Il destino porta un incontro o una trasformazione nella relazione. Apriti ai cambiamenti.",lavoro:"Un giro di fortuna professionale è imminente. Preparati, posizionati, lasciati sorprendere.",salute:"Un cambiamento nel ciclo vitale porta nuova energia. La crisi era il preludio alla rinascita.",soldi:"La ruota gira verso l'abbondanza. Cogli l'opportunità che si presenta adesso."},reversed:{general:"Resistenza al cambiamento, sfortuna, cicli negativi che si ripetono perché non appresi.",amore:"Un pattern relazionale si ripete. La ruota è bloccata perché la lezione non è stata appresa.",lavoro:"Rallentamento, sfortuna, opportunità mancate. Non combattere il ciclo: capisci il messaggio.",salute:"Ricadute ricorrenti. Il corpo segnala che qualcosa nel ciclo di vita va cambiato.",soldi:"Perdite finanziarie cicliche. Rivedi le radici del pattern prima di agire."}},
  {n:11,name:"La Giustizia",rom:"XI",archetype:"La Verità Senza Velo · L'Equilibrio Cosmico",symbol_meaning:"Siede tra due colonne come la Papessa, ma senza velo: tutto è visibile. La spada a doppio taglio nella mano destra — la verità taglia in entrambe le direzioni. La bilancia nella sinistra: pesa ogni pensiero, azione, conseguenza. La corona a tre punte: governa i tre mondi.",upright:{general:"Il momento della verità. Ogni azione ha un peso cosmico: sii onesto con te stesso prima che con gli altri.",amore:"La chiarezza e l'onestà costruiscono l'amore duraturo. Una conversazione difficile porta libertà.",lavoro:"Una valutazione professionale richiede la tua piena onestà. Il merito viene riconosciuto.",salute:"Equilibra gli eccessi: il corpo risponde alla giustizia che ti fai. Né troppo né troppo poco.",soldi:"Bilancia entrate e uscite con precisione. La chiarezza contabile porta stabilità duratura."},reversed:{general:"Ingiustizia, disonestà, evitare le conseguenze delle proprie azioni. Il karma ritardato.",amore:"Manipolazione, bugie o squilibrio di potere nella relazione. Pretendere più di quanto si offre.",lavoro:"Situazioni lavorative ingiuste o valutazioni distorte. Documenta tutto.",salute:"Ignorare i segnali del corpo. Le conseguenze di cattive abitudini si accumulano.",soldi:"Frodi, disonestà finanziaria, debiti nascosti. La verità emerge sempre."}},
  {n:12,name:"L'Appeso",rom:"XII",archetype:"Il Sacrificio Volontario · La Resa Illuminante",symbol_meaning:"Appeso per un piede al Tau — la croce dell'immortalità — con l'altro ginocchio piegato a formare la croce dei quattro elementi. La testa irradia una luce dorata: è nel dolore scelto che nasce l'illuminazione. Non è vittima: ha scelto questa posizione per vedere il mondo al contrario.",upright:{general:"La resa non è sconfitta. Fermarsi, lasciare andare, ribaltare la prospettiva: questa è la via della trasformazione.",amore:"Una pausa nella relazione non è la fine — è il prezzo necessario della trasformazione profonda.",lavoro:"Questo non è il momento di forzare. L'attesa ha un significato strategico che si rivelerà.",salute:"Fermati completamente. Il corpo chiede resa, non resistenza. Il riposo assoluto è medicina.",soldi:"Blocca ogni decisione finanziaria importante finché la nebbia non si dirada completamente."},reversed:{general:"Vittimismo, martirio inutile, sacrificio senza consapevolezza, resistenza al necessario.",amore:"Restare in una relazione dolorosa per paura del vuoto. Il sacrificio senza trasformazione.",lavoro:"Bloccato in una situazione che non porta crescita. Il momento di agire, non di aspettare.",salute:"Negligenza mascherata da accettazione. Distinguere il riposo necessario dall'evitamento.",soldi:"Rimandare decisioni finanziarie per paura. L'indecisione ha un costo reale."}},
  {n:13,name:"La Morte",rom:"XIII",archetype:"Il Grande Trasformatore · La Fine come Porta",symbol_meaning:"Lo scheletro cavalca un cavallo bianco — la purezza della fine — sopra corpi di ogni casta: papa, re, bambino, donna. Non discrimina. La bandiera bianca con la rosa nera: la vita che nasce dalla morte. In lontananza il sole sorge tra due torri: dall'altra parte c'è sempre una nuova alba.",upright:{general:"Un ciclo si chiude irrevocabilmente. Non si muore: si diventa. La fine più totale è il seme del tuo prossimo io.",amore:"Una relazione che era già finita può finalmente concludersi. O una trasformazione così profonda da rinascere.",lavoro:"La fine di una fase lavorativa è necessaria e, in retrospettiva, sarà vista come la tua rinascita.",salute:"Abbandona le abitudini che consumano la tua vitalità. Il corpo vuole trasformarsi, non solo guarire.",soldi:"Chiudi conti aperti, vecchi debiti e accordi scaduti. Solo così arriva nuova abbondanza."},reversed:{general:"Resistenza alla fine inevitabile, stagnazione, paura del cambiamento che paralizza la vita.",amore:"Relazione zombie: finita ma non ancora sepolta. Il rifiuto di lasciar andare imprigiona entrambi.",lavoro:"Incapacità di chiudere un capitolo professionale. Resistere a cambiamenti necessari.",salute:"Abitudini tossiche radicate impossibili da abbandonare. Cercare supporto esterno.",soldi:"Debiti che si accumulano per rifiuto di affrontare la situazione finanziaria reale."}},
  {n:14,name:"La Temperanza",rom:"XIV",archetype:"L'Alchimista dell'Anima · L'Equilibrio Dinamico",symbol_meaning:"Un angelo androgino versa acqua tra due calici dorati — ma l'acqua scorre verso l'alto, controgravità: questo è il miracolo dell'alchimia interiore. Un piede nell'acqua, uno sulla terra. Sul petto il triangolo nel quadrato: lo spirito contenuto nella materia. Il sole al termine del sentiero.",upright:{general:"La trasformazione silenziosa. L'alchimia della vita quotidiana che, con pazienza, trasforma il piombo in oro.",amore:"La pazienza e la moderazione trasformano l'attrazione in un amore vero e duraturo.",lavoro:"L'equilibrio tra ambizione e pace interiore è la tua formula del successo sostenibile.",salute:"Ritmo, regolarità e moderazione sono il tuo elisir di lunga vita. Nessun eccesso.",soldi:"La gestione equilibrata e metodica delle risorse crea ricchezza stabile nel lungo periodo."},reversed:{general:"Squilibrio, eccessi, impazienza, tentativi di forzare processi che hanno bisogno di tempo.",amore:"Relazione sbilanciata, aspettative irrealistiche, impazienza nei confronti della crescita dell'altro.",lavoro:"Burn-out per mancanza di equilibrio tra lavoro e vita. Il corpo manda segnali.",salute:"Eccessi in ogni direzione. Mancanza di routine e disciplina quotidiana.",soldi:"Spese compulsive o risparmio ossessivo. Trovare il punto di equilibrio."}},
  {n:15,name:"Il Diavolo",rom:"XV",archetype:"L'Ombra Incarnata · Le Catene Scelte",symbol_meaning:"Il Baphomet alato siede sul suo trono di pietra. Ai suoi piedi Adamo ed Eva incatenati — ma le catene sono larghe: potrebbero toglierle in qualsiasi momento. Non è il male esterno: è la dipendenza che scegliamo, l'ombra che non vogliamo vedere, il piacere che diventa prigione.",upright:{general:"Riconoscere le proprie dipendenze e pattern autodistruttivi è già metà della liberazione.",amore:"Una dipendenza emotiva ti incatena. Riconosci il pattern tossico per poter scegliere diversamente.",lavoro:"Una situazione lavorativa tossica ti drena lentamente. Le catene sono reali, ma apribili.",salute:"Vizi e eccessi si riflettono concretamente sul corpo. Questo è il momento di spezzare il ciclo.",soldi:"Un'ossessione per il denaro o un debito nascosto richiede attenzione urgente e onesta."},reversed:{general:"Inizio della liberazione dalle catene, riconoscimento delle dipendenze, risveglio dall'illusione.",amore:"Stai iniziando a liberarti da una relazione tossica o da una dipendenza emotiva.",lavoro:"Finalmente vedi la trappola lavorativa per quello che è. Il coraggio di uscire si sta formando.",salute:"La voglia di spezzare il ciclo è più forte della dipendenza. Cerca supporto: ce la fai.",soldi:"Inizia a liberarti da debiti o da un rapporto malsano con il denaro."}},
  {n:16,name:"La Torre",rom:"XVI",archetype:"Il Crollo Necessario · La Verità Fulmine",symbol_meaning:"La corona salta via dalla torre colpita dal fulmine — il potere artificialmente conquistato viene spazzato via. Due figure cadono: non si sa se la caduta li uccide o li libera. Le fiamme hanno la forma di yod, la lettera ebraica della creazione divina. La distruzione è atto creativo.",upright:{general:"Un crollo improvviso e totale di ciò che non era reale. Doloroso, necessario, purificante.",amore:"Uno shock emotivo demolisce l'illusione di ciò che credevi fosse la relazione. Resta: è purificazione.",lavoro:"Un cambiamento improvviso e dirompente porta, paradossalmente, la libertà che non osavi chiedere.",salute:"Un collasso fisico o emotivo è un messaggio urgente del corpo. Ascoltalo senza resistenza.",soldi:"Una perdita finanziaria significativa precede una ricostruzione su basi molto più solide."},reversed:{general:"Resistere al cambiamento necessario, ritardare il crollo inevitabile, vivere nella torre che traballa.",amore:"Evitare la crisi che potrebbe salvare la relazione. La paura del crollo è peggio del crollo stesso.",lavoro:"Restare in una situazione professionale instabile per paura del vuoto che segue.",salute:"Ignorare sintomi gravi. Il corpo non mente: la torre sta tremando.",soldi:"Rischiare il collasso finanziario per non affrontare la situazione reale."}},
  {n:17,name:"La Stella",rom:"XVII",archetype:"La Speranza Cosmica · La Guarigione dopo il Buio",symbol_meaning:"Una donna inginocchiata — nuda, vulnerabile, senza armatura — versa acqua da due anfore: una nella fonte, una sulla terra. Sette stelle piccole e una grande, a otto punte: la stella di Venere, dell'alba. L'ibis di Thoth sull'albero: la sapienza che ritorna dopo il caos della Torre.",upright:{general:"Dopo la tempesta arriva la chiarezza stellare. Speranza genuina, non illusione: la guarigione è in corso.",amore:"La fiducia nell'amore rinasce dopo le ferite. L'apertura vulnerabile attrae ciò che è autentico.",lavoro:"Dopo la crisi professionale arriva la chiarezza sulla direzione. Il tuo percorso è reale.",salute:"La guarigione è in corso a livello profondo. Il tuo sistema si sta riequilibrando.",soldi:"Una fase di rinascita finanziaria si apre. Pianta i semi con fede e metodicità."},reversed:{general:"Speranza perduta, disperazione, aspettarsi la catastrofe. L'illusione al posto della vera speranza.",amore:"Idealizzare un amore impossibile o disperare di trovarne uno reale.",lavoro:"Perdita di fiducia nel proprio percorso professionale. La stella è ancora lì, solo coperta dalle nuvole.",salute:"Depressione persistente, perdita di speranza nella guarigione. Cerca supporto professionale.",soldi:"Pessimismo finanziario che diventa profezia autoavverante."}},
  {n:18,name:"La Luna",rom:"XVIII",archetype:"Il Sogno · Le Acque dell'Inconscio",symbol_meaning:"La luna piena e crescente illumina un paesaggio ambiguo: un gambero esce dall'acqua primordiale, un cane e un lupo ululano — il domestico e il selvatico convivono. Due torri all'orizzonte marcano la soglia del conscio e dell'inconscio. Il cammino è stretto e serpeggiante: nessuno sa dove porta.",upright:{general:"Il regno del sogno, dell'illusione e dell'inconscio. Niente è come sembra: vai in profondità.",amore:"Paure e proiezioni distorcono la realtà della relazione. Distingui la persona reale dall'immagine che hai creato.",lavoro:"Non tutto è come appare nel contesto professionale. Qualcosa di importante è nascosto: cerca.",salute:"I cicli emotivi profondi influenzano concretamente il corpo. Ascolta i ritmi dell'inconscio.",soldi:"Attenzione alle illusioni finanziarie. Verifica ogni promessa: le cose non sono come sembrano."},reversed:{general:"Chiarezza che emerge dal caos, liberarsi dalle illusioni, vedere finalmente la verità.",amore:"Le nebbie si diradano: vedi finalmente la persona che ti sta accanto per quello che è.",lavoro:"La confusione professionale si risolve. Emerge finalmente la verità di una situazione.",salute:"Le radici emotive di un problema fisico emergono alla consapevolezza.",soldi:"La confusione finanziaria si chiarisce. Arriva la lucidità necessaria per decidere."}},
  {n:19,name:"Il Sole",rom:"XIX",archetype:"La Coscienza Radiante · La Gioia Essenziale",symbol_meaning:"Un bambino nudo su un cavallo bianco, senza redini, con una bandiera rossa: vittoria innocente, gioia pura. Quattro girasoli alle sue spalle guardano verso di lui, non verso il sole: lui è la fonte. La corona di piume: il pensiero che vola libero. Il muro di mattoni: il passato superato.",upright:{general:"La gioia autentica, il successo radioso, la vitalità al massimo. Questo è il tuo momento di brillare.",amore:"Un amore luminoso, caldo, autentico. La gioia nella relazione è genuina e irradiante.",lavoro:"Il successo professionale è luminoso e visibile. Il tuo talento viene finalmente riconosciuto.",salute:"Vitalità piena, benessere radiante. Il corpo è in perfetta armonia con la mente.",soldi:"Abbondanza solare: guadagni, prosperità e opportunità affluiscono in questo periodo."},reversed:{general:"Ottimismo eccessivo, arroganza, dipendenza dalla validazione esterna. La luce accecante.",amore:"Egocentrismo nella relazione, aspettativa che l'altro ruoti intorno a te.",lavoro:"Successo che monta alla testa. Attenzione all'arroganza che allontana alleati preziosi.",salute:"Eccesso di energia che brucia: impara a conservarla oltre che a irradiarla.",soldi:"Ottimismo finanziario non fondato su dati reali. Verifica prima di spendere in grande."}},
  {n:20,name:"Il Giudizio",rom:"XX",archetype:"La Risveglio · La Chiamata dell'Anima",symbol_meaning:"Un angelo — Gabriele — soffia nella tromba e i morti risorgono dalle tombe. Non è il giudizio divino esterno: è il momento in cui l'anima sente la propria vocazione e risponde. Le croci sui flagelli sono Tau, simbolo della trasformazione. Il mare sullo sfondo: l'inconscio che restituisce ciò che era sommerso.",upright:{general:"La chiamata alla rinascita. Il momento in cui senti la tua vocazione più profonda e scegli di rispondere.",amore:"Un invito a rinascere insieme nella relazione, a perdonare il passato e creare qualcosa di nuovo.",lavoro:"Una valutazione finale ti posiziona per il prossimo grande capitolo professionale. Sei pronto.",salute:"Il tuo corpo chiede una trasformazione profonda e radicale. Rispondi all'appello senza indugio.",soldi:"Un bilancio definitivo apre la strada a una nuova fase di prosperità e abbondanza."},reversed:{general:"Ignorare la chiamata dell'anima, paura del risveglio, rimandare la trasformazione per sempre.",amore:"Rifiutare la possibilità di rinascita nella relazione. Il passato non perdonato blocca il futuro.",lavoro:"Perdere l'occasione di un grande salto professionale per paura del cambiamento.",salute:"Resistere alla trasformazione che il corpo e l'anima chiedono urgentemente.",soldi:"Rimandare il bilancio definitivo che libererebbe dal peso finanziario accumulato."}},
  {n:21,name:"Il Mondo",rom:"XXI",archetype:"L'Integrazione Totale · La Danza della Completezza",symbol_meaning:"Una figura danzante — avvolta in un drappo viola che è anche assenza — tiene due bacchette, come il Mago all'inizio. Ma ora danza. La corona di alloro ovale rappresenta la vittoria completata. Le quattro creature agli angoli: tutti gli elementi integrati. Il Matto è arrivato. Non alla fine: al centro.",upright:{general:"Il ciclo si completa. Non la fine, ma la pienezza. Sei arrivato al centro di te stesso.",amore:"Un amore che ti rende intero, che integra tutte le parti di te. È qui o si avvicina irresistibilmente.",lavoro:"Il traguardo professionale è raggiunto nella sua completezza. Celebra e prepara il prossimo ciclo.",salute:"Benessere totale, corpo e anima in equilibrio perfetto. Sei al culmine della tua forma.",soldi:"Il ciclo finanziario si completa con successo e soddisfazione profonda."},reversed:{general:"Mancanza di chiusura, cicli incompiuti, quasi arrivare ma non del tutto. Stagnazione all'ultimo passo.",amore:"Una relazione che promette completezza ma rimane incompiuta. Qualcosa blocca l'integrazione finale.",lavoro:"Quasi al traguardo ma qualcosa impedisce la chiusura definitiva. Identifica l'ostacolo.",salute:"Benessere parziale: qualcosa manca per raggiungere l'equilibrio completo. Esplora cosa.",soldi:"Mancato completamento di un ciclo finanziario. L'abbondanza è vicina ma qualcosa la blocca."}},
];

function GrimorioView({onBack}){
  const[idx,setIdx]=useState(0);
  const[rev,setRev]=useState(false);
  const[area,setArea]=useState("general");
  const navRef=useRef(null);
  const card=GRIMOIRE_CARDS[idx];
  const A=ARCANI[idx];
  const AREAS=[{k:"general",l:"Visione"},{k:"amore",l:"Amore"},{k:"lavoro",l:"Lavoro"},{k:"salute",l:"Salute"},{k:"soldi",l:"Soldi"}];
  const gold="#b8892b";

  useEffect(()=>{
    setRev(false);
    setArea("general");
    if(navRef.current){
      const el=navRef.current.querySelector(`[data-i="${idx}"]`);
      if(el)el.scrollIntoView({block:"nearest",inline:"center",behavior:"smooth"});
    }
  },[idx]);

  const bg=rev
    ?"linear-gradient(160deg,#0d0618 0%,#180828 60%,#0a0412 100%)"
    :"linear-gradient(160deg,#f5f3ee 0%,#ede8df 60%,#f2ede4 100%)";
  const textCol=rev?"rgba(228,208,255,0.92)":"#1a1a22";
  const mutedCol=rev?"rgba(190,160,240,0.52)":"rgba(26,26,34,0.48)";
  const brdCol=rev?"rgba(160,100,255,0.16)":"rgba(26,26,34,0.10)";
  const surfCol=rev?"rgba(24,8,44,0.85)":"#ffffff";
  const acc=rev?"#c088ff":gold;

  return(
    <div style={{minHeight:"100vh",background:bg,color:textCol,transition:"background .5s,color .5s",display:"flex",flexDirection:"column"}}>

      {/* ── TOP BAR ── */}
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:100,
        background:rev?"rgba(13,6,24,0.94)":"rgba(245,243,238,0.94)",
        backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",
        borderBottom:`1px solid ${brdCol}`,
        padding:"calc(env(safe-area-inset-top,0px) + 10px) 18px 10px",
        display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>

        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",
          display:"flex",alignItems:"center",gap:5,padding:"6px 0",flexShrink:0}}>
          <span style={{fontSize:"18px",lineHeight:1,color:mutedCol}}>←</span>
          <span style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",letterSpacing:".12em",color:mutedCol}}>indietro</span>
        </button>

        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"13px",
          letterSpacing:".38em",color:acc,textTransform:"uppercase",fontWeight:500,textAlign:"center"}}>
          ⚷ Il Grimorio
        </div>

        <button onClick={()=>setRev(r=>!r)} style={{
          background:rev?`${acc}22`:"transparent",
          border:`1px solid ${rev?acc+"60":brdCol}`,
          borderRadius:20,padding:"5px 12px",cursor:"pointer",flexShrink:0,
          display:"flex",alignItems:"center",gap:5,transition:"all .3s"}}>
          <span style={{fontSize:"14px",display:"inline-block",
            transform:rev?"rotate(180deg)":"rotate(0deg)",
            transition:"transform .5s cubic-bezier(.16,1,.3,1)",color:acc,lineHeight:1}}>☽</span>
          <span style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",
            letterSpacing:".16em",textTransform:"uppercase",color:acc,fontWeight:600}}>
            {rev?"Rovescio":"Dritto"}
          </span>
        </button>
      </div>

      {/* ── SCROLLABLE CONTENT ── */}
      <div style={{flex:1,overflowY:"auto",
        paddingTop:"calc(env(safe-area-inset-top,0px) + 64px)",
        paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 72px)"}}>
        <div style={{maxWidth:520,margin:"0 auto",padding:"24px 18px 8px"}}>

          {/* ─ Numero + Nome + Archetipo ─ */}
          <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:30}}>
            <div style={{flexShrink:0,width:54,height:54,borderRadius:14,
              background:`${acc}14`,border:`1.5px solid ${acc}40`,
              display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"19px",
                color:acc,fontWeight:600,lineHeight:1}}>{card.rom}</span>
            </div>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",
                fontSize:"clamp(26px,7vw,32px)",fontWeight:600,
                color:textCol,lineHeight:1.1,marginBottom:6}}>{card.name}</div>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",
                letterSpacing:".16em",textTransform:"uppercase",
                color:mutedCol,lineHeight:1.6}}>{card.archetype}</div>
            </div>
          </div>

          {/* ─ Simbolo grande ─ */}
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{display:"inline-block",
              fontFamily:"'Cormorant Garamond',serif",
              fontSize:"clamp(72px,18vw,96px)",color:acc,lineHeight:1,
              transform:rev?"rotate(180deg)":"rotate(0deg)",
              transition:"transform .7s cubic-bezier(.16,1,.3,1)",
              filter:rev?`drop-shadow(0 0 20px ${acc}55)`:`drop-shadow(0 0 12px ${acc}33)`}}>
              {A.sym}
            </div>
            <div style={{marginTop:16,display:"flex",justifyContent:"center"}}>
              <div style={{display:"inline-flex",alignItems:"center",gap:6,
                padding:"5px 16px",borderRadius:20,
                background:rev?`${acc}1a`:`${acc}0e`,
                border:`1px solid ${acc}${rev?"55":"2a"}`}}>
                <span style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",
                  letterSpacing:".26em",textTransform:"uppercase",color:acc,fontWeight:600}}>
                  {rev?"◈ Al Rovescio — L'Ombra":"✦ Al Dritto — La Luce"}
                </span>
              </div>
            </div>
          </div>

          {/* ─ Divisore ─ */}
          <div style={{height:1,background:`linear-gradient(to right,transparent,${brdCol} 20%,${brdCol} 80%,transparent)`,marginBottom:24}}/>

          {/* ─ Il Simbolo ─ */}
          <div style={{marginBottom:28}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",
              letterSpacing:".3em",textTransform:"uppercase",color:acc,marginBottom:10}}>
              Il Simbolo
            </div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",
              fontSize:"clamp(15px,4vw,17px)",fontStyle:"italic",
              color:mutedCol,lineHeight:1.95}}>
              {card.symbol_meaning}
            </div>
          </div>

          {/* ─ Divisore ─ */}
          <div style={{height:1,background:`linear-gradient(to right,transparent,${brdCol} 20%,${brdCol} 80%,transparent)`,marginBottom:20}}/>

          {/* ─ Tab aree ─ */}
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,
            marginBottom:16,scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
            {AREAS.map(a=>(
              <button key={a.k} onClick={()=>setArea(a.k)} style={{
                flexShrink:0,padding:"7px 16px",borderRadius:20,
                border:`1px solid ${area===a.k?acc+"80":brdCol}`,
                background:area===a.k?`${acc}1a`:surfCol,
                color:area===a.k?acc:mutedCol,
                fontFamily:"'Cormorant Garamond',serif",fontSize:"14px",
                letterSpacing:".04em",cursor:"pointer",
                transition:"all .22s",whiteSpace:"nowrap"}}>
                {a.l}
              </button>
            ))}
          </div>

          {/* ─ Interpretazione ─ */}
          <div style={{background:surfCol,border:`1px solid ${brdCol}`,
            borderRadius:18,padding:"22px 20px",
            boxShadow:rev?"0 4px 24px rgba(100,0,180,0.10)":"0 4px 20px rgba(0,0,0,0.05)",
            transition:"background .5s,box-shadow .5s"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",
              fontSize:"clamp(17px,4.5vw,20px)",color:textCol,
              lineHeight:1.95,fontWeight:400}}>
              {rev?card.reversed[area]:card.upright[area]}
            </div>
          </div>

        </div>
      </div>

      {/* ── BOTTOM NAV NUMERI ROMANI ── */}
      <div ref={navRef} style={{
        position:"fixed",bottom:0,left:0,right:0,zIndex:100,
        background:rev?"rgba(13,6,24,0.96)":"rgba(245,243,238,0.96)",
        backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",
        borderTop:`1px solid ${brdCol}`,
        paddingBottom:"env(safe-area-inset-bottom,0px)",
        transition:"background .5s"}}>
        <div style={{display:"flex",overflowX:"auto",gap:3,padding:"10px 12px",scrollbarWidth:"none"}}>
          {TROM.map((r,i)=>(
            <button key={i} data-i={i} onClick={()=>setIdx(i)} style={{
              flexShrink:0,minWidth:38,height:38,borderRadius:10,
              border:`1px solid ${idx===i?acc+"90":brdCol}`,
              background:idx===i?`${acc}1c`:"transparent",
              color:idx===i?acc:mutedCol,
              fontFamily:"'Cormorant Garamond',serif",fontSize:"13px",
              cursor:"pointer",transition:"all .18s",
              fontWeight:idx===i?600:400}}>
              {r}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   MEDITAZIONE

const MEDITATIONS=[
  {key:"papessa",name:"La Papessa",number:"II",subtitle:"Calma · Chiarezza · Silenzio",col:"#7888d8",glow:"rgba(120,136,216,",symbol:"☽",bg:"radial-gradient(ellipse at 50% 40%, rgba(70,80,180,0.38) 0%, #030008 65%)",ballColor:[0.12,0.38,1.0],
   pose:"Schiena dritta · mani sulle ginocchia · occhi chiusi",
   breathPhases:[
     {name:"inspira",dur:4,p0:0,p1:1},
     {name:"tieni",dur:2,p0:1,p1:1},
     {name:"espira",dur:6,p0:1,p1:0},

/* ── Perlin 4D noise GLSL (Stefan Gustavson) ── */

/* ══════════════════════════════════════════════════════
   SHADER BALL — Three.js simplex noise sphere + particles
══════════════════════════════════════════════════════ */
const VERT_SHADER = `
  varying vec2 vUv;
  varying vec3 v_color;
  varying vec3 v_normal;
  uniform float u_time;
  uniform float u_progress;

  vec3 hsv2rgb(vec3 c) {
    vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
    vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
    return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
  }

  vec4 permute(vec4 x) { return mod(((x * 34.0) + 1.0) * x, 289.0); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

  float snoise(vec3 v) {
    const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g  = step(x0.yzx, x0.xyz);
    vec3 l  = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + 1.0 * C.xxx;
    vec3 x2 = x0 - i2 + 2.0 * C.xxx;
    vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
    i = mod(i, 289.0);
    vec4 p = permute(permute(permute(
          i.z + vec4(0.0, i1.z, i2.z, 1.0))
        + i.y + vec4(0.0, i1.y, i2.y, 1.0))
        + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 1.0 / 7.0;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j  = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x  = x_ * ns.x + ns.yyyy;
    vec4 y  = y_ * ns.x + ns.yyyy;
    vec4 h  = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0) * 2.0 + 1.0;
    vec4 s1 = floor(b1) * 2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m * m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }

  void main() {
    vUv = uv;
    float noise = snoise(position * u_progress + u_time / 10.0);
    vec3 newPos = position * (noise + 0.7);
    v_color = hsv2rgb(vec3(noise * 0.1 + 0.03, 0.7, 0.7));
    v_normal = normal;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
  }
`;

const FRAG_SHADER = `
  varying vec2 vUv;
  varying vec3 v_color;
  varying vec3 v_normal;
  uniform vec3 u_baseColor;
  void main() {
    vec3 skyColor    = vec3(1.000, 1.000, 0.547);
    vec3 groundColor = vec3(0.562, 0.275, 0.111);
    vec3 lightDirection = normalize(vec3(0.0, -1.0, -1.0));
    vec3 light = mix(skyColor, groundColor, dot(lightDirection, v_normal));
    vec3 tinted = mix(light * v_color, u_baseColor, 0.72);
    gl_FragColor = vec4(tinted, 1.0);
  }
`;

const PARTICLE_VERT = `
  uniform float u_time;
  void main() {
    vec3 p = position;
    p.y += 0.25 * (sin(p.y * 5.0 + u_time) * 0.5 + 0.5);
    p.z += 0.05 * (sin(p.y * 10.0 + u_time) * 0.5 + 0.5);
    vec4 mvPosition = modelViewMatrix * vec4(p, 1.0);
    gl_PointSize = 10.0 * (1.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const PARTICLE_FRAG = `
  uniform float u_progress;
  void main() {
    gl_FragColor = vec4(0.4, 0.4, 0.4, u_progress);
  }
`;

const BG_VERT = `
  varying vec2 vUv;
  uniform float u_time;
  void main() {
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    gl_Position = projectionMatrix * mvPosition;
    vUv = uv;
  }
`;

const BG_FRAG = `
  float hue2rgb(float f1, float f2, float hue) {
    if (hue < 0.0) hue += 1.0;
    else if (hue > 1.0) hue -= 1.0;
    if ((6.0 * hue) < 1.0) return f1 + (f2 - f1) * 6.0 * hue;
    else if ((2.0 * hue) < 1.0) return f2;
    else if ((3.0 * hue) < 2.0) return f1 + (f2 - f1) * ((2.0 / 3.0) - hue) * 6.0;
    return f1;
  }
  vec3 hsl2rgb(vec3 hsl) {
    if (hsl.y == 0.0) return vec3(hsl.z);
    float f2 = hsl.z < 0.5 ? hsl.z * (1.0 + hsl.y) : hsl.z + hsl.y - hsl.y * hsl.z;
    float f1 = 2.0 * hsl.z - f2;
    return vec3(hue2rgb(f1,f2,hsl.x+(1.0/3.0)), hue2rgb(f1,f2,hsl.x), hue2rgb(f1,f2,hsl.x-(1.0/3.0)));
  }
  vec3 hsl2rgb(float h, float s, float l) { return hsl2rgb(vec3(h,s,l)); }

  vec3 random3(vec3 c) {
    float j = 4096.0 * sin(dot(c, vec3(17.0, 59.4, 15.0)));
    vec3 r;
    r.z = fract(512.0 * j); j *= 0.125;
    r.x = fract(512.0 * j); j *= 0.125;
    r.y = fract(512.0 * j);
    return r - 0.5;
  }
  const float F3 = 0.3333333;
  const float G3 = 0.1666667;
  float simplex3d(vec3 p) {
    vec3 s  = floor(p + dot(p, vec3(F3)));
    vec3 x  = p - s + dot(s, vec3(G3));
    vec3 e  = step(vec3(0.0), x - x.yzx);
    vec3 i1 = e * (1.0 - e.zxy);
    vec3 i2 = 1.0 - e.zxy * (1.0 - e);
    vec3 x1 = x - i1 + G3;
    vec3 x2 = x - i2 + 2.0 * G3;
    vec3 x3 = x - 1.0 + 3.0 * G3;
    vec4 w, d;
    w.x = dot(x,x); w.y = dot(x1,x1); w.z = dot(x2,x2); w.w = dot(x3,x3);
    w = max(0.6 - w, 0.0);
    d.x = dot(random3(s),       x);
    d.y = dot(random3(s + i1), x1);
    d.z = dot(random3(s + i2), x2);
    d.w = dot(random3(s + 1.0),x3);
    w *= w; w *= w; d *= w;
    return dot(d, vec4(52.0));
  }
  float hash(vec2 p) { return fract(1e4 * sin(17.0 * p.x + p.y * 0.1) * (0.1 + abs(sin(p.y * 13.0 + p.x)))); }

  varying vec2 vUv;
  uniform float u_time;
  uniform float u_progress;

  void main() {
    float n = simplex3d(vec3(vUv.xy, u_time * 1.0));
    vec3 color = hsl2rgb(0.0 + n * 0.1, 0.0, 0.03);
    float val = hash(vUv + u_time);
    gl_FragColor = vec4(color + vec3(val / 20.0), 1.0);
  }
`;

function ShaderBall({color=[0.60,0.28,0.95]}){
  const mountRef=useRef(null);
  useEffect(()=>{
    const container=mountRef.current;
    if(!container)return;
    let cancelled=false;
    let cleanupFn=null;

    const runSetup=()=>{
      if(cancelled||!container||!window.THREE)return;
      const THREE=window.THREE;
      const scene=new THREE.Scene();
      const w=container.clientWidth, h=container.clientHeight;
      const camera=new THREE.PerspectiveCamera(40,w/h,0.1,10000);
      camera.position.set(0,0,10);
      const renderer=new THREE.WebGLRenderer({antialias:true});
      renderer.setSize(w,h);
      renderer.setPixelRatio(window.devicePixelRatio||1);
      container.appendChild(renderer.domElement);

      const material=new THREE.ShaderMaterial({
        vertexShader:VERT_SHADER,fragmentShader:FRAG_SHADER,wireframe:false,
        uniforms:{u_time:{value:0},u_progress:{value:0},u_baseColor:{value:new THREE.Vector3(...color)}}
      });
      const sphere=new THREE.Mesh(new THREE.SphereGeometry(1,162,162),material);
      scene.add(sphere);

      const pointsMaterial=new THREE.ShaderMaterial({
        vertexShader:PARTICLE_VERT,fragmentShader:PARTICLE_FRAG,wireframe:false,
        side:THREE.DoubleSide,transparent:true,
        uniforms:{u_time:{value:0},u_progress:{value:0}}
      });
      const N=30000;const pos=new Float32Array(N*3);
      const inc=Math.PI*(3-Math.sqrt(5));const offset=2/N;const radius=2;
      for(let j=0;j<N;j++){
        const y=j*offset-1+offset/2;const r=Math.sqrt(1-y*y);const phi=j*inc;
        pos[3*j]=radius*Math.cos(phi)*r;pos[3*j+1]=radius*y;pos[3*j+2]=radius*Math.sin(phi)*r;
      }
      const particleGeo=new THREE.BufferGeometry();
      particleGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
      const points=new THREE.Points(particleGeo,pointsMaterial);
      scene.add(points);

      const bgMaterial=new THREE.ShaderMaterial({
        vertexShader:BG_VERT,fragmentShader:BG_FRAG,wireframe:false,
        uniforms:{u_time:{value:0},u_progress:{value:0}}
      });
      const bgMesh=new THREE.Mesh(new THREE.PlaneGeometry(100,15,16),bgMaterial);
      bgMesh.position.z=-2;
      scene.add(bgMesh);

      if(window.gsap){
        window.gsap.timeline({repeat:-1,yoyo:true})
          .to(material.uniforms.u_progress,{value:5,duration:5,ease:'power3.inOut'})
          .to(material.uniforms.u_progress,{value:1,duration:5,ease:'power3.inOut'});
        window.gsap.to(pointsMaterial.uniforms.u_progress,{value:0.4,duration:5,ease:'power3.inOut'});
      }

      const clock=new THREE.Clock();
      let rafId;
      const render=()=>{
        rafId=requestAnimationFrame(render);
        const elapsed=clock.getElapsedTime();
        material.uniforms.u_time.value=elapsed;
        pointsMaterial.uniforms.u_time.value=elapsed;
        bgMaterial.uniforms.u_time.value=elapsed;
        points.rotation.y+=0.005;
        camera.lookAt(scene.position);
        renderer.render(scene,camera);
      };
      render();

      const onResize=()=>{
        const nw=container.clientWidth,nh=container.clientHeight;
        camera.aspect=nw/nh;camera.updateProjectionMatrix();
        renderer.setSize(nw,nh);
      };
      window.addEventListener('resize',onResize);

      cleanupFn=()=>{
        cancelAnimationFrame(rafId);
        window.removeEventListener('resize',onResize);
        renderer.dispose();
        if(renderer.domElement.parentNode)renderer.domElement.parentNode.removeChild(renderer.domElement);
      };
    };

    const loadScript=(src)=>new Promise((resolve,reject)=>{
      if(document.querySelector(`script[src="${src}"]`)){resolve();return;}
      const s=document.createElement('script');
      s.src=src;s.onload=resolve;s.onerror=reject;
      document.head.appendChild(s);
    });

    if(window.THREE&&window.gsap){
      runSetup();
    }else{
      Promise.all([
        loadScript('https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js'),
        loadScript('https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js')
      ]).then(runSetup).catch(()=>{});
    }

    return()=>{
      cancelled=true;
      if(cleanupFn)cleanupFn();
    };
  },[]);
  return <div ref={mountRef} style={{position:"absolute",inset:0,zIndex:0}}/>;
}

function startMeditationAudio(key){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();ctx.resume();
    const master=ctx.createGain();
    master.gain.setValueAtTime(0,ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.72,ctx.currentTime+5);
    master.connect(ctx.destination);
    const nodes=[];const ivals=[];
    let trackSrc=null;

    /* ── Carica e riproduce il file audio Reiki in loop ── */
    fetch('./videoplayback.mp4')
      .then(r=>r.arrayBuffer())
      .then(ab=>ctx.decodeAudioData(ab))
      .then(buf=>{
        trackSrc=ctx.createBufferSource();
        trackSrc.buffer=buf;
        trackSrc.loop=true;
        trackSrc.connect(master);
        trackSrc.start();
      })
      .catch(()=>{});

    /* ── Campana tibetana (accento sottile sopra la musica) ── */
    const bowl=(freq,vol,when)=>{
      try{
        const t=when||ctx.currentTime;
        const dur=18;
        const bowlG=ctx.createGain();
        bowlG.gain.setValueAtTime(0,t);
        bowlG.gain.linearRampToValueAtTime(vol*0.18,t+0.04);
        bowlG.gain.exponentialRampToValueAtTime(0.0001,t+dur);
        bowlG.connect(master);
        [[1,1],[2.756,0.38],[5.1,0.14]].forEach(([r,rv])=>{
          const o=ctx.createOscillator();o.type="sine";
          o.frequency.setValueAtTime(freq*r*1.003,t);
          o.frequency.linearRampToValueAtTime(freq*r,t+0.10);
          const g=ctx.createGain();g.gain.value=rv;
          o.connect(g);g.connect(bowlG);
          o.start(t);o.stop(t+dur+0.1);
        });
      }catch(e){}
    };

    /* ── Accenti per portale ── */
    const BOWLS={
      papessa: {freqs:[432,288,432],times:[4000,16000,30000],interval:20000,picks:[432,288,576]},
      temperanza:{freqs:[528,528,1056],times:[4000,14000,26000],interval:16000,picks:[528,1056,528]},
      eremita:  {freqs:[396,198,396], times:[4000,17000,32000],interval:22000,picks:[396,264,396]},
      stella:   {freqs:[963,639,963], times:[4000,12000,24000],interval:18000,picks:[963,852,639]},
    };
    const cfg=BOWLS[key]||BOWLS.papessa;
    cfg.times.forEach((ms,i)=>setTimeout(()=>bowl(cfg.freqs[i],1.0),ms));
    ivals.push(setInterval(()=>{
      bowl(cfg.picks[Math.floor(Math.random()*cfg.picks.length)],0.8+Math.random()*0.4);
    },cfg.interval+Math.random()*8000));

    return()=>{
      ivals.forEach(iv=>clearInterval(iv));
      try{
        master.gain.setValueAtTime(0,ctx.currentTime);
        if(trackSrc){try{trackSrc.stop();}catch(e){}}
        nodes.forEach(n=>{try{n.stop();}catch(e){}});
        ctx.close();
      }catch(e){}
    };
  }catch(e){return()=>{};}
}
const MEDITATION_DURATION=120;
function MeditationSession({med,onEnd}){
  const[textIdx,setTextIdx]=useState(0);
  const[textVis,setTextVis]=useState(false);
  const[breathState,setBreathState]=useState({phase:'inspira',count:med.breathPhases[0].dur,progress:0});
  const[elapsed,setElapsed]=useState(0);
  const tmrRef=useRef(null);const idxRef=useRef(0);const elapsedRef=useRef(0);
  useEffect(()=>{
    const phases=med.breathPhases;
    const cycleLen=phases.reduce((s,p)=>s+p.dur,0);
    const iv=setInterval(()=>{
      const now=(Date.now()/1000)%cycleLen;
      let cum=0;
      for(const p of phases){
        if(now<cum+p.dur){
          const t=(now-cum)/p.dur;
          const prog=p.p0+(p.p1-p.p0)*t;
          setBreathState({phase:p.name,count:Math.max(1,Math.ceil(p.dur-(now-cum))),progress:prog});
          return;
        }
        cum+=p.dur;
      }
    },80);
    return()=>clearInterval(iv);
  },[med]);
  useEffect(()=>{
    const showNext=()=>{setTextIdx(idxRef.current);setTextVis(true);tmrRef.current=setTimeout(()=>{setTextVis(false);tmrRef.current=setTimeout(()=>{idxRef.current=(idxRef.current+1)%med.texts.length;showNext();},1800);},5200);};
    tmrRef.current=setTimeout(showNext,2200);
    return()=>{if(tmrRef.current)clearTimeout(tmrRef.current);};
  },[med]);
  useEffect(()=>{
    const iv=setInterval(()=>{
      elapsedRef.current+=1;
      setElapsed(elapsedRef.current);
      if(elapsedRef.current>=MEDITATION_DURATION){
        clearInterval(iv);
        if(tmrRef.current)clearTimeout(tmrRef.current);
        onEnd();
      }
    },1000);
    return()=>clearInterval(iv);
  },[]);
  const handleEnd=()=>{if(tmrRef.current)clearTimeout(tmrRef.current);onEnd();};
  const phaseLabel={inspira:"· inspira ·",tieni:"· tieni ·",espira:"· espira ·",riposa:"· riposa ·"};
  const phaseAlpha={inspira:0.9,tieni:0.65,espira:0.55,riposa:0.3};
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,background:"#050508",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
      {/* full-screen shader ball canvas */}
      <ShaderBall color={med.ballColor}/>
      <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:1}}>
        {[...Array(18)].map((_,i)=><div key={i} style={{position:"absolute",width:i%5===0?2:1,height:i%5===0?2:1,borderRadius:"50%",background:`rgba(255,255,255,${i%4===0?.10:.04})`,top:`${(i*41+7)%100}%`,left:`${(i*73+13)%100}%`,animation:`pulse ${1.5+(i*0.31)%2}s ${(i*0.19)%2}s ease-in-out infinite`}}/>)}
      </div>
      {/* header */}

function Meditazione({onBack}){
  const[chosen,setChosen]=useState(null);const[active,setActive]=useState(false);const[hov,setHov]=useState(null);
  const stopRef=useRef(null);
  const start=useCallback(med=>{setChosen(med);setActive(true);stopRef.current=startMeditationAudio(med.key);},[]);
  const end=useCallback(()=>{if(stopRef.current){stopRef.current();stopRef.current=null;}setActive(false);setChosen(null);},[]);
  useEffect(()=>()=>{if(stopRef.current)stopRef.current();},[]);
  if(active&&chosen)return<MeditationSession med={chosen} onEnd={end}/>;
  return(
    <div style={{minHeight:"100vh",background:"#f2f2f7",color:"#1f1f24",overflowX:"hidden",paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 80px)"}}>
